<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水果大作战</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#87CEEB;overflow:hidden;font-family:Arial,sans-serif;user-select:none}
canvas{display:block;width:100%;height:100%}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.7);z-index:100}
.ov.on{display:flex;align-items:center;justify-content:center}
.pn{background:#1e1e3a;border:2px solid #ffd43b;border-radius:16px;padding:20px 28px;text-align:center;color:#fff;max-width:400px;width:90%}
.pn h1{font-size:30px;color:#ffd43b;margin-bottom:4px}
.pn p{color:#ccc;font-size:14px;margin:6px 0}
.btn{display:inline-block;padding:10px 30px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff;margin:4px}
.or{background:#ff6b35}.bl{background:#44b4ff}.gr{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
#hud{position:fixed;top:8px;left:8px;right:8px;display:none;z-index:10;color:#fff;font-size:16px;text-shadow:0 2px 4px rgba(0,0,0,0.6)}
#hud.on{display:flex;justify-content:space-between}
#hud>div{background:rgba(0,0,0,0.5);padding:6px 16px;border-radius:10px;backdrop-filter:blur(4px)}
.popup{position:fixed;pointer-events:none;z-index:50;font-weight:bold;text-shadow:0 0 10px rgba(255,212,59,0.5);animation:floatUp 0.8s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}
.shake{animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ov on" id="sMenu"><div class="pn">
<h1>&#127815; 水果大作战</h1>
<p>用篮子接水果赚分数！接住炸弹会扣命！</p>
<p style="font-size:12px;color:#8899bb">&#x2190;&#x2192; 或鼠标移动篮子 | 共3条命</p>
<button class="btn or" id="bStart">&#127918; 开始游戏</button>
</div></div>
<div class="ov" id="sOver"><div class="pn">
<h1 style="color:#ff6b6b">&#128534; 游戏结束</h1>
<p id="scoreInfo" style="font-size:16px;line-height:2"></p>
<button class="btn or" id="bAgain">&#128260; 再来一次</button>
<button class="btn gr" id="bMenu">&#127968; 返回菜单</button>
</div></div>
<div id="hud"><div><span>&#127775; <b id="hScore" style="color:#ffd43b;font-size:20px">0</b></span></div><div><span>&#10084;&#65039; <b id="hLife" style="color:#ff6b6b">3</b></span> <span>&#128163; <b id="hBomb" style="color:#ff4444">0</b></span></div></div>
<script>
var $=function(id){return document.getElementById(id)},ca=$('c'),cx=ca.getContext('2d'),W,H;
function sz(){W=ca.width=window.innerWidth;H=ca.height=window.innerHeight}
window.addEventListener('resize',sz);sz();
var K={};
document.addEventListener('keydown',function(e){K[e.key]=true;if(e.key===' ')e.preventDefault()});
document.addEventListener('keyup',function(e){K[e.key]=false});
var G=null;

function init(){
  G={
    st:'p',fr:0,score:0,bombs:0,
    bx:W/2,by:H-65,bw:90,bh:18,life:3,
    items:[],spd:2.5,spawnT:0,spawnI:35,
    best:parseInt(localStorage.getItem('fcBest2'))||0,
  };
  $('hud').className='hud on';hideAll();$('hScore').textContent='0';$('hLife').textContent='3';$('hBomb').textContent='0';
}
function hideAll(){['sMenu','sOver'].forEach(function(id){$(id).classList.remove('on')})}

function update(){
  if(!G||G.st!=='p')return;
  var g=G;g.fr++;
  // 篮子移动 - 键盘
  var mx=0;
  if(K['ArrowLeft']||K['a']||K['A'])mx=-7;
  if(K['ArrowRight']||K['d']||K['D'])mx=7;
  g.bx+=mx;g.bx=Math.max(g.bw/2+5,Math.min(W-g.bw/2-5,g.bx));
  // 生成水果 - 越来越快
  g.spawnT++;
  var si=Math.max(18,Math.floor(g.spawnI-g.score*0.05));
  if(g.spawnT>=si){
    g.spawnT=0;
    var isBomb=Math.random()<0.1;
    var fruits=['🍎','🍊','🍋','🍇','🍉','🍓','🥝','🍑','🍌','🍒'];
    var f=isBomb?{e:'💣',pt:0}:{e:fruits[Math.floor(Math.random()*fruits.length)],pt:10+Math.floor(Math.random()*15)};
    g.items.push({
      x:20+Math.random()*(W-40),y:-25,
      spd:g.spd+Math.random()*2,
      f:f,size:32,
    });
  }
  // 更新水果
  for(var i=g.items.length-1;i>=0;i--){
    var it=g.items[i];
    it.y+=it.spd;
    it.x+=Math.sin(g.fr*0.03+i)*0.4;
    // 碰撞检测 - 篮子
    var bx1=g.bx-g.bw/2, bx2=g.bx+g.bw/2;
    var by1=g.by, by2=g.by+g.bh+15;
    if(it.y+it.size/2>by1 && it.y<by2 &&
       it.x+it.size/4>bx1 && it.x-it.size/4<bx2){
      if(it.f.e==='💣'){
        g.bombs++;g.life--;
        $('hLife').textContent=g.life;
        $('hBomb').textContent=g.bombs;
        showPop(it.x,it.y-20,'💥 -1命!','#ff4444');
        if(g.life<=0){g.st='d';showOver();return}
      }else{
        g.score+=it.f.pt;
        $('hScore').textContent=g.score;
        showPop(it.x,it.y-20,'+'+it.f.pt,'#ffd43b');
      }
      g.items.splice(i,1);continue;
    }
    // 掉出屏幕(没接到)
    if(it.y>H+30){
      g.items.splice(i,1);
    }
  }
}

function showOver(){
  hideAll();$('hud').className='hud';
  var g=G;
  if(g.score>g.best){g.best=g.score;localStorage.setItem('fcBest2',g.score)}
  $('scoreInfo').innerHTML=
    '&#127775; 得分: <b style="color:#ffd43b;font-size:24px">'+g.score+'</b><br>'+
    '&#128163; 接到炸弹: <b style="color:#e74c3c">'+g.bombs+'</b>次<br>'+
    '&#127942; 历史最高: <b style="color:#ff6b35;font-size:20px">'+(g.best)+'</b>';
  $('sOver').className='ov on';
}

function showPop(x,y,text,color){
  var el=document.createElement('div');el.className='popup';
  el.textContent=text;el.style.color=color;
  el.style.fontSize='28px';el.style.left=x+'px';el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},800);
}

function render(){
  cx.clearRect(0,0,W,H);if(!G)return;
  var g=G;
  // ===== 明亮天空背景 =====
  var gr=cx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#4fc3f7');gr.addColorStop(0.5,'#81deea');gr.addColorStop(0.8,'#b9f6ca');gr.addColorStop(1,'#69f0ae');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  // 云朵
  for(var i=0;i<4;i++){
    var cx2=((i*257+80)%(W+100))-50, cy=((i*127+30)%200)+10;
    cx.fillStyle='rgba(255,255,255,0.6)';
    cx.beginPath();cx.ellipse(cx2,cy,50+Math.sin(i)*10,20,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(cx2+30,cy-6,35,16,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(cx2-20,cy+3,30,14,0,0,Math.PI*2);cx.fill();
  }
  // 草地
  cx.fillStyle='#4caf50';cx.fillRect(0,H-30,W,30);
  cx.fillStyle='#388e3c';cx.fillRect(0,H-30,W,4);
  // 小草
  for(var i=0;i<20;i++){
    var gx=i/20*W,gh=6+Math.sin(i*2+g.fr*0.03)*4;
    cx.fillStyle='#66bb6a';cx.beginPath();
    cx.moveTo(gx,H-30);cx.lineTo(gx-3,H-30-gh);cx.lineTo(gx+3,H-30-gh);cx.closePath();cx.fill();
  }
  // ===== 画所有掉落物品 =====
  for(var i=0;i<g.items.length;i++){
    var it=g.items[i];
    // 发光效果
    if(it.f.e!=='💣'){
      cx.shadowColor='#ffd43b';cx.shadowBlur=12;
    }else{
      cx.shadowColor='#ff4444';cx.shadowBlur=12;
    }
    cx.font=it.size+'px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(it.f.e,it.x,it.y);
    cx.shadowBlur=0;
  }
  // ===== 画篮子(亮色大篮子) =====
  var bx=g.bx;
  // 篮子阴影
  cx.fillStyle='rgba(0,0,0,0.15)';cx.beginPath();
  cx.ellipse(bx,g.by+g.bh+6,g.bw/2+4,5,0,0,Math.PI*2);cx.fill();
  // 篮子身体 - 亮橙色
  var gr2=cx.createLinearGradient(bx,g.by,bx,g.by+g.bh+6);
  gr2.addColorStop(0,'#ff8a65');gr2.addColorStop(0.5,'#ff6d00');gr2.addColorStop(1,'#e65100');
  cx.fillStyle=gr2;cx.shadowColor='#ff6d00';cx.shadowBlur=6;
  cx.beginPath();cx.moveTo(bx-g.bw/2,g.by);
  cx.quadraticCurveTo(bx-g.bw/2-6,g.by+g.bh+8,bx,g.by+g.bh+6);
  cx.quadraticCurveTo(bx+g.bw/2+6,g.by+g.bh+8,bx+g.bw/2,g.by);
  cx.closePath();cx.fill();cx.shadowBlur=0;
  // 篮子边框 - 白色亮边
  cx.strokeStyle='#fff';cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(bx-g.bw/2,g.by);
  cx.quadraticCurveTo(bx-g.bw/2-6,g.by+g.bh+8,bx,g.by+g.bh+6);
  cx.quadraticCurveTo(bx+g.bw/2+6,g.by+g.bh+8,bx+g.bw/2,g.by);
  cx.stroke();
  // 篮子横条纹装饰
  cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1.5;
  for(var s=0;s<3;s++){var sy=g.by+4+s*5;
    cx.beginPath();cx.moveTo(bx-g.bw/2+6,sy);cx.lineTo(bx+g.bw/2-6,sy);cx.stroke();
  }
  // 篮子里的水果装饰
  cx.font='12px Arial';cx.textAlign='center';cx.textBaseline='middle';
  var decor=['🍎','🍊','🍋'];var di=Math.floor(g.fr/60)%3;
  cx.fillText(decor[di],bx-8,g.by+3);cx.fillText(decor[(di+1)%3],bx+8,g.by+3);
  // ===== 底部发光提示线 =====
  cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=1;cx.setLineDash([5,10]);
  cx.beginPath();cx.moveTo(0,g.by);cx.lineTo(W,g.by);cx.stroke();cx.setLineDash([]);
  // 分数弹出动画、炸弹警告等已经通过DOM实现了
}

function loop(){
  try{update();render()}catch(e){try{cx.fillStyle='#fff';cx.font='14px Arial';cx.fillText('出错:'+e.message,10,30)}catch(e2){}}
  requestAnimationFrame(loop)
}
// 鼠标控制篮子
ca.addEventListener('mousemove',function(e){
  if(G&&G.st==='p'){var rect=ca.getBoundingClientRect();G.bx=(e.clientX-rect.left)/rect.width*W}
});
// 按钮
$('bStart').onclick=function(){init()};
$('bAgain').onclick=function(){init()};
$('bMenu').onclick=function(){hideAll();$('hud').className='hud';G=null;$('sMenu').className='ov on'};
requestAnimationFrame(loop);
</script>
</body>
</html>
