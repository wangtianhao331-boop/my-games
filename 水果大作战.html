<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水果大作战</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#222;font-family:Arial,sans-serif}
canvas{display:block;width:100%;height:100%}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.75);z-index:100}
.ov.on{display:flex;align-items:center;justify-content:center}
.pn{background:#1e1e3a;border:2px solid #ffd43b;border-radius:16px;padding:22px 28px;text-align:center;color:#fff;max-width:400px;width:90%}
.pn h1{font-size:28px;color:#ffd43b;margin:0 0 6px 0}
.pn p{color:#bbb;font-size:13px;margin:4px 0}
.btn{padding:10px 28px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff;margin:6px 4px}
.or{background:#ff6b35}.gr{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15)}
#hud{position:fixed;top:10px;left:10px;right:10px;display:none;z-index:10;color:#fff;font-size:15px}
#hud.on{display:flex;justify-content:space-between;align-items:center}
#hud>div{background:rgba(0,0,0,0.6);padding:5px 14px;border-radius:8px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ov on" id="sMenu"><div class="pn">
<h1>&#127815; 水果大作战</h1>
<p>接水果得分 | 连击越多分越高 | &#127775;黄金果+50</p>
<p style="font-size:12px;color:#777">鼠标移动 或 &#x2190;&#x2192; 方向键</p>
<button class="btn or" id="bGo">&#127918; 开始</button>
</div></div>

<div class="ov" id="sOver"><div class="pn">
<h1 style="color:#ff6b6b">&#128683; 游戏结束</h1>
<p id="resText" style="font-size:15px;line-height:2"></p>
<button class="btn or" id="bRetry">&#128260; 再来</button>
<button class="btn gr" id="bMenu">&#127968; 菜单</button>
</div></div>

<div id="hud">
<div><span>&#127775; <b id="hS" style="color:#ffd43b;font-size:22px">0</b></span> <span style="margin-left:12px">🔥 <b id="hC" style="color:#ff6b35">0</b>x</span></div>
<div><span id="hLv" style="color:#44b4ff">Lv.1</span> <span style="margin-left:12px">&#10084;&#65039; <b id="hL" style="color:#ff6b6b">3</b></span></div>
</div>

<script>
(function(){
var $=function(id){return document.getElementById(id)};
var ca=$('c'),cx=ca.getContext('2d'),W,H;
function resize(){W=ca.width=window.innerWidth;H=ca.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

var K={};
document.addEventListener('keydown',function(e){K[e.key]=true;if(e.key===' '||e.key==='ArrowUp'||e.key==='ArrowDown')e.preventDefault()});
document.addEventListener('keyup',function(e){K[e.key]=false});

// ===== 游戏状态 =====
var G=null;

// 水果配置
var FRUIT_TYPES=[
  {e:'🍎',c:'#e74c3c'},{e:'🍊',c:'#ff6b35'},{e:'🍋',c:'#ffd43b'},
  {e:'🍇',c:'#9b59b6'},{e:'🍉',c:'#27ae60'},{e:'🍓',c:'#e84393'},
  {e:'🥝',c:'#6ab04c'},{e:'🍑',c:'#f5b7b1'},{e:'🍌',c:'#ffeaa7'},
  {e:'🍒',c:'#c0392b'},{e:'🥭',c:'#f39c12'},
];

function init(){
  G={
    st:'p',fr:0,
    score:0,combo:0,maxCombo:0,lv:1,
    life:3,
    bx:W/2,by:H-65,bw:90,
    items:[],
    fallSpd:1.6,spawnCnt:0,spawnMax:42,
    best:parseInt(localStorage.getItem('fb_best')||'0'),
    slow:0, // 冰冻减速剩余时间
    fx:[],  // 特效列表
  };
  $('hud').className='hud on';
  hideAll();
  $('hS').textContent='0';$('hC').textContent='0';$('hL').textContent='3';$('hLv').textContent='Lv.1';
}
function hideAll(){['sMenu','sOver'].forEach(function(id){$(id).classList.remove('on')})}

// ===== 更新逻辑 =====
function update(){
  if(!G||G.st!=='p')return;
  var g=G;g.fr++;
  if(g.slow>0)g.slow--;

  // 键盘移动
  var mx=0;
  if(K['ArrowLeft']||K['a']||K['A'])mx=-7;
  if(K['ArrowRight']||K['d']||K['D'])mx=7;
  g.bx+=mx;g.bx=Math.max(50,Math.min(W-50,g.bx));

  // 等级提升 (每100分升1级)
  var nlv=Math.min(10,1+Math.floor(g.score/100));
  if(nlv!==g.lv){g.lv=nlv;$('hLv').textContent='Lv.'+g.lv}

  // 生成水果(速度调慢)
  g.spawnCnt++;
  var maxSpawn=Math.max(22,42-g.lv*2);
  if(g.spawnCnt>=maxSpawn){
    g.spawnCnt=0;
    var spdAdd=g.lv*0.08;
    var r=Math.random();
    var f;
    if(r<0.08){ // 黄金果(8%)
      f={e:'⭐',pt:50,gold:true};
    }else if(r<0.14){ // 冰冻果(6%)
      f={e:'🧊',pt:5,ice:true};
    }else if(r<0.22){ // 炸弹(8%)
      f={e:'💣',pt:0,bomb:true};
    }else{
      var t=FRUIT_TYPES[Math.floor(Math.random()*FRUIT_TYPES.length)];
      f={e:t.e,pt:10+Math.floor(Math.random()*10),c:t.c};
    }
    g.items.push({
      x:20+Math.random()*(W-40), y:-30,
      spd:g.fallSpd+Math.random()*1.2+spdAdd,
      f:f, size:30,
      rot:0, rotSpd:(Math.random()-0.5)*0.05,
    });
  }

  // 加速(分数越高越快)
  g.fallSpd=1.6+g.lv*0.07;

  // 更新物品
  for(var i=g.items.length-1;i>=0;i--){
    var it=g.items[i];
    it.y+=it.spd*(g.slow>0?0.4:1);
    it.rot+=it.rotSpd;

    // 碰撞检测
    var half=it.size/2;
    var cx1=g.bx-g.bw/2-8, cx2=g.bx+g.bw/2+8;
    var cy1=g.by-8, cy2=g.by+40;

    if(it.x+half/2>cx1 && it.x-half/2<cx2 && it.y+half>cy1 && it.y-half<cy2){
      if(it.f.bomb){
        g.life--;g.combo=0;
        $('hL').textContent=g.life;
        $('hC').textContent='0';
        // 爆炸特效
        for(var k=0;k<16;k++){var a=k*0.4;g.fx.push({x:it.x,y:it.y,dx:Math.cos(a)*6,dy:Math.sin(a)*6-1,c:'#ff6b35',life:12})}
        if(g.life<=0){g.st='d';showOver();return}
      }else{
        var pts=it.f.pt;
        if(it.f.gold){pts=50;g.combo+=2}
        else g.combo++;
        if(it.f.ice){g.slow=180} // 冰冻3秒
        if(g.combo>g.maxCombo)g.maxCombo=g.combo;
        // 连击加成(最高3倍)
        var comboMul=Math.min(3,1+Math.floor(g.combo/5)*0.5);
        var finalPts=Math.floor(pts*comboMul);
        g.score+=finalPts;
        $('hS').textContent=g.score;
        $('hC').textContent=g.combo;
        // 文字特效
        var txt='+'+finalPts;
        if(it.f.gold)txt='⭐+'+finalPts;
        if(it.f.ice)txt='🧊减速';
        g.fx.push({x:it.x,y:it.y-10,text:txt,life:30,
          c:it.f.gold?'#ffd700':it.f.ice?'#44b4ff':'#ffd43b',ty:-1.2});
      }
      g.items.splice(i,1);continue;
    }

    // 掉出屏幕
    if(it.y>H+40){g.items.splice(i,1);if(!it.f.bomb&&!it.f.gold&&!it.f.ice)g.combo=0;$('hC').textContent=0}
  }

  // 特效更新
  for(var i=g.fx.length-1;i>=0;i--){
    var f=g.fx[i];f.life--;
    if(f.dx!==undefined){f.x+=f.dx;f.y+=f.dy;f.dy+=0.3}
    else if(f.ty!==undefined)f.y+=f.ty;
    if(f.life<=0)g.fx.splice(i,1);
  }
}

// ===== 渲染 =====
function render(){
  if(!G)return;
  var g=G;
  cx.clearRect(0,0,W,H);

  // 背景: 从上到下渐变
  var grd=cx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#1a1a3e');grd.addColorStop(0.5,'#2d4a7a');grd.addColorStop(0.8,'#4a8a5a');grd.addColorStop(1,'#2d6a3a');
  cx.fillStyle=grd;cx.fillRect(0,0,W,H);

  // 星星
  for(var i=0;i<25;i++){
    var sx=(i*137+53)%W, sy=(i*89+17)%(H*0.5);
    cx.fillStyle='rgba(255,255,255,'+(0.15+0.2*Math.sin(g.fr*0.02+i*1.7))+')';
    cx.beginPath();cx.arc(sx,sy,1+Math.sin(i*2.3)*0.5,0,Math.PI*2);cx.fill();
  }

  // 远处山丘
  cx.fillStyle='rgba(30,60,40,0.4)';
  for(var i=0;i<6;i++){
    var mx=i*W/5,my=H-50+Math.sin(i*1.2)*15;
    cx.beginPath();cx.ellipse(mx,my,120,40,0,0,Math.PI*2);cx.fill();
  }

  // 地面
  cx.fillStyle='#3a7a3a';cx.fillRect(0,H-35,W,35);
  cx.fillStyle='#2d6a2d';cx.fillRect(0,H-35,W,4);
  // 小草
  cx.strokeStyle='#5a9a5a';cx.lineWidth=1.5;
  for(var i=0;i<15;i++){
    var gx=i/15*W,gh=5+Math.sin(i*3+g.fr*0.02)*4;
    cx.beginPath();cx.moveTo(gx,H-35);cx.lineTo(gx-2,H-35-gh);cx.stroke();
    cx.beginPath();cx.moveTo(gx,H-35);cx.lineTo(gx+2,H-35-gh);cx.stroke();
  }

  // 掉落物品
  for(var i=0;i<g.items.length;i++){
    var it=g.items[i];
    cx.save();cx.translate(it.x,it.y);
    // 发光
    if(it.f.gold){cx.shadowColor='#ffd700';cx.shadowBlur=18}
    else if(it.f.bomb){cx.shadowColor='#ff4444';cx.shadowBlur=10}
    else{cx.shadowColor='#ffd43b';cx.shadowBlur=8}
    cx.font=it.size+'px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(it.f.e,0,0);
    cx.shadowBlur=0;
    cx.restore();
  }

  // 篮子
  var bx=g.bx;
  // 阴影
  cx.fillStyle='rgba(0,0,0,0.2)';cx.beginPath();
  cx.ellipse(bx,g.by+20,50,6,0,0,Math.PI*2);cx.fill();
  // 篮子基底(半透明亮色)
  cx.fillStyle='rgba(255,120,50,0.85)';cx.shadowColor='#ff6d00';cx.shadowBlur=8;
  cx.beginPath();cx.moveTo(bx-45,g.by);
  cx.quadraticCurveTo(bx-50,g.by+14,bx-5,g.by+30);
  cx.quadraticCurveTo(bx,g.by+34,bx+5,g.by+30);
  cx.quadraticCurveTo(bx+50,g.by+14,bx+45,g.by);
  cx.closePath();cx.fill();cx.shadowBlur=0;
  // 白边框
  cx.strokeStyle='rgba(255,255,255,0.5)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(bx-45,g.by);
  cx.quadraticCurveTo(bx-50,g.by+14,bx-5,g.by+30);
  cx.quadraticCurveTo(bx,g.by+34,bx+5,g.by+30);
  cx.quadraticCurveTo(bx+50,g.by+14,bx+45,g.by);
  cx.stroke();
  // 横纹
  cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1;
  for(var s=0;s<3;s++){var sy2=g.by+4+s*8;
    cx.beginPath();cx.moveTo(bx-40+sy2*0.5,sy2);cx.lineTo(bx+40-sy2*0.5,sy2);cx.stroke();
  }

  // 特效
  for(var i=0;i<g.fx.length;i++){
    var f=g.fx[i];
    if(f.text){
      cx.globalAlpha=Math.min(1,f.life/15);
      cx.fillStyle=f.c;cx.font='bold 20px Arial';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(f.text,f.x,f.y);
      cx.globalAlpha=1;
    }else{
      cx.globalAlpha=f.life/12;
      cx.fillStyle=f.c;cx.beginPath();cx.arc(f.x,f.y,4+2*(1-f.life/12),0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }
  }

  // 冰冻效果
  if(g.slow>0){
    cx.fillStyle='rgba(68,180,255,'+(0.06+0.04*Math.sin(g.fr*0.1))+')';
    cx.fillRect(0,0,W,H);
    cx.fillStyle='#44b4ff';cx.font='14px Arial';cx.textAlign='center';
    cx.fillText('🧊 冰冻 '+(Math.ceil(g.slow/60))+'s',W/2,30);
  }

  // 等级提示
  cx.fillStyle='rgba(255,255,255,0.1)';cx.font='12px Arial';cx.textAlign='right';
  cx.fillText('Lv.'+g.lv,W-15,H-8);
}

function showOver(){
  hideAll();$('hud').className='hud';
  var g=G;
  if(g.score>g.best){g.best=g.score;try{localStorage.setItem('fb_best',g.score)}catch(e){}}
  $('resText').innerHTML=
    '&#127775; <b style="color:#ffd43b;font-size:24px">'+g.score+'</b> 分<br>'+
    '&#128293; 最高连击: <b style="color:#ff6b35">'+g.maxCombo+'</b>x<br>'+
    '&#127942; 历史最高: <b style="color:#44b4ff;font-size:20px">'+g.best+'</b>';
  $('sOver').className='ov on';
}

// ===== 鼠标控制 =====
ca.addEventListener('mousemove',function(e){
  if(G&&G.st==='p'){
    var rect=ca.getBoundingClientRect();
    G.bx=(e.clientX-rect.left)/rect.width*W;
  }
});
// ===== 触屏控制 =====
ca.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(G&&G.st==='p'){
    var rect=ca.getBoundingClientRect();
    G.bx=(e.touches[0].clientX-rect.left)/rect.width*W;
  }
});
ca.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(G&&G.st==='p'){
    var rect=ca.getBoundingClientRect();
    G.bx=(e.touches[0].clientX-rect.left)/rect.width*W;
  }
});

// ===== 按钮 =====
$('bGo').onclick=function(){init()};
$('bRetry').onclick=function(){init()};
$('bMenu').onclick=function(){hideAll();$('hud').className='hud';G=null;$('sMenu').className='ov on';};

// ===== 主循环 =====
function loop(){
  try{update();render()}catch(e){try{cx.fillStyle='#fff';cx.font='12px Arial';cx.fillText('err:'+e.message,10,20)}catch(e2){}}
  requestAnimationFrame(loop)
}
requestAnimationFrame(loop);

// ===== 触屏虚拟方向键 =====
(function(){
  var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!isTouch) return;
  var s = document.createElement('style');
  s.textContent = '#vk{position:fixed;inset:0;z-index:50;pointer-events:none;touch-action:none;display:none}#vk.on{display:block}@media(hover:none)and(pointer:coarse){#vk{display:block}}.vkb{position:absolute;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;color:#fff;font-weight:bold;border-radius:10px;width:56px;height:56px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.2);font-size:24px}.vkb:active,.vkb.pressed{background:rgba(255,255,255,0.35)}#vkDpad{position:absolute;left:12px;bottom:20px;width:130px;height:56px;pointer-events:auto}#vkDpad .vkb-l{left:0}#vkDpad .vkb-r{right:0}';
  document.head.appendChild(s);
  var vk = document.createElement('div'); vk.id = 'vk';
  vk.innerHTML = '<div id="vkDpad"><div class="vkb vkb-l" data-k="ArrowLeft">◀</div><div class="vkb vkb-r" data-k="ArrowRight">▶</div></div>';
  document.body.appendChild(vk);
  vk.classList.add('on');
  document.querySelectorAll('#vkDpad .vkb').forEach(function(btn){
    var k = btn.getAttribute('data-k');
    function p(){K[k]=true;btn.classList.add('pressed')}
    function r(){K[k]=false;btn.classList.remove('pressed')}
    btn.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();p()});
    btn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();r()});
    btn.addEventListener('touchcancel',r);
    btn.addEventListener('mousedown',p);
    btn.addEventListener('mouseup',r);
    btn.addEventListener('mouseleave',r);
  });
})();
})();
</script>
</body>
</html>
