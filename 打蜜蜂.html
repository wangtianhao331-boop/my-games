<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打蜜蜂 - 射击版</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a2a;font-family:Arial,sans-serif}
canvas{display:block;width:100%;height:100%}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.8);z-index:100}
.ov.on{display:flex;align-items:center;justify-content:center}
.pn{background:#1e1e3a;border:2px solid #ffd43b;border-radius:16px;padding:20px 28px;text-align:center;color:#fff;max-width:420px;width:90%}
.pn h1{font-size:28px;color:#ffd43b;margin:0 0 6px 0}
.pn p{color:#bbb;font-size:13px;margin:4px 0}
.btn{padding:10px 28px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff;margin:6px 4px}
.or{background:#ff6b35}.gr{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15)}
#hud{position:fixed;top:10px;left:10px;right:10px;display:none;z-index:10;color:#fff;font-size:15px}
#hud.on{display:flex;justify-content:space-between;align-items:center}
#hud>div{background:rgba(0,0,0,0.5);padding:5px 14px;border-radius:8px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ov on" id="sMenu"><div class="pn">
<h1>&#128299; 打蜜蜂 &#128299;</h1>
<p>射击版 | 鼠标移动瞄准 + 点击开火</p>
<p style="font-size:12px;color:#777">&#128029;小蜜蜂1分 &#128030;大黄蜂3分 ⭐黄金蜂5分 &#128293;连续命中加分</p>
<button class="btn or" id="bGo">&#127918; 开始</button>
</div></div>

<div class="ov" id="sOver"><div class="pn">
<h1 style="color:#ff6b6b">&#128299; 时间到！</h1>
<p id="resText" style="font-size:15px;line-height:2"></p>
<button class="btn or" id="bRetry">&#128260; 再来</button>
<button class="btn gr" id="bMenu">&#127968; 菜单</button>
</div></div>

<div id="hud">
<div><span>&#127775; <b id="hS" style="color:#ffd43b;font-size:20px">0</b></span> <span style="margin-left:10px">🔥 <b id="hC" style="color:#ff6b35">0</b>x</span></div>
<div><span>⏱️ <b id="hT" style="color:#44b4ff">60</b>s</span></div>
</div>

<script>
(function(){
var $=function(id){return document.getElementById(id)};
var ca=$('c'),cx=ca.getContext('2d'),W,H;
function resize(){W=ca.width=window.innerWidth;H=ca.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

var K={};
document.addEventListener('keydown',function(e){K[e.key]=true;if(e.key===' ')e.preventDefault()});
document.addEventListener('keyup',function(e){K[e.key]=false});

var G=null;
var BEE_TYPES=[
  {e:'🐝',c:'#ffd43b',s:1,spd:0.8,size:40,hp:1},
  {e:'🐝',c:'#ff8c00',s:3,spd:1.0,size:44,hp:2},
  {e:'🐞',c:'#e74c3c',s:2,spd:1.2,size:38,hp:1},
  {e:'🦋',c:'#9b59b6',s:4,spd:1.3,size:42,hp:1},
  {e:'⭐',c:'#ffd700',s:5,spd:0.9,size:36,hp:1},
];

function init(){
  G={
    st:'p',fr:0,timer:60,
    score:0,combo:0,maxCombo:0,
    // 炮台
    gx:W/2,gy:H-40,
    // 子弹
    bullets:[],
    shootCD:0,shootMax:10,
    // 蜜蜂
    bees:[],
    spawnT:0,spawnMax:45,
    // 特效
    fx:[],
    best:parseInt(localStorage.getItem('bb_best')||'0'),
  };
  $('hud').className='hud on';hideAll();
  $('hS').textContent='0';$('hC').textContent='0';$('hT').textContent='60';
}
function hideAll(){['sMenu','sOver'].forEach(function(id){$(id).classList.remove('on')})}

// 音效(用振荡器)
function beep(freq,vol){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ac.createOscillator();var g=ac.createGain();
    osc.connect(g);g.connect(ac.destination);
    osc.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
    osc.start();osc.stop(ac.currentTime+0.1);
  }catch(e){}
}

function update(){
  if(!G||G.st!=='p')return;
  var g=G;g.fr++;

  // 倒计时
  if(g.fr%60===0){
    g.timer--;$('hT').textContent=g.timer;
    if(g.timer<=0){g.st='d';showOver();return}
  }

  // 炮台移动(鼠标)
  // (鼠标在mousemove中控制)

  // 自动射击(按住鼠标时)
  if(g.mouseDown&&g.shootCD<=0){
    g.shootCD=g.shootMax;
    // 发射子弹
    g.bullets.push({
      x:g.gx,y:g.gy-20,
      vx:(Math.random()-0.5)*0.5,
      vy:-7-Math.random()*2,
      life:80,
    });
    beep(800,0.08);
  }
  if(g.shootCD>0)g.shootCD--;

  // 生成蜜蜂
  g.spawnT++;
  if(g.spawnT>=g.spawnMax){
    g.spawnT=0;
    var typeIdx=Math.random()<0.08?4:(Math.random()<0.18?1:(Math.random()<0.28?2+Math.floor(Math.random()*2):0));
    var t=BEE_TYPES[typeIdx];
    var side=Math.floor(Math.random()*4);
    var x,y,vx,vy;
    if(side===0){x=-40;y=40+Math.random()*(H-160);vx=t.spd*(0.5+Math.random()*0.5);vy=(Math.random()-0.5)*t.spd*0.4}
    else if(side===1){x=W+40;y=40+Math.random()*(H-160);vx=-t.spd*(0.5+Math.random()*0.5);vy=(Math.random()-0.5)*t.spd*0.4}
    else if(side===2){x=40+Math.random()*(W-80);y=-40;vx=(Math.random()-0.5)*t.spd*0.6;vy=t.spd*(0.5+Math.random()*0.5)}
    else{x=40+Math.random()*(W-80);y=H+40;vx=(Math.random()-0.5)*t.spd*0.6;vy=-t.spd*(0.5+Math.random()*0.5)}
    g.bees.push({
      x:x,y:y,vx:vx,vy:vy,type:t,
      hp:t.hp,size:t.size,wobble:Math.random()*6.28,
      alive:true,timer:0,
    });
  }

  // 更新子弹
  for(var i=g.bullets.length-1;i>=0;i--){
    var b=g.bullets[i];
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.y<-20||b.life<=0||b.x<-20||b.x>W+20){g.bullets.splice(i,1);continue}
    // 子弹打中蜜蜂
    for(var j=g.bees.length-1;j>=0;j--){
      var bee=g.bees[j];
      if(!bee.alive)continue;
      var dx=b.x-bee.x,dy=b.y-bee.y;
      if(dx*dx+dy*dy<(bee.size*1.2)*(bee.size*1.2)){
        bee.hp--;
        if(bee.hp<=0){
          bee.alive=false;
          g.combo++;
          if(g.combo>g.maxCombo)g.maxCombo=g.combo;
          var comboMul=Math.min(3,1+Math.floor(g.combo/8)*0.5);
          var pts=Math.floor(bee.type.s*10*comboMul);
          g.score+=pts;
          $('hS').textContent=g.score;
          $('hC').textContent=g.combo;
          // 特效
          g.fx.push({x:bee.x,y:bee.y,text:'+'+pts,life:25,
            c:bee.type.e==='⭐'?'#ffd700':'#ffd43b',vy:-1.5});
          for(var k=0;k<8;k++){var a=k*0.8;g.fx.push({x:bee.x,y:bee.y,dx:Math.cos(a)*5,dy:Math.sin(a)*4-1,c:'#ffd43b',life:10})}
          beep(1200,0.06);
        }else{
          beep(600,0.04);
          g.fx.push({x:bee.x,y:bee.y,text:'💥',life:10,c:'#fff',vy:-1});
        }
        g.bullets.splice(i,1);break;
      }
    }
  }

  // 更新蜜蜂
  for(var i=g.bees.length-1;i>=0;i--){
    var b=g.bees[i];
    if(!b.alive){g.bees.splice(i,1);continue}
    b.timer++;b.wobble+=0.04;
    b.x+=b.vx+Math.sin(b.wobble)*0.4;
    b.y+=b.vy+Math.cos(b.wobble*0.7)*0.4;
    if(b.x<-60||b.x>W+60||b.y<-60||b.y>H+60){
      if(b.x<-60)b.x=W+50;if(b.x>W+60)b.x=-50;
      if(b.y<-60)b.y=H+50;if(b.y>H+60)b.y=-50;
    }
  }

  // 特效更新
  for(var i=g.fx.length-1;i>=0;i--){
    var f=g.fx[i];f.life--;
    if(f.text!==undefined&&f.vy!==undefined)f.y+=f.vy;
    if(f.dx!==undefined){f.x+=f.dx;f.y+=f.dy;f.dy+=0.2}
    if(f.life<=0)g.fx.splice(i,1);
  }
}

function render(){
  if(!G)return;var g=G;
  cx.clearRect(0,0,W,H);

  // 深空背景
  var gr=cx.createRadialGradient(W/2,0,0,W/2,0,H);
  gr.addColorStop(0,'#1a1a3e');gr.addColorStop(0.5,'#0f0c29');gr.addColorStop(1,'#0a0a1a');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);

  // 星星
  for(var i=0;i<30;i++){
    var sx=(i*157+43)%W,sy=(i*97+11)%(H*0.6);
    cx.fillStyle='rgba(255,255,255,'+(0.15+0.2*Math.sin(g.fr*0.02+i*2.1))+')';
    cx.beginPath();cx.arc(sx,sy,1,0,Math.PI*2);cx.fill();
  }

  // 地面
  cx.fillStyle='#1a3a1a';cx.fillRect(0,H-30,W,30);
  cx.fillStyle='#2a5a2a';cx.fillRect(0,H-30,W,3);

  // 画蜜蜂
  for(var i=0;i<g.bees.length;i++){
    var b=g.bees[i];
    cx.save();cx.translate(b.x,b.y);
    // 瞄准圈
    cx.fillStyle='rgba(255,255,255,0.04)';cx.beginPath();cx.arc(0,0,b.size*1.5,0,Math.PI*2);cx.fill();
    // 彩色底色
    cx.fillStyle=b.type.c+'33';cx.beginPath();cx.arc(0,0,b.size*0.7,0,Math.PI*2);cx.fill();
    cx.fillStyle=b.type.c+'66';cx.beginPath();cx.arc(0,0,b.size*0.45,0,Math.PI*2);cx.fill();
    cx.font=b.size+'px Arial';cx.textAlign='center';cx.textBaseline='middle';
    // 发光
    cx.shadowColor=b.type.c;cx.shadowBlur=10;
    cx.fillText(b.type.e,0,0);
    cx.shadowBlur=0;
    // 血条
    if(b.type.hp>1&&b.hp>0){
      cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(-14,-b.size/2-6,28,4);
      cx.fillStyle='#e74c3c';cx.fillRect(-14,-b.size/2-6,28*(b.hp/b.type.hp),4);
    }
    cx.restore();
  }

  // 画子弹 - 发光弹丸
  for(var i=0;i<g.bullets.length;i++){
    var b=g.bullets[i];
    cx.fillStyle='#ffd43b';cx.shadowColor='#ffd43b';cx.shadowBlur=12;
    cx.beginPath();cx.arc(b.x,b.y,4,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fff';cx.beginPath();cx.arc(b.x,b.y,2,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
    // 拖尾
    cx.fillStyle='rgba(255,212,59,0.3)';cx.beginPath();cx.arc(b.x-b.vx*0.5,b.y-b.vy*0.5,3,0,Math.PI*2);cx.fill();
  }

  // 画炮台
  var gx=g.gx;
  // 底座
  cx.fillStyle='#555';cx.fillRect(gx-18,H-30,36,8);
  cx.fillStyle='#888';cx.fillRect(gx-12,H-22,24,4);
  // 炮管
  cx.fillStyle='#44b4ff';cx.shadowColor='#44b4ff';cx.shadowBlur=8;
  cx.fillRect(gx-4,H-46,8,30);
  cx.shadowBlur=0;
  // 炮口闪光(发射时)
  if(g.shootCD>g.shootMax-3){
    cx.fillStyle='rgba(255,212,59,0.6)';cx.beginPath();cx.arc(gx,H-50,8+Math.random()*4,0,Math.PI*2);cx.fill();
  }
  // 炮身装饰
  cx.fillStyle='#ff6b35';cx.fillRect(gx-8,H-38,16,8);
  cx.fillStyle='#44b4ff';cx.font='16px Arial';cx.textAlign='center';cx.textBaseline='bottom';
  cx.fillText('🔫',gx,H-32);

  // 特效
  for(var i=0;i<g.fx.length;i++){
    var f=g.fx[i];
    if(f.text!==undefined){
      cx.globalAlpha=Math.min(1,f.life/15);
      cx.fillStyle=f.c;cx.font='bold 18px Arial';cx.textAlign='center';cx.textBaseline='middle';
      cx.shadowColor=f.c;cx.shadowBlur=6;
      cx.fillText(f.text,f.x,f.y);
      cx.shadowBlur=0;cx.globalAlpha=1;
    }else{
      cx.globalAlpha=f.life/10;
      cx.fillStyle=f.c;cx.beginPath();cx.arc(f.x,f.y,3,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }
  }
}

function showOver(){
  hideAll();$('hud').className='hud';
  var g=G;
  if(g.score>g.best){g.best=g.score;try{localStorage.setItem('bb_best',g.score)}catch(e){}}
  $('resText').innerHTML=
    '&#127775; 得分: <b style="color:#ffd43b;font-size:24px">'+g.score+'</b><br>'+
    '&#128293; 最高连击: <b style="color:#ff6b35">'+g.maxCombo+'</b>x<br>'+
    '&#127942; 历史最高: <b style="color:#44b4ff;font-size:20px">'+g.best+'</b>';
  $('sOver').className='ov on';
}

// 鼠标控制 - 炮台移动 + 射击
var mouseDown=false;
ca.addEventListener('mousemove',function(e){
  if(G&&G.st==='p'){
    var rect=ca.getBoundingClientRect();
    G.gx=(e.clientX-rect.left)/rect.width*W;
  }
});
ca.addEventListener('mousedown',function(e){
  if(G&&G.st==='p'){mouseDown=true;G.mouseDown=true}
});
ca.addEventListener('mouseup',function(e){
  mouseDown=false;if(G)G.mouseDown=false;
});
// ===== 触屏支持 =====
ca.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(G&&G.st==='p'){
    var rect=ca.getBoundingClientRect();
    G.gx=(e.touches[0].clientX-rect.left)/rect.width*W;
    mouseDown=true;G.mouseDown=true;
  }
});
ca.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(G&&G.st==='p'){
    var rect=ca.getBoundingClientRect();
    G.gx=(e.touches[0].clientX-rect.left)/rect.width*W;
  }
});
ca.addEventListener('touchend',function(e){
  e.preventDefault();
  mouseDown=false;if(G)G.mouseDown=false;
});

// 按钮
$('bGo').onclick=function(){init()};
$('bRetry').onclick=function(){init()};
$('bMenu').onclick=function(){hideAll();$('hud').className='hud';G=null;$('sMenu').className='ov on';};

function loop(){
  try{update();render()}catch(e){try{cx.fillStyle='#fff';cx.font='12px Arial';cx.fillText('err:'+e.message,10,20)}catch(e2){}}
  requestAnimationFrame(loop)
}
requestAnimationFrame(loop);

// ===== 触屏虚拟按钮 =====
(function(){
  var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!isTouch) return;
  var s = document.createElement('style');
  s.textContent = '#vk{position:fixed;inset:0;z-index:50;pointer-events:none;touch-action:none;display:none}#vk.on{display:block}@media(hover:none)and(pointer:coarse){#vk{display:block}}.vkb{position:absolute;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;color:#fff;font-weight:bold}#vkFire{position:absolute;right:20px;bottom:30px;width:72px;height:72px;border-radius:50%;background:rgba(255,107,53,0.35);border:3px solid rgba(255,107,53,0.6);font-size:28px;flex-direction:column;pointer-events:auto}.vkb:active{transform:scale(0.9)}#vkFire .lbl{font-size:10px;opacity:0.7;margin-top:2px}';
  document.head.appendChild(s);
  var vk = document.createElement('div'); vk.id = 'vk';
  vk.innerHTML = '<div class="vkb" id="vkFire">🔫<span class="lbl">射击</span></div>';
  document.body.appendChild(vk);
  vk.classList.add('on');

  // 射击按钮：按住持续射击（游戏自动处理射击逻辑）
  var fireBtn = document.getElementById('vkFire');
  function startFire(){ if(G) G.mouseDown = true; }
  function stopFire(){ if(G) G.mouseDown = false; }
  fireBtn.addEventListener('touchstart', function(e){
    e.preventDefault(); e.stopPropagation();
    startFire();
  });
  fireBtn.addEventListener('touchend', function(e){
    e.preventDefault(); e.stopPropagation();
    stopFire();
  });
  fireBtn.addEventListener('touchcancel', stopFire);
  // 鼠标支持
  fireBtn.addEventListener('mousedown', startFire);
  fireBtn.addEventListener('mouseup', stopFire);
  fireBtn.addEventListener('mouseleave', stopFire);
})();
})();
</script>
</body>
</html>
