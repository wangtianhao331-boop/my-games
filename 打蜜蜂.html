<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打蜜蜂</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#87CEEB;overflow:hidden;font-family:Arial,sans-serif;cursor:crosshair}
canvas{display:block;width:100%;height:100%}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.8);z-index:100}
.ov.on{display:flex;align-items:center;justify-content:center}
.pn{background:#1e1e3a;border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 28px;text-align:center;color:#fff;max-width:400px;width:90%}
.pn h1{font-size:28px;color:#ffd43b;margin-bottom:4px}
.pn p{color:#8899bb;font-size:13px;margin:6px 0}
.btn{display:inline-block;padding:10px 30px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;color:#fff;margin:4px}
.or{background:#ff6b35}.bl{background:#44b4ff}.gr{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15)}
#hud{position:fixed;top:8px;left:8px;right:8px;display:none;z-index:10;color:#fff;font-size:16px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
#hud.on{display:flex;justify-content:space-between}
#hud>div{background:rgba(0,0,0,0.4);padding:4px 14px;border-radius:8px;backdrop-filter:blur(4px)}
.pop{position:fixed;pointer-events:none;z-index:50;font-size:24px;font-weight:bold;color:#ffd43b;text-shadow:0 0 10px rgba(255,212,59,0.5);animation:popUp 0.6s ease-out forwards}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ov on" id="sMenu"><div class="pn">
<h1>&#128029; 打蜜蜂</h1><p>点击蜜蜂得分！小心黄蜂会蜇你！</p>
<button class="btn or" id="bStart">开始游戏</button>
<div style="margin-top:10px;font-size:12px;color:#8899bb">
&#128029; 普通蜜蜂 +1分 | &#128030; 大黄蜂 +3分 | ⭐ 黄金蜂 +5分
</div>
</div></div>
<div class="ov" id="sOver"><div class="pn">
<h1 style="color:#ff6b6b">时间到！</h1>
<p id="scoreInfo"></p>
<button class="btn or" id="bAgain">再来一次</button>
<button class="btn gr" id="bMenu">返回菜单</button>
</div></div>
<div id="hud"><div><span>&#128029; 分数: <b id="hScore">0</b></span></div><div><span>⏱️ <b id="hTime">60</b>s</span> <span>🔥 连击: <b id="hCombo">0</b></span></div></div>
<script>
var $=function(id){return document.getElementById(id)},ca=$('c'),cx=ca.getContext('2d'),W,H;
function sz(){W=ca.width=window.innerWidth;H=ca.height=window.innerHeight}
window.addEventListener('resize',sz);sz();
var G=null;
// 蜜蜂类型
var BEE_TYPES=[
  {e:'🐝',c:'#ffd43b',s:1,spd:1,size:26,hp:1},
  {e:'🐝',c:'#ff8c00',s:2,spd:1.5,size:28,hp:2},
  {e:'🐞',c:'#e74c3c',s:3,spd:1.8,size:24,hp:1},
  {e:'🦋',c:'#9b59b6',s:4,spd:2,size:30,hp:1},
  {e:'⭐',c:'#ffd700',s:5,spd:1.2,size:22,hp:1},
];
function init(){
  G={
    st:'p',fr:0,score:0,combo:0,maxCombo:0,
    bees:[],spawnT:0,spawnI:30,
    time:60,best:parseInt(localStorage.getItem('sbBest'))||0,
    hitFX:[],
  };
  $('hud').className='hud on';hideAll();$('hScore').textContent='0';$('hTime').textContent='60';$('hCombo').textContent='0';
}
function hideAll(){['sMenu','sOver'].forEach(function(id){$(id).classList.remove('on')})}
function update(){
  if(!G||G.st!=='p')return;
  var g=G;g.fr++;
  // 倒计时
  if(g.fr%60===0){g.time--;$('hTime').textContent=g.time;
    if(g.time<=0){g.st='d';showOver();return}}
  // 生成蜜蜂
  g.spawnT++;
  if(g.spawnT>=g.spawnI){
    g.spawnT=0;
    var typeIdx=Math.random()<0.1?4:(Math.random()<0.2?1:(Math.random()<0.3?2+Math.floor(Math.random()*2):0));
    var t=BEE_TYPES[typeIdx];
    var side=Math.floor(Math.random()*4);
    var x,y,vx,vy;
    if(side===0){x=-30;y=50+Math.random()*(H-100);vx=t.spd*(1+Math.random()*0.5);vy=(Math.random()-0.5)*t.spd}
    else if(side===1){x=W+30;y=50+Math.random()*(H-100);vx=-t.spd*(1+Math.random()*0.5);vy=(Math.random()-0.5)*t.spd}
    else if(side===2){x=50+Math.random()*(W-100);y=-30;vx=(Math.random()-0.5)*t.spd*1.5;vy=t.spd*(1+Math.random()*0.5)}
    else{x=50+Math.random()*(W-100);y=H+30;vx=(Math.random()-0.5)*t.spd*1.5;vy=-t.spd*(1+Math.random()*0.5)}
    g.bees.push({
      x:x,y:y,vx:vx,vy:vy,type:t,
      hp:t.hp,size:t.size,wobble:Math.random()*6.28,
      alive:true,timer:0,
    });
  }
  // 更新蜜蜂
  for(var i=g.bees.length-1;i>=0;i--){
    var b=g.bees[i];
    if(!b.alive){g.bees.splice(i,1);continue}
    b.timer++;
    b.wobble+=0.05;
    b.x+=b.vx+Math.sin(b.wobble)*0.5;
    b.y+=b.vy+Math.cos(b.wobble*0.7)*0.5;
    // 边界反弹
    if(b.x<-50||b.x>W+50||b.y<-50||b.y>H+50){
      // 从另一边出来
      if(b.x<-50)b.x=W+40;if(b.x>W+50)b.x=-40;
      if(b.y<-50)b.y=H+40;if(b.y>H+50)b.y=-40;
    }
  }
  // 特效
  for(var i=g.hitFX.length-1;i>=0;i--){
    g.hitFX[i].life--;if(g.hitFX[i].life<=0)g.hitFX.splice(i,1)
  }
  $('hScore').textContent=g.score;
  $('hCombo').textContent=g.combo;
}
function showOver(){
  hideAll();$('hud').className='hud';
  var g=G;
  if(g.score>g.best){g.best=g.score;localStorage.setItem('sbBest',g.score)}
  $('scoreInfo').innerHTML=
    '得分: <b style="color:#ffd43b">'+g.score+'</b><br>'+
    '最高连击: <b style="color:#44b4ff">'+g.maxCombo+'</b><br>'+
    '历史最高: <b style="color:#ff6b35">'+(g.best)+'</b>';
  $('sOver').className='ov on';
}
function render(){
  cx.clearRect(0,0,W,H);if(!G)return;
  var g=G;
  // 天空渐变
  var gr=cx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#87CEEB');gr.addColorStop(0.6,'#b8e6b8');gr.addColorStop(1,'#90be6d');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  // 云朵
  for(var i=0;i=5;i++){var cx2=((i*237+50)%W),cy=((i*157+20)%(H*0.4));
    cx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(g.fr*0.01+i)*0.1)+')';
    cx.beginPath();cx.ellipse(cx2,cy,60+Math.sin(i)*20,20+Math.cos(i)*8,0,0,Math.PI*2);cx.fill()
    cx.beginPath();cx.ellipse(cx2+30,cy-8,40+Math.sin(i+1)*15,18,0,0,Math.PI*2);cx.fill()
    cx.beginPath();cx.ellipse(cx2-25,cy+3,35+Math.cos(i)*12,15,0,0,Math.PI*2);cx.fill()
  }
  // 草地
  cx.fillStyle='#7ec850';
  cx.beginPath();cx.moveTo(0,H);cx.quadraticCurveTo(W*0.25,H-8,W*0.5,H-3);
  cx.quadraticCurveTo(W*0.75,H+4,W,H-5);cx.lineTo(W,H);cx.closePath();cx.fill();
  // 画蜜蜂
  for(var i=0;i<g.bees.length;i++){
    var b=g.bees[i];
    cx.save();cx.translate(b.x,b.y);
    // 被击中闪白
    if(b.hp<=0){
      cx.globalAlpha=0.5;
      cx.fillStyle='#fff';cx.beginPath();cx.arc(0,0,b.size*0.8,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }
    cx.font=b.size+'px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(b.type.e,0,0);
    // 蜜蜂翅膀扇动
    if(b.type.e==='🐝'){
      cx.fillStyle='rgba(255,255,255,0.3)';
      var wf=Math.sin(b.timer*0.3)*5;
      cx.beginPath();cx.ellipse(-8,-6-wf,6,3,0.3,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.ellipse(8,-6-wf,6,3,-0.3,0,Math.PI*2);cx.fill();
    }
    // 血量条(大黄蜂)
    if(b.type.hp>1&&b.hp>0){
      cx.fillStyle='#333';cx.fillRect(-12,-b.size/2-8,24,3);
      cx.fillStyle='#e74c3c';cx.fillRect(-12,-b.size/2-8,24*(b.hp/b.type.hp),3);
    }
    cx.restore();
  }
  // 点击特效
  for(var i=0;i<g.hitFX.length;i++){
    var fx=g.hitFX[i],a=fx.life/12;
    cx.globalAlpha=a;
    cx.fillStyle=fx.c;cx.strokeStyle='#fff';cx.lineWidth=2;
    cx.beginPath();cx.arc(fx.x,fx.y,fx.r*(1-a),0,Math.PI*2);cx.fill();cx.stroke();
    cx.globalAlpha=1;
  }
  // 草地
  for(var gs=0;gs<12;gs++){var gx=gs/12*W,gh=5+Math.sin(gs*2+g.fr*0.02)*3;
    cx.fillStyle='#6ab040';cx.fillRect(gx,H-gh,12,gh)}
}
// 点击打蜜蜂
ca.addEventListener('click',function(e){
  if(!G||G.st!=='p')return;
  var rect=ca.getBoundingClientRect();
  var mx=(e.clientX-rect.left)/rect.width*W,my=(e.clientY-rect.top)/rect.height*H;
  var hit=false;
  for(var i=G.bees.length-1;i>=0;i--){
    var b=G.bees[i];
    var dx=mx-b.x,dy=my-b.y;
    if(dx*dx+dy*dy<b.size*b.size){
      b.hp--;
      if(b.hp<=0){
        b.alive=false;
        var pts=Math.floor(b.type.s*(1+G.combo*0.1));
        G.score+=pts;
        G.combo++;
        if(G.combo>G.maxCombo)G.maxCombo=G.combo;
        // 加分弹出
        showPop(mx,my,'+'+pts);
        // 特效
        G.hitFX.push({x:mx,y:my,r:b.size,c:b.type.c,life:12});
        hit=true;
      }
      break;
    }
  }
  if(!hit){G.combo=0}
});
function showPop(x,y,text){
  var el=document.createElement('div');el.className='pop';
  el.textContent=text;
  el.style.left=x+'px';el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},600);
}
// 按钮
$('bStart').onclick=function(){init()};
$('bAgain').onclick=function(){init()};
$('bMenu').onclick=function(){hideAll();$('hud').className='hud';G=null;$('sMenu').className='ov on'};
function loop(){try{update();render()}catch(e){try{cx.fillStyle='#fff';cx.font='12px Arial';cx.fillText('ERR:'+e.message,10,30)}catch(e2){}}requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
</body>
</html>
