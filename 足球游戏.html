<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ 足球游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a1a;font-family:Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}

/* ---- 覆盖面板 ---- */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center}
.ov.on{display:flex}
.pn{background:#1e1e3a;border:2px solid #ffd43b;border-radius:16px;padding:24px 28px;text-align:center;color:#fff;max-width:420px;width:90%}
.pn h1{font-size:28px;color:#ffd43b;margin-bottom:6px}
.pn p{color:#8899bb;font-size:13px;margin-bottom:8px;line-height:1.6}
.pn .btn{display:inline-block;padding:10px 32px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff;margin:4px;background:#ff6b35}
.pn .btn:hover{transform:scale(1.05)}
.pn .btn.bl{background:#44b4ff}
.pn .score-big{font-size:52px;color:#ffd43b;font-weight:bold;margin:10px 0}

/* ---- HUD ---- */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:rgba(0,0,0,0.5);color:#fff;font-size:14px;pointer-events:none}
#hud .score{font-size:20px;font-weight:bold;color:#ffd43b}
#hud .timer{font-size:16px;color:#88ddff}
#hud .info{font-size:12px;color:#8899bb}

/* ---- 虚拟按键 ---- */
#vkBtns{position:fixed;bottom:0;left:0;right:0;z-index:50;height:200px;pointer-events:none;display:none}
#vkBtns.on{display:block}
@media(hover:none)and(pointer:coarse){#vkBtns.on{display:block}}

/* 左侧摇杆 */
#joyArea{position:absolute;left:15px;bottom:30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);pointer-events:auto;touch-action:none}
#joyKnob{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(68,180,255,0.4);border:2px solid rgba(68,180,255,0.7);top:40px;left:40px;pointer-events:none;transition:none}
#joyKnob:active{transform:scale(0.9)}

/* 右侧按钮 */
#rightBtns{position:absolute;right:12px;bottom:20px;display:flex;gap:8px;flex-direction:column;align-items:flex-end;pointer-events:auto}
.rbtn{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:18px;color:#fff;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform 0.1s;border:2px solid rgba(255,255,255,0.3)}
.rbtn:active{transform:scale(0.9)}
.rbtn-drib{background:rgba(68,180,255,0.35);border-color:rgba(68,180,255,0.6)}
.rbtn-drib.active{background:rgba(68,180,255,0.7);border-color:#44b4ff;box-shadow:0 0 20px rgba(68,180,255,0.5)}
.rbtn-pass{background:rgba(255,212,59,0.35);border-color:rgba(255,212,59,0.6)}
.rbtn-pass.active{background:rgba(255,212,59,0.7);border-color:#ffd43b;box-shadow:0 0 20px rgba(255,212,59,0.5)}
.rbtn-shoot{background:rgba(255,107,53,0.35);border-color:rgba(255,107,53,0.6)}
.rbtn-shoot.active{background:rgba(255,107,53,0.7);border-color:#ff6b35;box-shadow:0 0 20px rgba(255,107,53,0.5)}
.rbtn .lbl{font-size:9px;opacity:0.7;margin-top:1px}
.rbtn-small{width:48px;height:48px;font-size:16px}

/* 按键行 */
.btn-row{display:flex;gap:6px;justify-content:flex-end}

/* 传球/射门指示圈 */
#aimCircle{position:fixed;z-index:40;display:none;width:80px;height:80px;border-radius:50%;pointer-events:none}
#aimCircle.on{display:block}
#aimCircle.pass{border:2px dashed #ffd43b;background:rgba(255,212,59,0.08)}
#aimCircle.shoot{border:2px solid #ff6b35;background:rgba(255,107,53,0.08)}

/* 力度条 */
#powerBarWrap{position:fixed;left:50%;transform:translateX(-50%);bottom:220px;z-index:40;width:160px;height:12px;background:rgba(0,0,0,0.5);border-radius:6px;border:1px solid rgba(255,255,255,0.2);display:none;overflow:hidden}
#powerBarWrap.on{display:block}
#powerBar{height:100%;width:0%;border-radius:6px;background:linear-gradient(90deg,#44ff44,#ffd43b,#ff4444);transition:width 0.05s}

/* 暂停按钮 */
#pauseBtn{position:fixed;top:42px;right:8px;z-index:30;width:36px;height:36px;border-radius:8px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div><span class="info" id="hTeam">🇨🇳 中国</span> <span class="score" id="hMyScore">0</span></div>
  <div class="timer" id="hTimer">90:00</div>
  <div><span class="score" id="hAiScore">0</span> <span class="info">🏴󠁧󠁢󠁥󠁮󠁧󠁿 对手</span></div>
</div>

<!-- 暂停 -->
<div id="pauseBtn" onclick="togglePause()">⏸</div>

<!-- 力度条 -->
<div id="powerBarWrap"><div id="powerBar"></div></div>

<!-- 瞄准圈 -->
<div id="aimCircle"></div>

<!-- 虚拟按键 -->
<div id="vkBtns">
  <div id="joyArea">
    <div id="joyKnob">⚽</div>
  </div>
  <div id="rightBtns">
    <div class="btn-row">
      <div class="rbtn rbtn-drib" id="btnDribble">🏃<span class="lbl">带球</span></div>
      <div class="rbtn rbtn-pass" id="btnPass">⚡<span class="lbl">传球</span></div>
      <div class="rbtn rbtn-shoot" id="btnShoot">🎯<span class="lbl">射门</span></div>
    </div>
    <div class="btn-row">
      <div class="rbtn rbtn-small" id="btnSwitch" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)">🔀<span class="lbl">切换</span></div>
      <div class="rbtn rbtn-small" id="btnSprint" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15)">💨<span class="lbl">加速</span></div>
    </div>
  </div>
</div>

<!-- 开始界面 -->
<div class="ov on" id="sMenu">
  <div class="pn">
    <h1>⚽ 足球游戏</h1>
    <p>5v5 街头足球<br>🟦 带球 🟨 传球（方向指示） 🟧 射门（力度+角度）</p>
    <p style="font-size:12px;color:#667">触屏/鼠标移动球员 · 拖动摇杆控制方向</p>
    <button class="btn" onclick="startGame()">▶ 开始比赛</button>
  </div>
</div>

<!-- 进球 -->
<div class="ov" id="sGoal">
  <div class="pn">
    <h1 id="goalText">⚽ 进球！</h1>
    <div class="score-big" id="goalScore">1 - 0</div>
    <p id="goalScorer"></p>
    <button class="btn" onclick="resumeAfterGoal()">继续</button>
  </div>
</div>

<!-- 半场/结束 -->
<div class="ov" id="sHalf">
  <div class="pn">
    <h1 id="halfTitle">⏸ 中场休息</h1>
    <div class="score-big" id="halfScore">0 - 0</div>
    <p id="halfInfo"></p>
    <button class="btn bl" id="halfBtn" onclick="nextHalf()">下半场</button>
  </div>
</div>

<script>
// ============================================================
//  ⚽ 足球游戏 - 完整游戏逻辑
// ============================================================

// ---- Canvas ----
var ca = document.getElementById('c'), cx = ca.getContext('2d');
var W, H;
function resize(){
  W = ca.width = window.innerWidth;
  H = ca.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---- 游戏常量 ----
var FIELD_W = 800, FIELD_H = 500;
var GOAL_W = 80, GOAL_H = 12;  // 球门宽度和厚度
var BALL_R = 8;
var PLAYER_R = 16;
var GOAL_DEPTH = 30;  // 球门纵深

// ---- 游戏状态 ----
var G = null;
var K = {};
var gameRunning = false;
var paused = false;

// ---- 音效（简易） ----
function playBeep(freq, dur, vol){
  try{
    var ac = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ac.createOscillator();
    var g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value = freq;
    g.gain.value = vol || 0.1;
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (dur || 0.1));
    osc.start(); osc.stop(ac.currentTime + (dur || 0.1));
  }catch(e){}
}

// ---- 辅助函数 ----
function dist(a, b){
  return Math.hypot(a.x - b.x, a.y - b.y);
}
function rand(min, max){
  return Math.random() * (max - min) + min;
}
function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}
function angleBetween(a, b){
  return Math.atan2(b.y - a.y, b.x - a.x);
}

// ---- 键盘 ----
document.addEventListener('keydown', function(e){
  K[e.key] = true;
  if(e.key === ' ') e.preventDefault();
  // 数字快捷键
  if(e.key === '1') tryShoot();
  if(e.key === '2') tryPass();
  if(e.key === '3') { G && (G.dribbling = !G.dribbling); }
});
document.addEventListener('keyup', function(e){
  K[e.key] = false;
});

// ---- 游戏初始化 ----
function startGame(){
  document.getElementById('sMenu').classList.remove('on');
  document.getElementById('vkBtns').classList.add('on');
  initMatch();
}

function initMatch(){
  G = {
    half: 1,
    time: 90 * 60,  // 90分钟 * 60帧/秒
    timer: 90 * 60,
    myScore: 0,
    aiScore: 0,
    state: 'playing',  // playing | goal | halftime | end
    goalTimer: 0,

    // 球
    ball: { x: FIELD_W/2, y: FIELD_H/2, vx: 0, vy: 0, r: BALL_R, owner: null },

    // 玩家控制的球员索引
    myPlayerIdx: 0,

    // 我方球员
    myTeam: [],

    // AI 对手
    aiTeam: [],

    // 按键状态
    dribbling: false,
    sprinting: false,

    // 传球/射门瞄准
    aimMode: null,    // 'pass' | 'shoot' | null
    aimAngle: 0,
    aimPower: 0,
    aimStartTime: 0,
    aimTouchId: null,

    // 摇杆
    joyX: 0, joyY: 0,

    // 粒子特效
    particles: [],
  };

  // 创建我方球员 (浅蓝)
  var myPositions = [
    { x: 150, y: FIELD_H/2 },         // 前锋 (玩家控制)
    { x: 100, y: FIELD_H/2 - 80 },    // 左边锋
    { x: 100, y: FIELD_H/2 + 80 },    // 右边锋
    { x: 50, y: FIELD_H/2 - 60 },     // 后卫
    { x: 50, y: FIELD_H/2 + 60 },     // 后卫
  ];
  for(var i = 0; i < 5; i++){
    G.myTeam.push(createPlayer(myPositions[i].x, myPositions[i].y, '#44b4ff', '#2a7acc', true, i));
  }

  // 创建AI对手 (红色)
  var aiPositions = [
    { x: FIELD_W - 150, y: FIELD_H/2 },
    { x: FIELD_W - 100, y: FIELD_H/2 - 80 },
    { x: FIELD_W - 100, y: FIELD_H/2 + 80 },
    { x: FIELD_W - 50, y: FIELD_H/2 - 60 },
    { x: FIELD_W - 50, y: FIELD_H/2 + 60 },
  ];
  for(var i = 0; i < 5; i++){
    G.aiTeam.push(createPlayer(aiPositions[i].x, aiPositions[i].y, '#ff6b6b', '#cc4444', false, i));
  }

  // 随机开球
  G.ball.x = FIELD_W/2;
  G.ball.y = FIELD_H/2;
  G.ball.vx = rand(-2, 2);
  G.ball.vy = rand(-2, 2);

  updateHUD();
}

function createPlayer(x, y, color, dark, isHuman, idx){
  return {
    x: x, y: y,
    vx: 0, vy: 0,
    r: PLAYER_R,
    color: color,
    dark: dark,
    isHuman: isHuman,
    idx: idx,
    speed: isHuman ? 2.8 : 2.2,
    sprintSpeed: 4.0,
    team: isHuman ? 'my' : 'ai',
    hasBall: false,
    // AI
    aiState: 'idle',
    aiTarget: null,
    aiTimer: 0,
    name: isHuman ? ['🏃‍♂️','⚡','🛡️','🛡️','🛡️'][idx] : ['🔥','💨','💪','💪','💪'][idx],
    // 动画
    animFrame: 0,
    kickTimer: 0,
  };
}

// 找到离球最近的球员
function nearestPlayer(team, x, y){
  var best = null, bestD = Infinity;
  var arr = team === 'my' ? G.myTeam : G.aiTeam;
  for(var i = 0; i < arr.length; i++){
    var d = dist(arr[i], {x: x||G.ball.x, y: y||G.ball.y});
    if(d < bestD){ bestD = d; best = arr[i]; }
  }
  return best;
}

// ---- 更新游戏 ----
function update(){
  if(!G || G.state === 'goal' || G.state === 'halftime' || G.state === 'end' || paused) return;

  var g = G;
  g.timer--;
  if(g.timer % 60 === 0) updateHUD();

  // 时间到
  if(g.timer <= 0){
    if(g.half === 1){
      g.state = 'halftime';
      showHalfTime();
      return;
    } else {
      g.state = 'end';
      showEnd();
      return;
    }
  }

  // 更新摇杆
  updateJoystick();

  // 更新球员
  updateMyTeam();
  updateAITeam();

  // 更新球
  updateBall();

  // 更新粒子
  for(var i = g.particles.length - 1; i >= 0; i--){
    var p = g.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if(p.life <= 0) g.particles.splice(i, 1);
  }

  // 检查进球
  checkGoal();
}

// ---- 摇杆 ----
function updateJoystick(){
  if(!G) return;
  var p = G.myTeam[G.myPlayerIdx];
  if(!p) return;

  var jx = G.joyX, jy = G.joyY;
  var len = Math.hypot(jx, jy);

  if(len > 0.15){
    var speed = G.sprinting ? p.sprintSpeed : p.speed;
    var moveX = (jx / 50) * speed;
    var moveY = (jy / 50) * speed;

    p.x += moveX;
    p.y += moveY;

    // 边界
    p.x = clamp(p.x, p.r + 10, FIELD_W - p.r - 10);
    p.y = clamp(p.y, p.r + 10, FIELD_H - p.r - 10);
    p.animFrame++;
  }
}

// ---- 我方AI（队友自动跑位）----
function updateMyTeam(){
  var g = G;
  for(var i = 0; i < g.myTeam.length; i++){
    var p = g.myTeam[i];
    if(p.kickTimer > 0) p.kickTimer--;

    if(i === g.myPlayerIdx){
      // 玩家控制的球员 - 由摇杆控制
      // 带球逻辑
      if(g.dribbling && dist(p, g.ball) < 40){
        g.ball.x = p.x + 14;
        g.ball.y = p.y - 4;
        g.ball.vx *= 0.8;
        g.ball.vy *= 0.8;
        p.hasBall = true;
      } else {
        p.hasBall = false;
        // 自动靠近球
        if(dist(p, g.ball) > 60 && !g.dribbling && g.ball.owner === null){
          var autoSpeed = 1.5;
          var angle = angleBetween(p, g.ball);
          if(dist(p, g.ball) > 100 && Math.abs(g.joyX) < 0.1 && Math.abs(g.joyY) < 0.1){
            p.x += Math.cos(angle) * autoSpeed;
            p.y += Math.sin(angle) * autoSpeed;
          }
        }
      }
    } else {
      // AI队友：自动跑位
      aiTeammate(p, i);
    }
  }
}

function aiTeammate(p, idx){
  var g = G;
  // 不同位置的球员不同的目标区域
  var targets = [
    { x: g.ball.x * 0.3 + 80, y: g.ball.y * 0.3 + FIELD_H * 0.35 },
    { x: g.ball.x * 0.2 + 40, y: clamp(g.ball.y - 80, 30, FIELD_H - 30) },
    { x: g.ball.x * 0.2 + 40, y: clamp(g.ball.y + 80, 30, FIELD_H - 30) },
    { x: 60, y: FIELD_H * 0.3 },
    { x: 60, y: FIELD_H * 0.7 },
  ];

  // 我方控球时，向前跑位
  var myHasBall = g.myTeam[g.myPlayerIdx].hasBall || g.dribbling;
  var target = targets[Math.min(idx, targets.length - 1)];

  // 如果我方有球，往前压
  if(myHasBall){
    target.x += 30;
  }

  // 如果我方没球，往后撤
  var ballNearAi = nearestPlayer('ai') && dist(nearestPlayer('ai'), g.ball) < 80;
  if(ballNearAi) target.x -= 40;

  // 移动向目标
  var angle = angleBetween(p, target);
  var spd = 1.8;
  p.x += Math.cos(angle) * spd;
  p.y += Math.sin(angle) * spd;
  p.x = clamp(p.x, p.r + 10, FIELD_W - p.r - 10);
  p.y = clamp(p.y, p.r + 10, FIELD_H - p.r - 10);

  // 如果球在附近且无人控制，去抢球
  if(!g.dribbling && dist(p, g.ball) < 120 && g.ball.owner === null && !myHasBall){
    var chaseAngle = angleBetween(p, g.ball);
    p.x += Math.cos(chaseAngle) * 2.0;
    p.y += Math.sin(chaseAngle) * 2.0;
  }
}

// ---- AI对手 ----
function updateAITeam(){
  var g = G;
  for(var i = 0; i < g.aiTeam.length; i++){
    var p = g.aiTeam[i];
    if(p.kickTimer > 0) p.kickTimer--;

    // 谁离球最近谁就去追球
    var nearest = nearestPlayer('ai');
    var isNearest = (p === nearest);

    if(isNearest && dist(p, g.ball) < 250){
      // 追球
      var angle = angleBetween(p, g.ball);
      p.x += Math.cos(angle) * p.speed * 1.1;
      p.y += Math.sin(angle) * p.speed * 1.1;

      // 碰到球 - 带球
      if(dist(p, g.ball) < 30){
        g.ball.x = p.x - 14;
        g.ball.y = p.y - 4;
        g.ball.vx *= 0.8;
        g.ball.vy *= 0.8;
        p.hasBall = true;
      } else {
        p.hasBall = false;
      }

      // AI射门
      if(p.hasBall && p.x > FIELD_W * 0.5 && Math.random() < 0.01){
        aiShoot(p);
      }
      // AI传球
      if(p.hasBall && Math.random() < 0.008){
        aiPass(p);
      }
    } else {
      // 跑回防守位置
      var targets = [
        { x: FIELD_W - 80, y: FIELD_H * 0.5 },
        { x: FIELD_W - 50, y: FIELD_H * 0.3 },
        { x: FIELD_W - 50, y: FIELD_H * 0.7 },
        { x: FIELD_W - 30, y: FIELD_H * 0.25 },
        { x: FIELD_W - 30, y: FIELD_H * 0.75 },
      ];
      var t = targets[Math.min(i, targets.length - 1)];
      var angle = angleBetween(p, t);
      p.x += Math.cos(angle) * 1.2;
      p.y += Math.sin(angle) * 1.2;
      p.hasBall = false;
    }

    p.x = clamp(p.x, p.r + 10, FIELD_W - p.r - 10);
    p.y = clamp(p.y, p.r + 10, FIELD_H - p.r - 10);
  }
}

function aiShoot(p){
  var angle = angleBetween(p, {x: FIELD_W + 50, y: FIELD_H/2 + rand(-60, 60)});
  var power = 6 + Math.random() * 4;
  G.ball.vx = Math.cos(angle) * power;
  G.ball.vy = Math.sin(angle) * power;
  p.hasBall = false;
  p.kickTimer = 20;
  addParticles(p.x, p.y, '#ffd43b', 8);
  playBeep(600, 0.08, 0.05);
}

function aiPass(p){
  var target = G.aiTeam[Math.floor(Math.random() * G.aiTeam.length)];
  if(target === p) target = G.aiTeam[0];
  var angle = angleBetween(p, target);
  var power = 4 + Math.random() * 2;
  G.ball.vx = Math.cos(angle) * power;
  G.ball.vy = Math.sin(angle) * power;
  p.hasBall = false;
  p.kickTimer = 15;
  addParticles(p.x, p.y, '#ffd43b', 5);
  playBeep(500, 0.06, 0.03);
}

// ---- 更新球 ----
function updateBall(){
  var b = G.ball;

  // 摩擦
  b.vx *= 0.985;
  b.vy *= 0.985;

  b.x += b.vx;
  b.y += b.vy;

  // 边界反弹
  if(b.x - b.r < 0){ b.x = b.r; b.vx *= -0.7; }
  if(b.x + b.r > FIELD_W){ b.x = FIELD_W - b.r; b.vx *= -0.7; }
  if(b.y - b.r < 0){ b.y = b.r; b.vy *= -0.7; }
  if(b.y + b.r > FIELD_H){ b.y = FIELD_H - b.r; b.vy *= -0.7; }

  // 球速太慢就停
  if(Math.abs(b.vx) < 0.05 && Math.abs(b.vy) < 0.05){
    b.vx = 0;
    b.vy = 0;
  }

  // 检查谁控制球
  b.owner = null;
  for(var i = 0; i < G.myTeam.length; i++){
    if(dist(G.myTeam[i], b) < 25 && G.myTeam[i].hasBall){
      b.owner = 'my';
      break;
    }
  }
  if(!b.owner){
    for(var i = 0; i < G.aiTeam.length; i++){
      if(dist(G.aiTeam[i], b) < 25 && G.aiTeam[i].hasBall){
        b.owner = 'ai';
        break;
      }
    }
  }
}

// ---- 检测进球 ----
function checkGoal(){
  var b = G.ball;
  // 我方球门 (左侧)
  if(b.x < -10 && b.y > FIELD_H/2 - GOAL_W/2 && b.y < FIELD_H/2 + GOAL_W/2){
    G.aiScore++;
    onGoal('对手', '#ff6b6b');
    return;
  }
  // 对方球门 (右侧)
  if(b.x > FIELD_W + 10 && b.y > FIELD_H/2 - GOAL_W/2 && b.y < FIELD_H/2 + GOAL_W/2){
    G.myScore++;
    onGoal('中国队', '#44b4ff');
    return;
  }
}

function onGoal(team, color){
  G.state = 'goal';
  G.goalTimer = 90;
  updateHUD();
  document.getElementById('goalText').textContent = '⚽ ' + team + ' 进球！';
  document.getElementById('goalScore').textContent = G.myScore + ' - ' + G.aiScore;
  document.getElementById('goalScorer').textContent = '⚡ 精彩的进球！';
  document.getElementById('sGoal').classList.add('on');
  // 粒子特效
  for(var i = 0; i < 30; i++){
    G.particles.push({
      x: FIELD_W/2 + rand(-50, 50),
      y: FIELD_H/2 + rand(-50, 50),
      vx: rand(-4, 4),
      vy: rand(-4, 4),
      life: 40 + rand(0, 20),
      color: color,
    });
  }
  playBeep(800, 0.3, 0.1);
  setTimeout(function(){ playBeep(1000, 0.2, 0.08); }, 200);
}

function resumeAfterGoal(){
  document.getElementById('sGoal').classList.remove('on');
  G.state = 'playing';
  // 中圈开球
  G.ball.x = FIELD_W/2;
  G.ball.y = FIELD_H/2;
  G.ball.vx = rand(-2, 2);
  G.ball.vy = rand(-2, 2);

  resetPositions();
}

function resetPositions(){
  var myPos = [
    { x: 150, y: FIELD_H/2 },
    { x: 100, y: FIELD_H/2 - 80 },
    { x: 100, y: FIELD_H/2 + 80 },
    { x: 50, y: FIELD_H/2 - 60 },
    { x: 50, y: FIELD_H/2 + 60 },
  ];
  for(var i = 0; i < G.myTeam.length; i++){
    G.myTeam[i].x = myPos[i].x;
    G.myTeam[i].y = myPos[i].y;

    { x: FIELD_W - 100, y: FIELD_H/2 - 80 },
    { x: FIELD_W - 100, y: FIELD_H/2 + 80 },
    { x: FIELD_W - 50, y: FIELD_H/2 - 60 },
    { x: FIELD_W - 50, y: FIELD_H/2 + 60 },

function tryPass(){
  if(!G || G.state !== 'playing') return;
  if(G.aimMode) return;
  G.aimMode = 'pass';
  G.aimPower = 0;
  G.aimAngle = 0;
  G.aimStartTime = Date.now();
}

function tryShoot(){
  if(!G || G.state !== 'playing') return;
  if(G.aimMode) return;
  G.aimMode = 'shoot';
  G.aimPower = 0;
  G.aimAngle = 0;
  G.aimStartTime = Date.now();
}

function executePass(){
  if(!G || G.aimMode !== 'pass') return;
  var p = G.myTeam[G.myPlayerIdx];
  if(!p) return;

  var angle = G.aimAngle;
  var power = Math.max(3, G.aimPower * 0.08);

  G.ball.vx = Math.cos(angle) * power;
  G.ball.vy = Math.sin(angle) * power;
  p.hasBall = false;
  p.kickTimer = 15;
  G.aimMode = null;

  addParticles(p.x, p.y, '#ffd43b', 6);
  playBeep(500, 0.08, 0.04);
  hideAimUI();
}

function executeShoot(){
  if(!G || G.aimMode !== 'shoot') return;
  var p = G.myTeam[G.myPlayerIdx];
  if(!p) return;

  var angle = G.aimAngle;
  var power = Math.max(5, G.aimPower * 0.1);

  // 射门力量上限更高
  power = Math.min(power, 14);

  G.ball.vx = Math.cos(angle) * power;
  G.ball.vy = Math.sin(angle) * power;
  p.hasBall = false;
  p.kickTimer = 20;
  G.aimMode = null;

  addParticles(p.x, p.y, '#ff6b35', 12);
  playBeep(800, 0.15, 0.08);
  hideAimUI();
}

function cancelAim(){
  G.aimMode = null;
  hideAimUI();
}

function hideAimUI(){
  document.getElementById('aimCircle').classList.remove('on');
  document.getElementById('powerBarWrap').classList.remove('on');
}

// ---- 切换球员 ----
function switchPlayer(){
  if(!G || G.state !== 'playing') return;
  // 找离球最近的队友
  var nearest = null, nearD = Infinity;
  for(var i = 0; i < G.myTeam.length; i++){
    if(i === G.myPlayerIdx) continue;
    var d = dist(G.myTeam[i], G.ball);
    if(d < nearD){ nearD = d; nearest = i; }
  }
  if(nearest !== null){
    G.myPlayerIdx = nearest;
    playBeep(400, 0.05, 0.02);
  }
}

// ---- 摇杆 ----
var joyEl = document.getElementById('joyArea');
var knobEl = document.getElementById('joyKnob');
var joyTouchId = null;

joyEl.addEventListener('touchstart', function(e){
  e.preventDefault();
  var t = e.changedTouches[0];
  joyTouchId = t.identifier;
  updateJoyPos(t);
});

joyEl.addEventListener('touchmove', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === joyTouchId){
      updateJoyPos(t);
    }
  }
});

joyEl.addEventListener('touchend', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === joyTouchId){
      joyTouchId = null;
      G.joyX = 0;
      G.joyY = 0;
      knobEl.style.top = '40px';
      knobEl.style.left = '40px';
    }
  }
});

joyEl.addEventListener('touchcancel', function(){
  joyTouchId = null;
  G.joyX = 0;
  G.joyY = 0;
  knobEl.style.top = '40px';
  knobEl.style.left = '40px';
});

function updateJoyPos(t){
  var rect = joyEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var dx = t.clientX - cx;
  var dy = t.clientY - cy;
  var maxR = rect.width / 2 - 10;
  var len = Math.hypot(dx, dy);
  if(len > maxR){
    dx = dx / len * maxR;
    dy = dy / len * maxR;
    len = maxR;
  }
  G.joyX = dx;
  G.joyY = dy;
  knobEl.style.left = (40 + dx) + 'px';
  knobEl.style.top = (40 + dy) + 'px';
}

// ---- 更新瞄准 ----
function updateAim(clientX, clientY){
  if(!G || !G.aimMode) return;
  var p = G.myTeam[G.myPlayerIdx];
  if(!p) return;

  // 映射到球场坐标
  var scaleX = FIELD_W / W;
  var scaleY = FIELD_H / H;
  var fieldX = clientX * scaleX;
  var fieldY = clientY * scaleY;

  // 瞄准角度
  var angle = angleBetween(p, {x: fieldX, y: fieldY});
  G.aimAngle = angle;

  // 瞄准力度（根据距离）
  var d = dist(p, {x: fieldX, y: fieldY});
  d = clamp(d, 0, 400);
  G.aimPower = d;

  // 更新UI
  var powerPct = Math.min(100, d / 400 * 100);
  document.getElementById('powerBar').style.width = powerPct + '%';

  // 瞄准圈位置（屏幕坐标）
  var aimEl = document.getElementById('aimCircle');
  var screenX = fieldX / scaleX;
  var screenY = fieldY / scaleY;
  aimEl.style.left = (screenX - 40) + 'px';
  aimEl.style.top = (screenY - 40) + 'px';
  // 圈大小随力度变化
  var size = 50 + powerPct * 0.8;
  aimEl.style.width = size + 'px';
  aimEl.style.height = size + 'px';
}

// ============================================================
//  渲染
// ============================================================
function render(){
  cx.clearRect(0, 0, W, H);

  if(!G) return;

  // 计算偏移使球场居中
  var scale = Math.min(W / FIELD_W, H / FIELD_H) * 0.9;
  var offX = (W - FIELD_W * scale) / 2;
  var offY = (H - FIELD_H * scale) / 2;

  cx.save();
  cx.translate(offX, offY);
  cx.scale(scale, scale);

  // ---- 球场 ----
  // 草地
  var grassGrad = cx.createLinearGradient(0, 0, FIELD_W, FIELD_H);
  grassGrad.addColorStop(0, '#2d8a4e');
  grassGrad.addColorStop(0.5, '#3a9a5a');
  grassGrad.addColorStop(1, '#2d8a4e');
  cx.fillStyle = grassGrad;
  cx.fillRect(0, 0, FIELD_W, FIELD_H);

  // 草纹
  cx.strokeStyle = 'rgba(255,255,255,0.03)';
  cx.lineWidth = 1;
  for(var i = 0; i < 20; i++){
    var lx = (i * 42 + 7) % FIELD_W;
    cx.beginPath();
    cx.moveTo(lx, 0);
    cx.lineTo(lx + 10, FIELD_H);
    cx.stroke();
  }

  // 边线
  cx.strokeStyle = 'rgba(255,255,255,0.3)';
  cx.lineWidth = 2;
  cx.strokeRect(2, 2, FIELD_W - 4, FIELD_H - 4);

  // 中线
  cx.beginPath();
  cx.moveTo(FIELD_W/2, 2);
  cx.lineTo(FIELD_W/2, FIELD_H - 2);
  cx.stroke();

  // 中圈
  cx.beginPath();
  cx.arc(FIELD_W/2, FIELD_H/2, 50, 0, Math.PI * 2);
  cx.stroke();

  // 禁区（我方）
  cx.strokeRect(0, FIELD_H/2 - 100, 60, 200);
  // 禁区（对方）
  cx.strokeRect(FIELD_W - 60, FIELD_H/2 - 100, 60, 200);

  // 球门（我方 - 左侧）
  cx.fillStyle = 'rgba(255,255,255,0.15)';
  cx.fillRect(-5, FIELD_H/2 - GOAL_W/2, 5, GOAL_W);
  cx.strokeStyle = '#fff';
  cx.lineWidth = 3;
  cx.strokeRect(-5, FIELD_H/2 - GOAL_W/2, 5, GOAL_W);
  // 球网
  cx.strokeStyle = 'rgba(255,255,255,0.1)';
  cx.lineWidth = 0.5;
  for(var gi = 0; gi < GOAL_W; gi += 8){
    cx.beginPath();
    cx.moveTo(-5, FIELD_H/2 - GOAL_W/2 + gi);
    cx.lineTo(0, FIELD_H/2 - GOAL_W/2 + gi);
    cx.stroke();
  }

  // 球门（对方 - 右侧）
  cx.fillStyle = 'rgba(255,255,255,0.15)';
  cx.fillRect(FIELD_W, FIELD_H/2 - GOAL_W/2, 5, GOAL_W);
  cx.strokeStyle = '#fff';
  cx.lineWidth = 3;
  cx.strokeRect(FIELD_W, FIELD_H/2 - GOAL_W/2, 5, GOAL_W);
  cx.strokeStyle = 'rgba(255,255,255,0.1)';
  cx.lineWidth = 0.5;
  for(var gi = 0; gi < GOAL_W; gi += 8){
    cx.beginPath();
    cx.moveTo(FIELD_W, FIELD_H/2 - GOAL_W/2 + gi);
    cx.lineTo(FIELD_W + 5, FIELD_H/2 - GOAL_W/2 + gi);
    cx.stroke();
  }

  // ---- 粒子 ----
  for(var i = 0; i < G.particles.length; i++){
    var p = G.particles[i];
    cx.globalAlpha = Math.min(1, p.life / 10);
    cx.fillStyle = p.color;
    cx.beginPath();
    cx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    cx.fill();
  }
  cx.globalAlpha = 1;

  // ---- AI球员 ----
  for(var i = 0; i < G.aiTeam.length; i++){
    drawPlayer(G.aiTeam[i], false);
  }

  // ---- 我方球员 ----
  for(var i = 0; i < G.myTeam.length; i++){
    drawPlayer(G.myTeam[i], i === G.myPlayerIdx);
  }

  // ---- 球 ----
  var b = G.ball;
  // 阴影
  cx.fillStyle = 'rgba(0,0,0,0.2)';
  cx.beginPath();
  cx.arc(b.x + 2, b.y + 2, b.r, 0, Math.PI * 2);
  cx.fill();
  // 球体
  var ballGrad = cx.createRadialGradient(b.x - 3, b.y - 3, 0, b.x, b.y, b.r);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.5, '#e8e8e8');
  ballGrad.addColorStop(1, '#aaa');
  cx.fillStyle = ballGrad;
  cx.shadowColor = 'rgba(255,255,255,0.2)';
  cx.shadowBlur = 8;
  cx.beginPath();
  cx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  cx.fill();
  cx.shadowBlur = 0;
  // 五边形花纹
  cx.strokeStyle = 'rgba(0,0,0,0.15)';
  cx.lineWidth = 0.8;
  for(var pi = 0; pi < 5; pi++){
    var a = pi * 1.256 + b.x * 0.01;
    cx.beginPath();
    cx.moveTo(b.x + Math.cos(a) * b.r * 0.6, b.y + Math.sin(a) * b.r * 0.6);
    cx.lineTo(b.x + Math.cos(a+0.5) * b.r * 0.9, b.y + Math.sin(a+0.5) * b.r * 0.9);
    cx.stroke();
  }

  // ---- 传球/射门指示线 ----
  if(G.aimMode){
    var p = G.myTeam[G.myPlayerIdx];
    if(p){
      var angle = G.aimAngle;
      var len = 40 + G.aimPower * 0.5;
      var ex = p.x + Math.cos(angle) * len;
      var ey = p.y + Math.sin(angle) * len;
      var isShoot = G.aimMode === 'shoot';

      cx.save();
      // 指示线
      cx.strokeStyle = isShoot ? 'rgba(255,107,53,0.8)' : 'rgba(255,212,59,0.8)';
      cx.lineWidth = isShoot ? 3 : 2;
      cx.setLineDash(isShoot ? [] : [6, 4]);
      cx.shadowColor = isShoot ? '#ff6b35' : '#ffd43b';
      cx.shadowBlur = 8;
      cx.beginPath();
      cx.moveTo(p.x, p.y);
      cx.lineTo(ex, ey);
      cx.stroke();
      cx.setLineDash([]);

      // 箭头
      var arrowSize = 8;
      var arrowAngle = angle + (isShoot ? 0.4 : 0.5);
      cx.beginPath();
      cx.moveTo(ex, ey);
      cx.lineTo(ex - Math.cos(angle - 0.4) * arrowSize, ey - Math.sin(angle - 0.4) * arrowSize);
      cx.moveTo(ex, ey);
      cx.lineTo(ex - Math.cos(angle + 0.4) * arrowSize, ey - Math.sin(angle + 0.4) * arrowSize);
      cx.stroke();
      cx.shadowBlur = 0;
      cx.restore();

      // 力度圈
      cx.save();
      var powerPct = Math.min(1, G.aimPower / 400);
      cx.strokeStyle = isShoot ? '#ff6b35' : '#ffd43b';
      cx.lineWidth = 2;
      cx.globalAlpha = 0.3 + powerPct * 0.4;
      cx.beginPath();
      cx.arc(ex, ey, 6 + powerPct * 12, 0, Math.PI * 2);
      cx.stroke();
      cx.globalAlpha = 1;
      cx.restore();
    }
  }

  // ---- 控球指示 ----
  if(G.dribbling){
    var p = G.myTeam[G.myPlayerIdx];
    if(p){
      cx.save();
      cx.strokeStyle = 'rgba(68,180,255,0.4)';
      cx.lineWidth = 2;
      cx.setLineDash([4, 6]);
      cx.beginPath();
      cx.arc(p.x, p.y, p.r + 6, 0, Math.PI * 2);
      cx.stroke();
      cx.setLineDash([]);
      cx.restore();
    }
  }

  // ---- 加速指示 ----
  if(G.sprinting){
    var p = G.myTeam[G.myPlayerIdx];
    if(p){
      cx.save();
      cx.fillStyle = 'rgba(255,255,255,0.1)';
      cx.beginPath();
      cx.arc(p.x, p.y, p.r + 10, 0, Math.PI * 2);
      cx.fill();
      // 速度线
      for(var si = 0; si < 4; si++){
        var sa = p.animFrame * 0.1 + si * 1.57;
        cx.fillStyle = 'rgba(255,255,255,0.15)';
        cx.fillRect(p.x - 12 + Math.cos(sa) * 20, p.y - 1 + Math.sin(sa) * 20, 8, 2);
      }
      cx.restore();
    }
  }

  cx.restore();
}

// ---- 画球员 ----
function drawPlayer(p, isControlled){
  cx.save();

  // 阴影
  cx.fillStyle = 'rgba(0,0,0,0.15)';
  cx.beginPath();
  cx.ellipse(p.x + 1, p.y + p.r + 2, p.r * 0.8, 4, 0, 0, Math.PI * 2);
  cx.fill();

  // 身体
  var grad = cx.createRadialGradient(p.x - 4, p.y - 4, 0, p.x, p.y, p.r);
  grad.addColorStop(0, lightenColor(p.color, 30));
  grad.addColorStop(0.7, p.color);
  grad.addColorStop(1, p.dark);

  cx.fillStyle = grad;

  // 选中高亮
  if(isControlled){
    cx.shadowColor = '#ffd43b';
    cx.shadowBlur = 15;
  }

  cx.beginPath();
  cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  cx.fill();
  cx.shadowBlur = 0;

  // 球衣号码
  cx.fillStyle = '#fff';
  cx.font = 'bold 10px Arial';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(p.name, p.x, p.y - 1);

  // 脚下球标记
  if(p.hasBall){
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.beginPath();
    cx.arc(p.x, p.y + p.r + 3, 3, 0, Math.PI * 2);
    cx.fill();
  }

  // 控制指示
  if(isControlled){
    cx.strokeStyle = '#ffd43b';
    cx.lineWidth = 2;
    cx.beginPath();
    cx.arc(p.x, p.y, p.r + 4, 0, Math.PI * 2);
    cx.stroke();
  }

  cx.restore();
}

// ---- 颜色工具 ----
function lightenColor(hex, amt){
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ============================================================
//  主循环
// ============================================================
function gameLoop(){
  update();
  render();
  requestAnimationFrame(gameLoop);
}
gameLoop();

// 处理窗口resize
var resizeTimer = null;
window.addEventListener('resize', function(){
  if(resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){ resize(); }, 100);
});

</script>
