<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚽ 3D足球 第一人称</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}

.ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.ov.on{display:flex}
.pn{background:linear-gradient(145deg,#1a1a3a,#0d0d2b);border:2px solid #4488ff;border-radius:20px;padding:28px 32px;text-align:center;color:#fff;max-width:400px;width:90%}
.pn h1{font-size:30px;color:#ffd700;margin-bottom:6px}
.pn p{color:#99a;font-size:14px;margin-bottom:10px;line-height:1.6}
.pn .btn{display:inline-block;padding:12px 36px;border:none;border-radius:12px;font-size:17px;font-weight:bold;cursor:pointer;color:#fff;margin:5px;background:linear-gradient(145deg,#ff6b35,#e55a2b);touch-action:manipulation}
.pn .btn:active{transform:scale(0.95)}
.pn .btn.bl{background:linear-gradient(145deg,#44b4ff,#2a8acc)}
.pn .big-score{font-size:56px;color:#ffd700;font-weight:bold;margin:8px 0}
.pn .sub{font-size:13px;color:#667;margin-bottom:14px}

#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);color:#fff;pointer-events:none;font-size:13px}
#hud .score{font-size:24px;font-weight:bold;color:#ffd700}
#hud .timer{font-size:15px;color:#88ddff}
#hud .tn{font-size:11px;color:#889}

#powerBarBg{position:fixed;left:10%;right:10%;bottom:210px;z-index:30;height:12px;background:rgba(0,0,0,0.6);border-radius:6px;border:1px solid rgba(255,255,255,0.12);display:none;overflow:hidden}
#powerBarBg.on{display:block}
#powerBarFill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#44ff44,#ffd43b,#ff4444)}

#touchCtl{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#touchCtl.on{display:block}
@media(hover:none)and(pointer:coarse){#touchCtl.on{display:block}}

#joyArea{position:absolute;left:18px;bottom:25px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none}
#joyKnob{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(68,180,255,0.3);border:2px solid rgba(68,180,255,0.5);top:38px;left:38px;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,0.4)}

#lookArea{position:absolute;right:0;top:50px;width:40%;height:calc(100% - 50px);pointer-events:auto;touch-action:none}
#lookArea .hint-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.1);font-size:13px;white-space:nowrap;pointer-events:none}

#rightBtns{position:absolute;right:10px;bottom:18px;display:flex;flex-direction:column;gap:7px;pointer-events:auto}
.rbtn{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:17px;color:#fff;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.1s;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06)}
.rbtn:active{transform:scale(0.88)}
.rbtn .lbl{font-size:8px;opacity:0.6;margin-top:1px}
.rbtn-drib{background:rgba(68,180,255,0.25);border-color:rgba(68,180,255,0.45)}
.rbtn-drib.active{background:rgba(68,180,255,0.6);border-color:#44b4ff}
.rbtn-pass{background:rgba(255,212,59,0.25);border-color:rgba(255,212,59,0.45)}
.rbtn-pass.active{background:rgba(255,212,59,0.6);border-color:#ffd43b}
.rbtn-shoot{background:rgba(255,107,53,0.25);border-color:rgba(255,107,53,0.45)}
.rbtn-shoot.active{background:rgba(255,107,53,0.6);border-color:#ff6b35}
.btn-row{display:flex;gap:5px;justify-content:flex-end}
.rbtn-sm{width:44px;height:44px;font-size:14px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div><span class="tn">🇨🇳</span> <span class="score" id="hMy">0</span></div>
  <div class="timer" id="hTime">90:00</div>
  <div><span class="score" id="hAi">0</span> <span class="tn">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span></div>
</div>

<div id="powerBarBg"><div id="powerBarFill"></div></div>

<div id="touchCtl">
  <div id="joyArea"><div id="joyKnob">⚽</div></div>
  <div id="lookArea"><div class="hint-text">👆 滑动看四周</div></div>
  <div id="rightBtns">
    <div class="btn-row">
      <div class="rbtn rbtn-drib" id="btnDrib">🏃<span class="lbl">带球</span></div>
      <div class="rbtn rbtn-pass" id="btnPass">⚡<span class="lbl">传球</span></div>
      <div class="rbtn rbtn-shoot" id="btnShoot">🎯<span class="lbl">射门</span></div>
    </div>
    <div class="btn-row">
      <div class="rbtn rbtn-sm" id="btnSprint">💨<span class="lbl">加速</span></div>
    </div>
  </div>
</div>

<div class="ov on" id="sMenu">
  <div class="pn">
    <h1>⚽ 3D 足球</h1>
    <p>第一人称视角 · 真实3D球场<br>🏃带球 ⚡传球 🎯射门</p>
    <div class="sub">👆 左摇杆移动 · 右滑看四周</div>
    <button class="btn" onclick="startGame()">▶ 开球！</button>
  </div>
</div>

<div class="ov" id="sGoal">
  <div class="pn">
    <h1 id="gTitle">⚽ 进球！</h1>
    <div class="big-score" id="gScore">0-0</div>
    <p id="gInfo"></p>
    <button class="btn bl" onclick="resumeGame()">继续</button>
  </div>
</div>

<div class="ov" id="sHalf">
  <div class="pn">
    <h1 id="hTitle">⏸ 中场休息</h1>
    <div class="big-score" id="hScore">0-0</div>
    <p id="hInfo"></p>
    <button class="btn bl" id="hBtn" onclick="nextHalf()">下半场</button>
  </div>
</div>

<script>
// ============================================================
//  ⚽ 纯Canvas 3D 第一人称足球游戏
//  无外部依赖，打开即玩
// ============================================================

var ca = document.getElementById('c'), cx = ca.getContext('2d');
var W, H;

function resize(){
  W = ca.width = window.innerWidth;
  H = ca.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---- 3D投影核心 ----
// 玩家（相机）位置
var cam = { x: -40, z: 0, y: 1.6, rotY: 0, rotX: 0 };
var moveX = 0, moveZ = 0;   // 摇杆/键盘移动
var lookX = 0, lookY = 0;    // 视角旋转

// ---- 游戏状态 ----
var G = null;
var ctrl = {
  dribbling: false,
  sprinting: false,
  aimMode: null,   // 'pass' | 'shoot'
  aimPower: 0,
  aimAngle: 0,
};

// ---- 球场常量 ----
var FIELD = { w: 200, h: 120, goalW: 26, goalH: 3.5 };
var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// ---- 球员数据 ----
var myTeam = [];
var aiTeam = [];
var ball = { x: 0, z: 0, vx: 0, vz: 0, owner: null };

// ---- 工具函数 ----
function dist(x1,z1,x2,z2){ return Math.hypot(x2-x1, z2-z1); }
function clamp(v,mi,ma){ return Math.max(mi,Math.min(ma,v)); }
function rand(mi,ma){ return Math.random()*(ma-mi)+mi; }
function sign(v){ return v>0?1:v<0?-1:0; }

// ---- 创建球员 ----
function createTeam(baseX, baseZ, color, isUser){
  var t = [];
  var pos = [
    {x:baseX, z:baseZ},
    {x:baseX-12, z:baseZ-14},
    {x:baseX-12, z:baseZ+14},
    {x:baseX-30, z:baseZ-10},
    {x:baseX-30, z:baseZ+10},
  ];
  for(var i=0;i<5;i++){
    t.push({
      x:pos[i].x, z:pos[i].z,
      targetX:pos[i].x, targetZ:pos[i].z,
      baseX:pos[i].x, baseZ:pos[i].z,
      hasBall:false, kickTimer:0,
      speed: i===0?4.5:3.5, color:color,
      isUser: isUser && i===0,
      index:i, aiTimer:rand(0,100),
      name:['★','⚡','⚡','🛡','🛡'][i],
    });
  }
  return t;
}

function initMatch(){
  G = {
    half:1, timer:90*60,
    myScore:0, aiScore:0,
    state:'playing',
    goalCD:0,
  };
  myTeam = createTeam(-40, 0, '#44b4ff', true);
  aiTeam = createTeam(40, 0, '#ff6b6b', false);
  ball.x=0; ball.z=0; ball.vx=0; ball.vz=0; ball.owner=null;
  cam.x = -40; cam.z = 0; cam.rotY = 0; cam.rotX = 0;
  ctrl.dribbling = false;
  ctrl.aimMode = null;
  updateHUD();
}

// ---- 3D投影 ----
function project3D(wx, wz, wy){
  // 世界坐标→相机空间
  var dx = wx - cam.x;
  var dz = wz - cam.z;
  var dy = (wy||0) - cam.y;

  // 绕Y轴旋转
  var cosY = Math.cos(cam.rotY);
  var sinY = Math.sin(cam.rotY);
  var rx = dx * cosY + dz * sinY;
  var rz = -dx * sinY + dz * cosY;
  if(rz < 0.05) return null; // 在相机后面

  // 绕X轴旋转（俯仰）
  var cosX = Math.cos(cam.rotX);
  var sinX = Math.sin(cam.rotX);
  var ry = dy * cosX - rz * sinX;
  rz = dy * sinX + rz * cosX;
  if(rz < 0.05) return null;

  // 投影到屏幕
  var fov = 1.2;
  var sx = W/2 + (rx / rz) * (W/2) * fov;
  var sy = H/2 - (ry / rz) * (H/2) * fov;
  var scale = 1 / rz;
  return {x:sx, y:sy, s:scale, z:rz};
}

// ---- 渲染3D球场 ----
function render(){
  cx.clearRect(0,0,W,H);

  // 天空
  var skyGrad = cx.createLinearGradient(0,0,0,H*0.55);
  skyGrad.addColorStop(0,'#4a8ec4');
  skyGrad.addColorStop(0.5,'#87CEEB');
  skyGrad.addColorStop(1,'#b8d8f0');
  cx.fillStyle = skyGrad;
  cx.fillRect(0,0,W,H*0.55);

  // ---- 草地（逐行渲染）----
  var horizon = H * 0.5;
  for(var sy = horizon; sy < H; sy++){
    // 计算这一行对应的世界Z距离
    var pz = (H/2) / (sy - horizon + 0.1);
    var angleX = cam.rotX;
    var worldZ = pz * 30;

    // 世界X范围
    var halfScreenX = worldZ * 0.8;
    var leftX = cam.x - halfScreenX;
    var rightX = cam.x + halfScreenX;
    var step = (rightX - leftX) / W;

    for(var sx = 0; sx < W; sx++){
      var wx = leftX + sx * step;

      // 透视变暗
      var distFactor = Math.min(1, 60 / (worldZ + 5));
      var shade = 0.5 + distFactor * 0.5;

      // 草地颜色
      var r = 50 + Math.floor(30 * shade);
      var g = 120 + Math.floor(80 * shade);
      var b = 40 + Math.floor(20 * shade);

      // 草纹（简单噪声）
      var noise = Math.sin(wx*0.3)*Math.sin(worldZ*0.5)*0.05;
      r += Math.floor(noise*30);
      g += Math.floor(noise*40);

      // 草条纹
      var stripe = Math.sin(worldZ*0.08)*0.03;
      g += Math.floor(stripe*30);

      cx.fillStyle = 'rgb('+r+','+g+','+b+')';
      cx.fillRect(sx, sy, 1, 1);
    }
  }

  // ---- 球场白线（3D投影）----
  var white = 'rgba(255,255,255,0.5)';

  function drawLine3D(points, color, width){
    var projected = [];
    for(var i=0;i<points.length;i++){
      var p = project3D(points[i][0], points[i][1], 0.02);
      if(!p) continue;
      projected.push(p);
    }
    if(projected.length < 2) return;
    cx.strokeStyle = color || white;
    cx.lineWidth = width || 1.5;
    cx.beginPath();
    cx.moveTo(projected[0].x, projected[0].y);
    for(var i=1;i<projected.length;i++){
      cx.lineTo(projected[i].x, projected[i].y);
    }
    cx.stroke();
  }

  function drawRect3D(x1,z1,x2,z2, color, w){
    drawLine3D([[x1,z1],[x2,z1],[x2,z2],[x1,z2],[x1,z1]], color, w);
  }

  // 边线
  drawRect3D(-99,-59,99,59);
  // 中线
  drawLine3D([[0,-59],[0,59]]);
  // 中圈
  var circ = [];
  for(var i=0;i<=24;i++){
    var a = i/24*Math.PI*2;
    circ.push([Math.cos(a)*15, Math.sin(a)*15]);
  }
  drawLine3D(circ);

  // 禁区
  drawRect3D(-99,-30,-70,30);
  drawRect3D(70,-30,99,30);
  // 小禁区
  drawRect3D(-99,-15,-85,15);
  drawRect3D(85,-15,99,15);

  // ---- 球门（右侧 - AI球门）----
  function drawGoal(x, z, facing){
    // 门柱
    var postColor = 'rgba(255,255,255,0.8)';
    // 左柱
    var p1 = project3D(x, z-13, 0);
    var p2 = project3D(x, z-13, 3.5);
    if(p1 && p2){
      cx.strokeStyle = postColor;
      cx.lineWidth = 3;
      cx.beginPath(); cx.moveTo(p1.x,p1.y); cx.lineTo(p2.x,p2.y); cx.stroke();
    }
    // 右柱
    var p1 = project3D(x, z+13, 0);
    var p2 = project3D(x, z+13, 3.5);
    if(p1 && p2){
      cx.strokeStyle = postColor;
      cx.lineWidth = 3;
      cx.beginPath(); cx.moveTo(p1.x,p1.y); cx.lineTo(p2.x,p2.y); cx.stroke();
    }
    // 横梁
    var p1 = project3D(x, z-13, 3.5);
    var p2 = project3D(x, z+13, 3.5);
    if(p1 && p2){
      cx.strokeStyle = postColor;
      cx.lineWidth = 3;
      cx.beginPath(); cx.moveTo(p1.x,p1.y); cx.lineTo(p2.x,p2.y); cx.stroke();
    }
    // 球网（半透明水平线）
    for(var n=1;n<6;n++){
      var nz = z - 13 + n * 5.2;
      var np1 = project3D(x, nz, 0.2);
      var np2 = project3D(x, nz, 3.3);
      if(np1 && np2){
        cx.strokeStyle = 'rgba(255,255,255,0.08)';
        cx.lineWidth = 0.5;
        cx.beginPath(); cx.moveTo(np1.x,np1.y); cx.lineTo(np2.x,np2.y); cx.stroke();
      }
    }
  }

  // 对方球门（右侧）
  drawGoal(100, 0, -1);
  // 我方球门（左侧）- 简化
  drawGoal(-100, 0, 1);

  // ---- 球场阴影 ----
  // 远处加一层雾
  var fogGrad = cx.createRadialGradient(W/2, H*0.4, 10, W/2, H*0.4, H*0.6);
  fogGrad.addColorStop(0,'rgba(0,0,0,0)');
  fogGrad.addColorStop(1,'rgba(135,206,235,0.3)');
  cx.fillStyle = fogGrad;
  cx.fillRect(0,0,W,H);

  // ---- 画球员 ----
  function drawPlayer3D(p, isMe){
    var pp = project3D(p.x, p.z, 0);
    if(!pp) return;

    var h = 1.5;
    var w = 0.8;

    var top = project3D(p.x, p.z, h);
    if(!top) return;

    var screenH = (top.y - pp.y);
    var screenW = screenH * 0.5;
    var cx2 = pp.x;
    var cy2 = pp.y;

    // 身体
    var color = p.color;
    cx.fillStyle = color;
    cx.shadowColor = 'rgba(0,0,0,0.3)';
    cx.shadowBlur = 6;

    // 身体（椭圆）
    cx.beginPath();
    cx.ellipse(cx2, cy2 - screenH*0.35, screenW*0.6, screenH*0.3, 0, 0, Math.PI*2);
    cx.fill();

    // 腿
    cx.shadowBlur = 3;
    cx.fillStyle = '#224466';
    var legW = screenW*0.12;
    cx.fillRect(cx2 - screenW*0.25, cy2 - screenH*0.1, legW, screenH*0.2);
    cx.fillRect(cx2 + screenW*0.15, cy2 - screenH*0.1, legW, screenH*0.2);

    // 头
    cx.fillStyle = '#ffccaa';
    cx.shadowBlur = 4;
    cx.beginPath();
    cx.arc(cx2, cy2 - screenH*0.65, screenW*0.2, 0, Math.PI*2);
    cx.fill();

    // 球衣号
    cx.fillStyle = '#fff';
    cx.font = 'bold ' + Math.max(6, screenW*0.5) + 'px Arial';
    cx.textAlign = 'center';
    cx.fillText(p.name, cx2, cy2 - screenH*0.3);

    // 高亮选中的
    if(isMe){
      cx.strokeStyle = '#ffd700';
      cx.lineWidth = 2;
      cx.shadowBlur = 10;
      cx.shadowColor = '#ffd700';
      cx.beginPath();
      cx.arc(cx2, cy2 - screenH*0.35, screenW*0.8, 0, Math.PI*2);
      cx.stroke();
    }

    // 脚下有球标记
    if(p.hasBall && !isMe){
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.beginPath();
      cx.arc(cx2, cy2, screenW*0.1, 0, Math.PI*2);
      cx.fill();
    }

    cx.shadowBlur = 0;
  }

  // 画AI
  for(var i=0;i<aiTeam.length;i++) drawPlayer3D(aiTeam[i], false);
  // 画我方
  for(var i=0;i<myTeam.length;i++) drawPlayer3D(myTeam[i], i===0);

  // ---- 画球 ----
  var bp = project3D(ball.x, ball.z, 0.35);
  if(bp){
    // 阴影
    cx.fillStyle = 'rgba(0,0,0,0.15)';
    cx.beginPath();
    cx.arc(bp.x+2, bp.y+2, bp.s*8, 0, Math.PI*2);
    cx.fill();
    // 球体
    var ballR = bp.s * 10;
    cx.fillStyle = '#ffffff';
    cx.shadowColor = 'rgba(255,255,255,0.2)';
    cx.shadowBlur = 8;
    cx.beginPath();
    cx.arc(bp.x, bp.y, ballR, 0, Math.PI*2);
    cx.fill();
    // 花纹
    cx.strokeStyle = 'rgba(0,0,0,0.1)';
    cx.lineWidth = 0.5;
    cx.shadowBlur = 0;
    for(var pi=0;pi<5;pi++){
      var a = pi*1.256+ball.x*0.01;
      cx.beginPath();
      cx.moveTo(bp.x+Math.cos(a)*ballR*0.5, bp.y+Math.sin(a)*ballR*0.5);
      cx.lineTo(bp.x+Math.cos(a+0.5)*ballR*0.8, bp.y+Math.sin(a+0.5)*ballR*0.8);
      cx.stroke();
    }
    cx.shadowBlur = 0;
  }

  // ---- 传球/射门指示线 ----
  if(ctrl.aimMode){
    var me = myTeam[0];
    if(me){
      var angle = ctrl.aimAngle;
      var len = 30 + ctrl.aimPower * 0.3;
      var tx = me.x + Math.cos(angle) * len;
      var tz = me.z + Math.sin(angle) * len;

      var start = project3D(me.x, me.z, 0.3);
      var end = project3D(tx, tz, 0.3);
      if(start && end){
        var isShoot = ctrl.aimMode === 'shoot';
        cx.strokeStyle = isShoot ? 'rgba(255,107,53,0.7)' : 'rgba(255,212,59,0.7)';
        cx.lineWidth = isShoot ? 3 : 2;
        cx.setLineDash([6,4]);
        cx.beginPath();
        cx.moveTo(start.x, start.y);
        cx.lineTo(end.x, end.y);
        cx.stroke();
        cx.setLineDash([]);

        // 箭头
        var as = 8;
        cx.beginPath();
        cx.moveTo(end.x, end.y);
        cx.lineTo(end.x - Math.cos(angle-0.4)*as, end.y + Math.sin(angle-0.4)*as * 0.5);
        cx.moveTo(end.x, end.y);
        cx.lineTo(end.x - Math.cos(angle+0.4)*as, end.y + Math.sin(angle+0.4)*as * 0.5);
        cx.stroke();
      }
    }
  }

  // ---- 带球指示 ----
  if(ctrl.dribbling){
    var me = myTeam[0];
    var mp = project3D(me.x, me.z, 0);
    if(mp){
      cx.strokeStyle = 'rgba(68,180,255,0.3)';
      cx.lineWidth = 1.5;
      cx.setLineDash([3,5]);
      cx.beginPath();
      cx.arc(mp.x, mp.y, 12, 0, Math.PI*2);
      cx.stroke();
      cx.setLineDash([]);
    }
  }
}

// ---- 更新游戏逻辑 ----
function update(){
  if(!G || G.state!=='playing') return;

  G.timer--;
  if(G.timer%60===0) updateHUD();

  if(G.timer<=0){
    if(G.half===1){ G.state='halftime'; showHalf(); }
    else { G.state='end'; showHalf(); }
    return;
  }

  if(G.goalCD>0){ G.goalCD--; return; }

  var me = myTeam[0];
  var delta = 1;

  // ---- 玩家移动 ----
  var speed = ctrl.sprinting ? me.speed*1.5 : me.speed;
  // 移动方向相对于视角
  var angle = cam.rotY;
  var mx = moveX * Math.cos(angle) - moveZ * Math.sin(angle);
  var mz = moveX * Math.sin(angle) + moveZ * Math.cos(angle);
  me.x += mx * speed * 0.06;
  me.z += mz * speed * 0.06;
  me.x = clamp(me.x, -95, 95);
  me.z = clamp(me.z, -55, 55);

  cam.x += (me.x - cam.x) * 0.1;
  cam.z += (me.z - cam.z) * 0.1;

  // 视角旋转
  cam.rotY += lookX * 0.003;
  cam.rotX = clamp(cam.rotX + lookY * 0.003, -0.4, 0.4);

  // ---- 带球 ----
  if(ctrl.dribbling && ball.owner===null && dist(me.x,me.z,ball.x,ball.z)<8){
    ball.owner = 'my';
    me.hasBall = true;
  }
  if(ctrl.dribbling && ball.owner==='my'){
    ball.x = me.x + 1.5;
    ball.z = me.z - 0.3;
    ball.vx *= 0.8;
    ball.vz *= 0.8;
  }

  // ---- 队友跑位 ----
  for(var i=1;i<myTeam.length;i++){
    var p = myTeam[i];
    var hasBall = ctrl.dribbling || ball.owner==='my';
    var tx = p.baseX + (hasBall?20:0);
    var tz = p.baseZ + Math.sin(Date.now()*0.002+i*2)*6;
    p.x += (tx-p.x)*0.03;
    p.z += (tz-p.z)*0.03;
    p.x = clamp(p.x,-95,95);
    p.z = clamp(p.z,-55,55);
  }

  // ---- AI对手 ----
  for(var i=0;i<aiTeam.length;i++){
    var ai = aiTeam[i];
    if(ai.kickTimer>0) ai.kickTimer--;
    var bd = dist(ai.x,ai.z,ball.x,ball.z);

    // 最近的人追球
    var nearest = true;
    for(var j=0;j<aiTeam.length;j++){
      if(j!==i && dist(aiTeam[j].x,aiTeam[j].z,ball.x,ball.z) < bd-3){
        nearest=false; break;
      }
    }

    if(nearest && bd<50 && ball.owner!=='my'){
      var a = Math.atan2(ball.z-ai.z, ball.x-ai.x);
      ai.x += Math.cos(a)*ai.speed*0.06;
      ai.z += Math.sin(a)*ai.speed*0.06;
      if(bd<3){
        ai.hasBall = true;
        ball.x = ai.x-1.5; ball.z = ai.z+0.3;
        ball.vx*=0.8; ball.vz*=0.8;
        ball.owner = 'ai';
      } else {
        ai.hasBall = false;
      }
      if(ai.hasBall){
        ball.x = ai.x-1.5; ball.z = ai.z+0.3;
        if(ai.x>50 && Math.random()<0.008) aiShoot(ai);
        else if(Math.random()<0.004) aiPass(ai);
      }
    } else {
      var tx2 = ai.baseX + (ball.owner==='my'?10:0);
      ai.x += (tx2-ai.x)*0.02;
      ai.z += (ai.baseZ-ai.z)*0.02;
      ai.hasBall = false;
    }
    ai.x = clamp(ai.x,-95,95);
    ai.z = clamp(ai.z,-55,55);
  }

  // ---- 球物理 ----
  ball.vx *= 0.985;
  ball.vz *= 0.985;
  ball.x += ball.vx;
  ball.z += ball.vz;
  if(Math.abs(ball.x)>97){ball.x=sign(ball.x)*97; ball.vx*=-0.4;}
  if(Math.abs(ball.z)>57){ball.z=sign(ball.z)*57; ball.vz*=-0.4;}
  if(Math.abs(ball.vx)<0.02 && Math.abs(ball.vz)<0.02){ball.vx=0;ball.vz=0;}

  // 球权丢失
  if(ball.owner==='my' && dist(me.x,me.z,ball.x,ball.z)>5){
    ball.owner=null; me.hasBall=false;
  }
  if(ball.owner==='ai'){
    var found=false;
    for(var i=0;i<aiTeam.length;i++){
      if(aiTeam[i].hasBall && dist(aiTeam[i].x,aiTeam[i].z,ball.x,ball.z)<5)
      {found=true;break;}
    }
    if(!found) ball.owner=null;
  }

  // ---- 进球检测 ----
  if(ball.x > 101 && ball.z > -13 && ball.z < 13){
    G.myScore++; onGoal('⚽ 进球！！中国队得分！', '#ffd700');
  }
  if(ball.x < -101 && ball.z > -13 && ball.z < 13){
    G.aiScore++; onGoal('😅 被进球了...', '#ff6b6b');
  }

  function aiShoot(ai){
    var goalZ = -5+rand(0,10);
    var a2 = Math.atan2(goalZ-ai.z, 100-ai.x);
    var pwr = 8+rand(0,4);
    ball.vx = Math.cos(a2)*pwr;
    ball.vz = Math.sin(a2)*pwr;
    ball.owner=null; ai.hasBall=false; ai.kickTimer=30;
    playBeep(600,0.1);
  }

  function aiPass(ai){
    var targets = [];
    for(var j=0;j<aiTeam.length;j++){
      if(aiTeam[j]!==ai && dist(aiTeam[j].x,aiTeam[j].z,ai.x,ai.z)<50)
        targets.push(aiTeam[j]);
    }
    if(!targets.length) return;
    var t = targets[Math.floor(rand(0,targets.length))];
    var a2 = Math.atan2(t.z-ai.z, t.x-ai.x);
    ball.vx = Math.cos(a2)*(4+rand(0,2));
    ball.vz = Math.sin(a2)*(4+rand(0,2));
    ball.owner=null; ai.hasBall=false; ai.kickTimer=20;
    playBeep(500,0.06);
  }
}

// ---- 进球事件 ----
function onGoal(text, color){
  G.state='goal'; G.goalCD=120;
  updateHUD();
  document.getElementById('gTitle').textContent = text;
  document.getElementById('gScore').textContent = G.myScore+' - '+G.aiScore;
  document.getElementById('gInfo').textContent = G.myScore > G.aiScore ? '领先中！' : (G.myScore < G.aiScore ? '加油追回来！' : '平局！');
  document.getElementById('sGoal').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
  playBeep(800,0.2);
  setTimeout(function(){playBeep(1000,0.15)},200);
}

function resumeGame(){
  document.getElementById('sGoal').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  G.state='playing';
  ball.x=0; ball.z=0; ball.vx=0; ball.vz=0; ball.owner=null;
  resetPositions();
  updateHUD();
}

function resetPositions(){
  var mp = [[-40,0],[-52,-14],[-52,14],[-70,-10],[-70,10]];
  for(var i=0;i<5;i++){
    myTeam[i].x=mp[i][0]; myTeam[i].z=mp[i][1];
    myTeam[i].hasBall=false;
  }
  var ap = [[40,0],[52,-14],[52,14],[70,-10],[70,10]];
  for(var i=0;i<5;i++){
    aiTeam[i].x=ap[i][0]; aiTeam[i].z=ap[i][1];
    aiTeam[i].hasBall=false;
  }
  cam.x=-40; cam.z=0;
}

function showHalf(){
  document.getElementById('hTitle').textContent = G.state==='halftime'?'⏸ 中场休息':'🏁 比赛结束！';
  document.getElementById('hScore').textContent = G.myScore+' - '+G.aiScore;
  document.getElementById('hBtn').textContent = G.state==='halftime'?'▶ 下半场':'🔄 再来一局';
  document.getElementById('hBtn').onclick = G.state==='halftime'?nextHalf:restartMatch;
  var diff = G.myScore - G.aiScore;
  document.getElementById('hInfo').textContent = diff>0?'🎉 领先'+diff+'球！':diff<0?'😤 落后'+(-diff)+'球':'🤝 平局';
  document.getElementById('sHalf').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
}

function nextHalf(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  G.half=2; G.timer=90*60; G.state='playing';
  resetPositions();
  ball.x=0; ball.z=0; ball.vx=0; ball.vz=0; ball.owner=null;
  updateHUD();
}

function restartMatch(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

function updateHUD(){
  if(!G) return;
  document.getElementById('hMy').textContent = G.myScore;
  document.getElementById('hAi').textContent = G.aiScore;
  var min = Math.floor(G.timer/3600);
  var sec = Math.floor((G.timer%3600)/60);
  document.getElementById('hTime').textContent = (G.half===1?'上':'下')+min+':'+(sec<10?'0':'')+sec;
}

// ---- 传球/射门 ----
function tryPass(){
  if(!G||G.state!=='playing') return;
  var me=myTeam[0];
  if(!me||(!ctrl.dribbling&&dist(me.x,me.z,ball.x,ball.z)>4)) return;
  ctrl.aimMode='pass'; ctrl.aimPower=0; ctrl.aimAngle=0;
  document.getElementById('powerBarBg').classList.add('on');
}

function tryShoot(){
  if(!G||G.state!=='playing') return;
  var me=myTeam[0];
  if(!me||(!ctrl.dribbling&&dist(me.x,me.z,ball.x,ball.z)>4)) return;
  ctrl.aimMode='shoot'; ctrl.aimPower=0; ctrl.aimAngle=0;
  document.getElementById('powerBarBg').classList.add('on');
}

function execPass(){
  if(ctrl.aimMode!=='pass') return;
  var me=myTeam[0];
  if(!me) return;
  var pwr=5+ctrl.aimPower*0.05;
  ball.vx=Math.cos(ctrl.aimAngle)*pwr;
  ball.vz=Math.sin(ctrl.aimAngle)*pwr;
  ball.owner=null; me.hasBall=false;
  ctrl.aimMode=null;
  document.getElementById('powerBarBg').classList.remove('on');
  playBeep(500,0.08);
}

function execShoot(){
  if(ctrl.aimMode!=='shoot') return;
  var me=myTeam[0];
  if(!me) return;
  var pwr=Math.min(15, 7+ctrl.aimPower*0.08);
  ball.vx=Math.cos(ctrl.aimAngle)*pwr;
  ball.vz=Math.sin(ctrl.aimAngle)*pwr;
  ball.owner=null; me.hasBall=false;
  ctrl.aimMode=null;
  document.getElementById('powerBarBg').classList.remove('on');
  playBeep(800,0.15);
}

function cancelAim(){
  ctrl.aimMode=null;
  document.getElementById('powerBarBg').classList.remove('on');
}

function updateAim(clientX, clientY){
  if(!ctrl.aimMode) return;
  var me=myTeam[0]; if(!me) return;
  // 屏幕→世界坐标（通过地面交点）
  var d = clientY - H/2;
  if(d < 10) return;
  var worldZ = (H/2) / d * 30;
  var halfW = worldZ * 0.8;
  var worldX = (clientX/W-0.5)*halfW*2 + cam.x;
  var targetX = worldX;
  var targetZ = worldZ * Math.cos(cam.rotX) * 0.8 + cam.z;

  // 简化：用相机方向计算
  var angle = cam.rotY + (clientX/W-0.5)*1.5;
  ctrl.aimAngle = angle;

  var pwr = clamp(Math.abs(clientY-H*0.6)/H*400, 0, 300);
  ctrl.aimPower = pwr;

  var pct = Math.min(100, pwr/300*100);
  document.getElementById('powerBarFill').style.width = pct+'%';
}

// ---- 音效 ----
function playBeep(freq, dur){
  try{
    var ac = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ac.createOscillator();
    var g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value=freq;
    g.gain.value=0.05;
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||0.1));
    osc.start(); osc.stop(ac.currentTime+(dur||0.1));
  }catch(e){}
}

// ---- 触屏控制 ----
var joyEl = document.getElementById('joyArea');
var knobEl = document.getElementById('joyKnob');
var joyId=null;
joyEl.addEventListener('touchstart',function(e){
  e.preventDefault();
  joyId=e.changedTouches[0].identifier;
  jUpdate(e.changedTouches[0]);
});
joyEl.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var t of e.changedTouches) if(t.identifier===joyId) jUpdate(t);
});
joyEl.addEventListener('touchend',function(e){
  e.preventDefault();
  for(var t of e.changedTouches) if(t.identifier===joyId){
    joyId=null; moveX=0; moveZ=0;
    knobEl.style.top='38px'; knobEl.style.left='38px';
  }
});
joyEl.addEventListener('touchcancel',function(){joyId=null;moveX=0;moveZ=0;knobEl.style.top='38px';knobEl.style.left='38px';});

function jUpdate(t){
  var rect=joyEl.getBoundingClientRect();
  var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  var dx=t.clientX-cx, dy=t.clientY-cy;
  var maxR=rect.width/2-8;
  var len=Math.hypot(dx,dy);
  if(len>maxR){dx=dx/len*maxR;dy=dy/len*maxR;}
  var norm=Math.min(1,len/maxR);
  moveX=(dx/maxR)*norm*1.2;
  moveZ=-(dy/maxR)*norm*1.2;
  knobEl.style.left=(38+dx)+'px';
  knobEl.style.top=(38+dy)+'px';
}

// ---- 视角触摸 ----
var lookEl=document.getElementById('lookArea');
var lookId=null, lx=null, ly=null;
lookEl.addEventListener('touchstart',function(e){
  e.preventDefault();
  lookEl.querySelector('.hint-text').style.display='none';
  var t=e.changedTouches[0]; lookId=t.identifier; lx=t.clientX; ly=t.clientY;
});
lookEl.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var t of e.changedTouches) if(t.identifier===lookId){
    var dx=(t.clientX-lx)*0.004, dy=(t.clientY-ly)*0.004;
    lookX=dx; lookY=dy;
    lx=t.clientX; ly=t.clientY;
  }
});
lookEl.addEventListener('touchend',function(e){
  e.preventDefault();
  for(var t of e.changedTouches) if(t.identifier===lookId){lookId=null;lx=null;ly=null;lookX=0;lookY=0;}
});
lookEl.addEventListener('touchcancel',function(){lookId=null;lx=null;ly=null;lookX=0;lookY=0;});

// ---- 鼠标视角 ----
var mouseDown=false, mx=0, my2=0;
ca.addEventListener('mousedown',function(e){mouseDown=true;mx=e.clientX;my2=e.clientY;});
window.addEventListener('mousemove',function(e){
  if(mouseDown){
    var dx=(e.clientX-mx)*0.005, dy=(e.clientY-my2)*0.005;
    lookX=dx; lookY=dy;
    mx=e.clientX; my2=e.clientY;
  } else {
    lookX=0; lookY=0;
  }
});
window.addEventListener('mouseup',function(){mouseDown=false;lookX=0;lookY=0;});

// ---- 键盘 ----
document.addEventListener('keydown',function(e){
  switch(e.key){
    case 'w':case 'W':moveZ=1;break;
    case 's':case 'S':moveZ=-1;break;
    case 'a':case 'A':moveX=-1;break;
    case 'd':case 'D':moveX=1;break;
    case ' ':e.preventDefault();ctrl.dribbling=true;break;
    case '1':tryShoot();break;
    case '2':tryPass();break;
  }
});
document.addEventListener('keyup',function(e){
  switch(e.key){
    case 'w':case 'W':case 's':case 'S':moveZ=0;break;
    case 'a':case 'A':case 'd':case 'D':moveX=0;break;
    case ' ':ctrl.dribbling=false;break;
  }
});

// ---- 按钮 ----
document.getElementById('btnDrib').addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();ctrl.dribbling=true;this.classList.add('active');
});
document.getElementById('btnDrib').addEventListener('touchend',function(e){
  e.preventDefault();e.stopPropagation();ctrl.dribbling=false;this.classList.remove('active');
});
document.getElementById('btnDrib').addEventListener('touchcancel',function(){ctrl.dribbling=false;this.classList.remove('active');});

var pBtn=document.getElementById('btnPass'), pId=null;
pBtn.addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();
  var t=e.changedTouches[0]; pId=t.identifier;
  tryPass(); this.classList.add('active');
});
pBtn.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var t of e.changedTouches) if(t.identifier===pId&&ctrl.aimMode==='pass') updateAim(t.clientX,t.clientY);
});
pBtn.addEventListener('touchend',function(e){
  e.preventDefault();e.stopPropagation();pId=null;this.classList.remove('active');
  if(ctrl.aimMode==='pass') execPass();
});
pBtn.addEventListener('touchcancel',function(){pId=null;this.classList.remove('active');cancelAim();});

var sBtn=document.getElementById('btnShoot'), sId=null;
sBtn.addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();
  var t=e.changedTouches[0]; sId=t.identifier;
  tryShoot(); this.classList.add('active');
});
sBtn.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var t of e.changedTouches) if(t.identifier===sId&&ctrl.aimMode==='shoot') updateAim(t.clientX,t.clientY);
});
sBtn.addEventListener('touchend',function(e){
  e.preventDefault();e.stopPropagation();sId=null;this.classList.remove('active');
  if(ctrl.aimMode==='shoot') execShoot();
});
sBtn.addEventListener('touchcancel',function(){sId=null;this.classList.remove('active');cancelAim();});

document.getElementById('btnSprint').addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();ctrl.sprinting=true;
});
document.getElementById('btnSprint').addEventListener('touchend',function(e){
  e.preventDefault();e.stopPropagation();ctrl.sprinting=false;
});
document.getElementById('btnSprint').addEventListener('touchcancel',function(){ctrl.sprinting=false;});

// ---- 启动 ----
function startGame(){
  document.getElementById('sMenu').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

// ---- 主循环 ----
function loop(){
  update();
  render();
  // 平滑视角归零
  lookX *= 0.85;
  lookY *= 0.85;
  requestAnimationFrame(loop);
}
loop();

</script>
