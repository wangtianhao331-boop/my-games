<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚽ 3D足球 第一人称</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#loading{position:fixed;inset:0;z-index:200;background:linear-gradient(135deg,#0a2a0a,#1a3a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:16px}
#loading .sp{width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);border-top:3px solid #44ff44;border-radius:50%;animation:sp 1s linear infinite;margin-bottom:16px}
@keyframes sp{to{transform:rotate(360deg)}}
.ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.ov.on{display:flex}
.pn{background:linear-gradient(145deg,#1a1a3a,#0d0d2b);border:2px solid #4488ff;border-radius:18px;padding:24px 28px;text-align:center;color:#fff;max-width:380px;width:90%}
.pn h1{font-size:28px;color:#ffd700;margin-bottom:4px}
.pn p{color:#99a;font-size:13px;margin-bottom:8px;line-height:1.5}
.pn .btn{display:inline-block;padding:10px 30px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff;margin:4px;background:linear-gradient(145deg,#ff6b35,#e55a2b);touch-action:manipulation}
.pn .btn.bl{background:linear-gradient(145deg,#44b4ff,#2a8acc)}
.pn .big-s{font-size:48px;color:#ffd700;font-weight:bold;margin:6px 0}
.pn .sub{font-size:12px;color:#667;margin-bottom:12px}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.6),transparent);color:#fff;pointer-events:none;font-size:12px}
#hud .s{font-size:22px;font-weight:bold;color:#ffd700}
#hud .t{font-size:14px;color:#88ddff}
#powerBg{position:fixed;left:15%;right:15%;bottom:220px;z-index:30;height:10px;background:rgba(0,0,0,0.5);border-radius:5px;border:1px solid rgba(255,255,255,0.1);display:none;overflow:hidden}
#powerBg.on{display:block}
#powerFill{height:100%;width:0;border-radius:5px;background:linear-gradient(90deg,#44ff44,#ffd43b,#ff4444);transition:width 0.02s}
#touchCtl{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#touchCtl.on{display:block}
@media(hover:none)and(pointer:coarse){#touchCtl.on{display:block}}
#joyAr{position:absolute;left:16px;bottom:20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none}
#joyK{position:absolute;width:42px;height:42px;border-radius:50%;background:rgba(68,180,255,0.3);border:2px solid rgba(68,180,255,0.5);top:34px;left:34px;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,0.4)}
#lookAr{position:absolute;right:0;top:45px;width:38%;height:calc(100% - 45px);pointer-events:auto;touch-action:none}
#lookAr .ht{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.08);font-size:12px;white-space:nowrap;pointer-events:none}
#rBtns{position:absolute;right:8px;bottom:16px;display:flex;flex-direction:column;gap:6px;pointer-events:auto}
.rb{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:16px;color:#fff;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.1s;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05)}
.rb:active{transform:scale(0.88)}
.rb .lb{font-size:8px;opacity:0.6;margin-top:1px}
.rb-d{background:rgba(68,180,255,0.25);border-color:rgba(68,180,255,0.45)}
.rb-d.on{background:rgba(68,180,255,0.6);border-color:#44b4ff}
.rb-p{background:rgba(255,212,59,0.25);border-color:rgba(255,212,59,0.45)}
.rb-p.on{background:rgba(255,212,59,0.6);border-color:#ffd43b}
.rb-s{background:rgba(255,107,53,0.25);border-color:rgba(255,107,53,0.45)}
.rb-s.on{background:rgba(255,107,53,0.6);border-color:#ff6b35}
.br{display:flex;gap:5px;justify-content:flex-end}
.rb-sm{width:42px;height:42px;font-size:13px}
</style>
</head>
<body>

<div id="loading"><div class="sp"></div><div>加载3D引擎（国内CDN）...</div></div>

<canvas id="c"></canvas>
<div id="hud"><div><span>🇨🇳</span> <span class="s" id="hM">0</span></div><div class="t" id="hT">90:00</div><div><span class="s" id="hA">0</span> <span>🏴󠁧󠁢󠁥󠁮󠁧󠁿</span></div></div>
<div id="powerBg"><div id="powerFill"></div></div>

<div id="touchCtl">
  <div id="joyAr"><div id="joyK">⚽</div></div>
  <div id="lookAr"><div class="ht">👆 滑动转头</div></div>
  <div id="rBtns">
    <div class="br"><div class="rb rb-d" id="bD">🏃<span class="lb">带球</span></div><div class="rb rb-p" id="bP">⚡<span class="lb">传球</span></div><div class="rb rb-s" id="bS">🎯<span class="lb">射门</span></div></div>
    <div class="br"><div class="rb rb-sm" id="bSp">💨<span class="lb">加速</span></div></div>
  </div>
</div>

<div class="ov on" id="sMenu">
  <div class="pn"><h1>⚽ 3D 足球</h1><p>第一人称 · 真实3D球场<br>🏃带球 ⚡传球 🎯射门（蓄力）</p><div class="sub">👆 左摇杆跑动 · 右滑转头</div>
  <button class="btn" onclick="startGame()">▶ 开球！</button></div>
</div>
<div class="ov" id="sGoal">
  <div class="pn"><h1 id="gT">⚽ 进球！</h1><div class="big-s" id="gSc">0-0</div><p id="gI"></p>
  <button class="btn bl" onclick="resumeGame()">继续</button></div>
</div>
<div class="ov" id="sHalf">
  <div class="pn"><h1 id="hT">⏸ 中场休息</h1><div class="big-s" id="hSc">0-0</div><p id="hI"></p>
  <button class="btn bl" id="hBtn" onclick="nextHalf()">下半场</button></div>
</div>

<script>
// -------------------------------------------------------
//  加载 Three.js（国内BootCDN）
// -------------------------------------------------------
var script = document.createElement('script');
script.src = 'https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js';
script.onload = function(){ document.getElementById('loading').innerHTML='<div style="color:#44ff44">✓ 3D引擎加载成功，启动中...</div>'; setTimeout(init,200); };
script.onerror = function(){ document.getElementById('loading').innerHTML='<div style="color:#ff6b6b">加载失败，请检查网络后刷新</div>'; };
document.head.appendChild(script);

// ---- 全局 ----
var scene, camera, renderer, clock;
var W, H;
var myTeam = [], aiTeam = [], ball = null;
var myPlayers = [], aiPlayers = [];
var G = null;
var ctrl = {mx:0, mz:0, lx:0, ly:0, drib:false, sprint:false, aimMode:null, aimPwr:0};
var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
var FIELD_LEN = 120, FIELD_WID = 80; // 球场尺寸
var GOAL_W = 14, GOAL_H = 3.2;

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  if(camera){camera.aspect=W/H;camera.updateProjectionMatrix();}
  if(renderer)renderer.setSize(W,H);
}
window.addEventListener('resize',resize);

// ---- 初始化3D ----
function init(){
  var canvas = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  resize();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x6bb8e8);
  scene.fog = new THREE.Fog(0x6bb8e8, 150, 280);

  camera = new THREE.PerspectiveCamera(72, W/H, 0.1, 300);
  camera.position.set(0, 1.7, 0); // 人眼高度

  clock = new THREE.Clock();

  // 灯光
  var ambient = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(ambient);
  var sun = new THREE.DirectionalLight(0xffeedd, 0.9);
  sun.position.set(60, 100, 40);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 200;
  sun.shadow.camera.left = -80;
  sun.shadow.camera.right = 80;
  sun.shadow.camera.top = 80;
  sun.shadow.camera.bottom = -80;
  scene.add(sun);

  var hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a7a3a, 0.4);
  scene.add(hemi);

  buildField();
  buildPlayers();
  buildBall();

  document.getElementById('loading').style.display = 'none';
  animate();
}

// ---- 程序化生成草地纹理 ----
function makeGrassTex(){
  var c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#3a9a5a';
  ctx.fillRect(0,0,512,512);
  for(var i=0;i<10000;i++){
    var x=Math.random()*512, y=Math.random()*512;
    var s=70+Math.random()*40;
    ctx.fillStyle = 'rgba('+s+','+(s+50)+','+(s+10)+',0.12)';
    ctx.fillRect(x,y,1+Math.random()*2,2+Math.random()*3);
  }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(12, 8);
  return tex;
}

// ---- 建球场 ----
function buildField(){
  // 草地
  var grassMat = new THREE.MeshStandardMaterial({
    map: makeGrassTex(),
    roughness: 0.9,
    metalness: 0,
  });
  var field = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_WID, FIELD_LEN), grassMat);
  field.rotation.x = -Math.PI/2;
  field.position.y = -0.05;
  field.receiveShadow = true;
  scene.add(field);

  // 白线
  var lm = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.6});

  function line(pts, y){
    var g = new THREE.BufferGeometry().setFromPoints(pts.map(function(p){return new THREE.Vector3(p[0], y||0.02, p[1]);}));
    scene.add(new THREE.Line(g, lm));
  }

  var hw = FIELD_WID/2-1, hl = FIELD_LEN/2-1;
  // 边线
  line([[-hw, -hl],[hw, -hl],[hw, hl],[-hw, hl],[-hw, -hl]]);
  // 中线
  line([[0, -hl],[0, hl]]);
  // 中圈
  var circ = [];
  for(var i=0;i<=32;i++){var a=i/32*Math.PI*2; circ.push([Math.cos(a)*10, Math.sin(a)*10]);}
  line(circ);
  // 禁区
  line([[-hw, -30],[-hw+25, -30],[-hw+25, 30],[-hw, 30]]);
  line([[hw, -30],[hw-25, -30],[hw-25, 30],[hw, 30]]);
  line([[-hw, -12],[-hw+12, -12],[-hw+12, 12],[-hw, 12]]);
  line([[hw, -12],[hw-12, -12],[hw-12, 12],[hw, 12]]);

  // 球门（对方球门在Z负方向）
  var gm = new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.4, metalness:0.2});
  var pg = new THREE.CylinderGeometry(0.12, 0.12, GOAL_H);
  // 左柱
  var pl = new THREE.Mesh(pg, gm);
  pl.position.set(-GOAL_W/2, GOAL_H/2, -hl-0.5); scene.add(pl);
  // 右柱
  var pr = new THREE.Mesh(pg, gm);
  pr.position.set(GOAL_W/2, GOAL_H/2, -hl-0.5); scene.add(pr);
  // 横梁
  var bm = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,GOAL_W), gm);
  bm.rotation.z = Math.PI/2;
  bm.position.set(0, GOAL_H, -hl-0.5); scene.add(bm);

  // 我方球门（Z正方向）
  var pl2 = new THREE.Mesh(pg, gm);
  pl2.position.set(-GOAL_W/2, GOAL_H/2, hl+0.5); scene.add(pl2);
  var pr2 = new THREE.Mesh(pg, gm);
  pr2.position.set(GOAL_W/2, GOAL_H/2, hl+0.5); scene.add(pr2);
  var bm2 = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,GOAL_W), gm);
  bm2.rotation.z = Math.PI/2;
  bm2.position.set(0, GOAL_H, hl+0.5); scene.add(bm2);

  // 球网
  var nm = new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:0.1, wireframe:true, side:THREE.DoubleSide});
  var ng = new THREE.PlaneGeometry(GOAL_W, GOAL_H, 6, 4);
  var net = new THREE.Mesh(ng, nm);
  net.position.set(0, GOAL_H/2, -hl-0.2);
  scene.add(net);
  var net2 = new THREE.Mesh(ng.clone(), nm);
  net2.position.set(0, GOAL_H/2, hl+0.2);
  scene.add(net2);

  // 远处树/看台（简单装饰）
  var stm = new THREE.MeshStandardMaterial({color:0x2a2a4a, roughness:0.8});
  for(var i=-3;i<=3;i++){
    if(Math.abs(i)<2) continue;
    var st = new THREE.Mesh(new THREE.BoxGeometry(8,6,3), stm);
    st.position.set(i*20, -1, -hl-8);
    scene.add(st);
  }
}

// ---- 球员 ----
function makePlayerMesh(color, isMain){
  var g = new THREE.Group();

  // 身体
  var bm = new THREE.MeshStandardMaterial({color:color, roughness:0.6, metalness:0.1});
  var body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.55, 1.0, 8), bm);
  body.position.y = 0.5;
  body.castShadow = true;
  g.add(body);

  // 腿
  var lm = new THREE.MeshStandardMaterial({color:0x224466, roughness:0.7});
  var legL = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,0.4,6), lm);
  legL.position.set(-0.15, 0.2, 0); g.add(legL);
  var legR = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,0.4,6), lm);
  legR.position.set(0.15, 0.2, 0); g.add(legR);

  // 头
  var hm = new THREE.MeshStandardMaterial({color:0xffccaa, roughness:0.5});
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8), hm);
  head.position.y = 1.1;
  head.castShadow = true;
  g.add(head);

  // 主控标记（金色光圈）
  if(isMain){
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(0.5, 0.55, 16),
      new THREE.MeshBasicMaterial({color:0xffd700, transparent:true, opacity:0.3, side:THREE.DoubleSide})
    );
    ring.rotation.x = -Math.PI/2;
    ring.position.y = 0.02;
    g.add(ring);
  }

  return g;
}

function buildPlayers(){
  var cols = [0x44b4ff, 0x3388dd, 0x3388dd, 0x2255aa, 0x2255aa];
  for(var i=0;i<5;i++){
    var m = makePlayerMesh(cols[i], i===0);
    scene.add(m);
    myPlayers.push(m);
    myTeam.push({x:0, z:-35+ i*5, hasBall:false, kick:0, speed: i===0?4.5:3.5, baseX:0, baseZ:-35+(i%3)*3, isUser:i===0});
  }

  var cols2 = [0xff6b6b, 0xdd4444, 0xdd4444, 0xaa2222, 0xaa2222];
  for(var i=0;i<5;i++){
    var m = makePlayerMesh(cols2[i], false);
    scene.add(m);
    aiPlayers.push(m);
    aiTeam.push({x:0, z:35- i*5, hasBall:false, kick:0, speed:3.5+Math.random()*0.5, baseX:0, baseZ:35-(i%3)*3});
  }
}

function buildBall(){
  var bm = new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.25, metalness:0.05});
  ball = new THREE.Mesh(new THREE.SphereGeometry(0.3, 14, 14), bm);
  ball.position.y = 0.3;
  ball.castShadow = true;
  scene.add(ball);
}

// ---- 初始化比赛 ----
function initMatch(){
  G = {half:1, timer:90*60, myS:0, aiS:0, state:'playing', goalCD:0, ball:{x:0,z:0,vx:0,vz:0,owner:null}};
  var mp = [[0,-35],[5,-45],[-5,-45],[3,-52],[-3,-52]];
  for(var i=0;i<5;i++){myTeam[i].x=mp[i][0];myTeam[i].z=mp[i][1];myTeam[i].hasBall=false;}
  var ap = [[0,35],[5,45],[-5,45],[3,52],[-3,52]];
  for(var i=0;i<5;i++){aiTeam[i].x=ap[i][0];aiTeam[i].z=ap[i][1];aiTeam[i].hasBall=false;}
  G.ball.x=0; G.ball.z=0; G.ball.vx=0; G.ball.vz=0; G.ball.owner=null;
  camera.position.set(0, 1.7, myTeam[0].z);
  camera.lookAt(0, 0, -60);
  ctrl.drib=false; ctrl.aimMode=null;
  updHUD();
}

// ---- 更新 ----
function update(delta){
  if(!G||G.state!=='playing'||G.goalCD>0){if(G&&G.goalCD>0)G.goalCD--; return;}

  G.timer--; if(G.timer%60===0) updHUD();
  if(G.timer<=0){
    if(G.half===1){G.state='halftime';showHalf();}
    else{G.state='end';showHalf();}
    return;
  }

  var dt = Math.min(delta, 0.05);
  var me = myTeam[0];
  var b = G.ball;

  // ---- 移动 ----
  var spd = ctrl.sprint ? me.speed*1.4 : me.speed;
  // 从相机方向计算移动
  var fwd = new THREE.Vector3(0,0,-1);
  fwd.applyQuaternion(camera.quaternion);
  fwd.y = 0; fwd.normalize();
  var right = new THREE.Vector3(1,0,0);
  right.applyQuaternion(camera.quaternion);
  right.y = 0; right.normalize();

  var mv = new THREE.Vector3();
  mv.addScaledVector(fwd, -ctrl.mz); // 前后
  mv.addScaledVector(right, ctrl.mx); // 左右

  if(mv.length() > 0.1){
    mv.normalize();
    me.x += mv.x * spd * dt * 3;
    me.z += mv.z * spd * dt * 3;
    me.x = Math.max(-38, Math.min(38, me.x));
    me.z = Math.max(-58, Math.min(58, me.z));
  }

  // 相机跟随（平滑）
  var targetCamZ = me.z;
  camera.position.x += (me.x - camera.position.x) * 0.1;
  camera.position.z += (targetCamZ - camera.position.z) * 0.1;
  camera.position.y = 1.7;

  // ---- 带球 ----
  if(ctrl.drib){
    if(b.owner===null && Math.hypot(me.x-b.x, me.z-b.z)<6){
      b.owner='my'; me.hasBall=true;
    }
    if(b.owner==='my'){
      b.x = me.x + Math.sin(camera.rotation.y)*1.0;
      b.z = me.z + Math.cos(camera.rotation.y)*1.0;
      b.vx*=0.8; b.vz*=0.8;
    }
  } else {
    if(b.owner==='my' && Math.hypot(me.x-b.x, me.z-b.z)>5){
      b.owner=null; me.hasBall=false;
    }
  }

  // ---- 队友AI ----
  for(var i=1;i<myTeam.length;i++){
    var p=myTeam[i];
    var has = ctrl.drib||b.owner==='my';
    var tx = p.baseX + (has?10:0);
    var tz = p.baseZ + (has?8:0) + Math.sin(Date.now()*0.002+i*3)*3;
    p.x += (tx-p.x)*0.03;
    p.z += (tz-p.z)*0.03;
    p.x = Math.max(-38, Math.min(38, p.x));
    p.z = Math.max(-58, Math.min(58, p.z));
  }

  // ---- AI对手 ----
  for(var i=0;i<aiTeam.length;i++){
    var ai=aiTeam[i];
    if(ai.kick>0) ai.kick--;
    var bd = Math.hypot(ai.x-b.x, ai.z-b.z);

    var near = true;
    for(var j=0;j<aiTeam.length;j++){
      if(j!==i && Math.hypot(aiTeam[j].x-b.x, aiTeam[j].z-b.z) < bd-4)
      {near=false;break;}
    }

    if(near && bd<50 && b.owner!=='my'){
      var a = Math.atan2(b.x-ai.x, b.z-ai.z);
      ai.x += Math.sin(a)*ai.speed*0.04;
      ai.z += Math.cos(a)*ai.speed*0.04;
      if(bd<2.5){
        ai.hasBall=true; b.owner='ai';
        b.x=ai.x; b.z=ai.z+1.2;
        b.vx*=0.8; b.vz*=0.8;
      } else ai.hasBall=false;

      if(ai.hasBall){
        b.x=ai.x; b.z=ai.z+1.2;
        if(ai.z<-20 && Math.random()<0.01) aiShoot(ai);
        else if(Math.random()<0.006) aiPass(ai);
      }
    } else {
      ai.x += (ai.baseX-ai.x)*0.02;
      ai.z += (ai.baseZ-ai.z)*0.02;
      ai.hasBall=false;
    }
    ai.x=Math.max(-38,Math.min(38,ai.x));
    ai.z=Math.max(-58,Math.min(58,ai.z));
  }

  // ---- 球物理 ----
  b.vx*=0.988; b.vz*=0.988;
  b.x+=b.vx; b.z+=b.vz;
  if(Math.abs(b.x)>39){b.x=Math.sign(b.x)*39;b.vx*=-0.4;}
  if(Math.abs(b.z)>59){b.z=Math.sign(b.z)*59;b.vz*=-0.4;}
  if(Math.abs(b.vx)<0.02&&Math.abs(b.vz)<0.02){b.vx=0;b.vz=0;}

  if(b.owner==='my' && Math.hypot(me.x-b.x,me.z-b.z)>6){b.owner=null;me.hasBall=false;}
  if(b.owner==='ai'){
    var f=false;
    for(var i=0;i<aiTeam.length;i++){if(aiTeam[i].hasBall&&Math.hypot(aiTeam[i].x-b.x,aiTeam[i].z-b.z)<5){f=true;break;}}
    if(!f) b.owner=null;
  }

  // ---- 进球 ----
  if(b.z<-61 && b.x>-GOAL_W/2 && b.x<GOAL_W/2){G.myS++;goalEvt('⚽ 进球！！');}
  if(b.z>61 && b.x>-GOAL_W/2 && b.x<GOAL_W/2){G.aiS++;goalEvt('😅 被进了...');}

  function aiShoot(ai){
    var gx = -3+Math.random()*6;
    var a2 = Math.atan2(gx-ai.x, -58-ai.z);
    var pw = 6+Math.random()*4;
    b.vx=Math.sin(a2)*pw; b.vz=Math.cos(a2)*pw;
    b.owner=null; ai.hasBall=false; ai.kick=30;
    beep(600,0.08);
  }
  function aiPass(ai){
    var ts=[];
    for(var j=0;j<aiTeam.length;j++){if(aiTeam[j]!==ai&&Math.hypot(aiTeam[j].x-ai.x,aiTeam[j].z-ai.z)<35)ts.push(aiTeam[j]);}
    if(!ts.length) return;
    var t=ts[Math.floor(Math.random()*ts.length)];
    var a2=Math.atan2(t.x-ai.x, t.z-ai.z);
    b.vx=Math.sin(a2)*(3+Math.random()*2); b.vz=Math.cos(a2)*(3+Math.random()*2);
    b.owner=null; ai.hasBall=false; ai.kick=15;
    beep(500,0.05);
  }

  // ---- 更新3D位置 ----
  for(var i=0;i<myTeam.length;i++){
    var p=myTeam[i];
    myPlayers[i].position.set(p.x, 0, p.z);
    // 面向球方向
    if(!p.isUser){
      var ta = Math.atan2(b.x-p.x, b.z-p.z);
      myPlayers[i].rotation.y = ta;
    }
  }
  for(var i=0;i<aiTeam.length;i++){
    var p=aiTeam[i];
    aiPlayers[i].position.set(p.x, 0, p.z);
    var ta = Math.atan2(b.x-p.x, b.z-p.z);
    aiPlayers[i].rotation.y = ta;
  }
  ball.position.set(b.x, 0.3, b.z);
  ball.rotation.x += b.vz*0.05;
  ball.rotation.z -= b.vx*0.05;
}

// ---- 传球/射门 ----
function tryPass(){
  if(!G||G.state!=='playing')return;
  var me=myTeam[0];
  if(!me||(!ctrl.drib&&Math.hypot(G.ball.x-me.x,G.ball.z-me.z)>4))return;
  ctrl.aimMode='pass'; ctrl.aimPwr=0;
  document.getElementById('powerBg').classList.add('on');
}
function tryShoot(){
  if(!G||G.state!=='playing')return;
  var me=myTeam[0];
  if(!me||(!ctrl.drib&&Math.hypot(G.ball.x-me.x,G.ball.z-me.z)>4))return;
  ctrl.aimMode='shoot'; ctrl.aimPwr=0;
  document.getElementById('powerBg').classList.add('on');
}

function execAction(){
  if(!ctrl.aimMode) return;
  var me=myTeam[0]; if(!me) return;
  var b=G.ball;
  var isShoot = ctrl.aimMode==='shoot';
  var pw = isShoot ? Math.min(15, 6+ctrl.aimPwr*0.08) : 5+ctrl.aimPwr*0.05;

  // 朝相机方向踢
  var dir = new THREE.Vector3(0,0,-1);
  dir.applyQuaternion(camera.quaternion);
  dir.y = 0; dir.normalize();

  b.vx = dir.x * pw;
  b.vz = dir.z * pw;
  b.owner = null;
  me.hasBall = false;
  ctrl.aimMode = null;
  document.getElementById('powerBg').classList.remove('on');
  beep(isShoot?800:500, isShoot?0.15:0.08);
}

function aimUpdate(clientX, clientY){
  if(!ctrl.aimMode) return;
  // 向上拖动蓄力
  var pwr = Math.max(0, (H*0.7 - clientY) / H * 400);
  pwr = Math.min(pwr, 300);
  ctrl.aimPwr = pwr;
  document.getElementById('powerFill').style.width = Math.min(100, pwr/300*100)+'%';
}

// ---- 进球 ----
function goalEvt(text){
  G.state='goal'; G.goalCD=150;
  updHUD();
  document.getElementById('gT').textContent=text;
  document.getElementById('gSc').textContent=G.myS+' - '+G.aiS;
  document.getElementById('gI').textContent=G.myS>G.aiS?'领先！':(G.myS<G.aiS?'落后':'平局');
  document.getElementById('sGoal').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
  beep(800,0.2);
  setTimeout(function(){beep(1000,0.12);},200);
}

function resumeGame(){
  document.getElementById('sGoal').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  G.state='playing'; G.goalCD=60;
  resetPositions(); updHUD();
}

function resetPositions(){
  var mp=[[0,-35],[5,-45],[-5,-45],[3,-52],[-3,-52]];
  for(var i=0;i<5;i++){myTeam[i].x=mp[i][0];myTeam[i].z=mp[i][1];myTeam[i].hasBall=false;}
  var ap=[[0,35],[5,45],[-5,45],[3,52],[-3,52]];
  for(var i=0;i<5;i++){aiTeam[i].x=ap[i][0];aiTeam[i].z=ap[i][1];aiTeam[i].hasBall=false;}
  G.ball.x=0;G.ball.z=0;G.ball.vx=0;G.ball.vz=0;G.ball.owner=null;
  camera.position.set(0,1.7,myTeam[0].z);
}

function showHalf(){
  document.getElementById('hT').textContent=G.state==='halftime'?'⏸ 中场休息':'🏁 比赛结束！';
  document.getElementById('hSc').textContent=G.myS+' - '+G.aiS;
  document.getElementById('hBtn').textContent=G.state==='halftime'?'▶ 下半场':'🔄 再来一局';
  document.getElementById('hBtn').onclick=G.state==='halftime'?nextHalf:restartMatch;
  var d=G.myS-G.aiS;
  document.getElementById('hI').textContent=d>0?'🎉 领先'+d+'球！':d<0?'😤 落后'+(-d)+'球':'🤝 平局';
  document.getElementById('sHalf').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
}

function nextHalf(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  G.half=2; G.timer=90*60; G.state='playing';
  resetPositions(); updHUD();
}

function restartMatch(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

function updHUD(){
  if(!G)return;
  document.getElementById('hM').textContent=G.myS;
  document.getElementById('hA').textContent=G.aiS;
  var m=Math.floor(G.timer/3600);
  var s=Math.floor((G.timer%3600)/60);
  document.getElementById('hT').textContent=(G.half===1?'上':'下')+m+':'+(s<10?'0':'')+s;
}

function beep(f,d){try{var ac=new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator();var g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f;g.gain.value=0.04;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(d||0.1));o.start();o.stop(ac.currentTime+(d||0.1));}catch(e){}}

// ---- 触屏 ----
var je=document.getElementById('joyAr'), jk=document.getElementById('joyK'), ji=null;
je.addEventListener('touchstart',function(e){e.preventDefault();ji=e.changedTouches[0].identifier;jup(e.changedTouches[0]);});
je.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===ji)jup(t);});
je.addEventListener('touchend',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===ji){ji=null;ctrl.mx=0;ctrl.mz=0;jk.style.top='34px';jk.style.left='34px';}});
je.addEventListener('touchcancel',function(){ji=null;ctrl.mx=0;ctrl.mz=0;jk.style.top='34px';jk.style.left='34px';});
function jup(t){
  var r=je.getBoundingClientRect();
  var cx=r.left+r.width/2, cy=r.top+r.height/2;
  var dx=t.clientX-cx, dy=t.clientY-cy;
  var mr=r.width/2-6, l=Math.hypot(dx,dy);
  if(l>mr){dx=dx/l*mr;dy=dy/l*mr;}
  var n=Math.min(1,l/mr);
  ctrl.mx=(dx/mr)*n*1.2; ctrl.mz=-(dy/mr)*n*1.2;
  jk.style.left=(34+dx)+'px';jk.style.top=(34+dy)+'px';
}

var le=document.getElementById('lookAr'), li=null, llx=null, lly=null;
le.addEventListener('touchstart',function(e){e.preventDefault();le.querySelector('.ht').style.display='none';var t=e.changedTouches[0];li=t.identifier;llx=t.clientX;lly=t.clientY;});
le.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===li){
  var dx=(t.clientX-llx)*0.005, dy=(t.clientY-lly)*0.005;
  ctrl.lx=dx;ctrl.ly=dy;llx=t.clientX;lly=t.clientY;
}});
le.addEventListener('touchend',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===li){li=null;llx=null;lly=null;ctrl.lx=0;ctrl.ly=0;}});
le.addEventListener('touchcancel',function(){li=null;llx=null;lly=null;ctrl.lx=0;ctrl.ly=0;});

// ---- 鼠标 ----
var mdown=false, mmx=0, mmy=0;
ca.addEventListener('mousedown',function(e){mdown=true;mmx=e.clientX;mmy=e.clientY;});
window.addEventListener('mousemove',function(e){
  if(mdown){var dx=(e.clientX-mmx)*0.005, dy=(e.clientY-mmy)*0.005;ctrl.lx=dx;ctrl.ly=dy;mmx=e.clientX;mmy=e.clientY;}
  else{ctrl.lx=0;ctrl.ly=0;}
});
window.addEventListener('mouseup',function(){mdown=false;ctrl.lx=0;ctrl.ly=0;});

// ---- 键盘 ----
document.addEventListener('keydown',function(e){
  switch(e.key){
    case 'w':case 'W':ctrl.mz=-1;break;
    case 's':case 'S':ctrl.mz=1;break;
    case 'a':case 'A':ctrl.mx=-1;break;
    case 'd':case 'D':ctrl.mx=1;break;
    case ' ':e.preventDefault();ctrl.drib=true;break;
    case '1':tryShoot();break;
    case '2':tryPass();break;
    case 'Enter':execAction();break;
    case 'Escape':ctrl.aimMode=null;document.getElementById('powerBg').classList.remove('on');break;
  }
});
document.addEventListener('keyup',function(e){
  switch(e.key){
    case 'w':case 'W':case 's':case 'S':ctrl.mz=0;break;
    case 'a':case 'A':case 'd':case 'D':ctrl.mx=0;break;
    case ' ':ctrl.drib=false;break;
  }
});

// ---- 按钮 ----
document.getElementById('bD').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.drib=true;this.classList.add('on');});
document.getElementById('bD').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.drib=false;this.classList.remove('on');});
document.getElementById('bD').addEventListener('touchcancel',function(){ctrl.drib=false;this.classList.remove('on');});

var pb=document.getElementById('bP'), pi=null;
pb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.changedTouches[0];pi=t.identifier;tryPass();this.classList.add('on');});
pb.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===pi&&ctrl.aimMode==='pass')aimUpdate(t.clientX,t.clientY);});
pb.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();pi=null;this.classList.remove('on');if(ctrl.aimMode==='pass')execAction();});
pb.addEventListener('touchcancel',function(){pi=null;this.classList.remove('on');if(ctrl.aimMode==='pass'){ctrl.aimMode=null;document.getElementById('powerBg').classList.remove('on');}});

var sb=document.getElementById('bS'), si=null;
sb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.changedTouches[0];si=t.identifier;tryShoot();this.classList.add('on');});
sb.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===si&&ctrl.aimMode==='shoot')aimUpdate(t.clientX,t.clientY);});
sb.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();si=null;this.classList.remove('on');if(ctrl.aimMode==='shoot')execAction();});
sb.addEventListener('touchcancel',function(){si=null;this.classList.remove('on');if(ctrl.aimMode==='shoot'){ctrl.aimMode=null;document.getElementById('powerBg').classList.remove('on');}});

document.getElementById('bSp').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.sprint=true;});
document.getElementById('bSp').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.sprint=false;});
document.getElementById('bSp').addEventListener('touchcancel',function(){ctrl.sprint=false;});

function startGame(){
  document.getElementById('sMenu').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

// ---- 主循环 ----
function animate(){
  requestAnimationFrame(animate);
  var dt = clock.getDelta();
  update(dt);

  // 视角旋转
  camera.rotation.order = 'YXZ';
  camera.rotation.y += ctrl.lx * 0.05;
  camera.rotation.x = Math.max(-0.4, Math.min(0.4, camera.rotation.x + ctrl.ly * 0.05));
  ctrl.lx *= 0.85; ctrl.ly *= 0.85;

  renderer.render(scene, camera);
}
</script>
