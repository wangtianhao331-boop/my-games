<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚽ 3D足球 第一人称</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}

.ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.ov.on{display:flex}
.pn{background:linear-gradient(145deg,#1a1a3a,#0d0d2b);border:2px solid #4488ff;border-radius:20px;padding:28px 32px;text-align:center;color:#fff;max-width:400px;width:90%}
.pn h1{font-size:30px;color:#ffd700;margin-bottom:6px}
.pn p{color:#99a;font-size:14px;margin-bottom:10px;line-height:1.6}
.pn .btn{display:inline-block;padding:12px 36px;border:none;border-radius:12px;font-size:17px;font-weight:bold;cursor:pointer;color:#fff;margin:5px;background:linear-gradient(145deg,#ff6b35,#e55a2b);touch-action:manipulation}
.pn .btn:active{transform:scale(0.95)}
.pn .btn.bl{background:linear-gradient(145deg,#44b4ff,#2a8acc)}
.pn .big-score{font-size:56px;color:#ffd700;font-weight:bold;margin:8px 0}
.pn .sub{font-size:13px;color:#667;margin-bottom:14px}

#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);color:#fff;pointer-events:none;font-size:13px}
#hud .score{font-size:24px;font-weight:bold;color:#ffd700}
#hud .timer{font-size:15px;color:#88ddff}
#hud .tn{font-size:11px;color:#889}

#powerBarBg{position:fixed;left:10%;right:10%;bottom:210px;z-index:30;height:12px;background:rgba(0,0,0,0.6);border-radius:6px;border:1px solid rgba(255,255,255,0.12);display:none;overflow:hidden}
#powerBarBg.on{display:block}
#powerBarFill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#44ff44,#ffd43b,#ff4444)}

#touchCtl{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#touchCtl.on{display:block}
@media(hover:none)and(pointer:coarse){#touchCtl.on{display:block}}

#joyArea{position:absolute;left:18px;bottom:25px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none}
#joyKnob{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(68,180,255,0.3);border:2px solid rgba(68,180,255,0.5);top:38px;left:38px;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,0.4)}

#lookArea{position:absolute;right:0;top:50px;width:40%;height:calc(100% - 50px);pointer-events:auto;touch-action:none}
#lookArea .hint-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.1);font-size:13px;white-space:nowrap;pointer-events:none}

#rightBtns{position:absolute;right:10px;bottom:18px;display:flex;flex-direction:column;gap:7px;pointer-events:auto}
.rbtn{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:17px;color:#fff;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.1s;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06)}
.rbtn:active{transform:scale(0.88)}
.rbtn .lbl{font-size:8px;opacity:0.6;margin-top:1px}
.rbtn-drib{background:rgba(68,180,255,0.25);border-color:rgba(68,180,255,0.45)}
.rbtn-drib.active{background:rgba(68,180,255,0.6);border-color:#44b4ff}
.rbtn-pass{background:rgba(255,212,59,0.25);border-color:rgba(255,212,59,0.45)}
.rbtn-pass.active{background:rgba(255,212,59,0.6);border-color:#ffd43b}
.rbtn-shoot{background:rgba(255,107,53,0.25);border-color:rgba(255,107,53,0.45)}
.rbtn-shoot.active{background:rgba(255,107,53,0.6);border-color:#ff6b35}
.btn-row{display:flex;gap:5px;justify-content:flex-end}
.rbtn-sm{width:44px;height:44px;font-size:14px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div><span class="tn">🇨🇳</span> <span class="score" id="hMy">0</span></div>
  <div class="timer" id="hTime">90:00</div>
  <div><span class="score" id="hAi">0</span> <span class="tn">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span></div>
</div>

<div id="powerBarBg"><div id="powerBarFill"></div></div>

<div id="touchCtl">
  <div id="joyArea"><div id="joyKnob">⚽</div></div>
  <div id="lookArea"><div class="hint-text">👆 滑动看四周</div></div>
  <div id="rightBtns">
    <div class="btn-row">
      <div class="rbtn rbtn-drib" id="btnDrib">🏃<span class="lbl">带球</span></div>
      <div class="rbtn rbtn-pass" id="btnPass">⚡<span class="lbl">传球</span></div>
      <div class="rbtn rbtn-shoot" id="btnShoot">🎯<span class="lbl">射门</span></div>
    </div>
    <div class="btn-row">
      <div class="rbtn rbtn-sm" id="btnSprint">💨<span class="lbl">加速</span></div>
    </div>
  </div>
</div>

<div class="ov on" id="sMenu">
  <div class="pn">
    <h1>⚽ 3D 足球</h1>
    <p>第一人称视角 · 真实3D球场<br>🏃带球 ⚡传球 🎯射门</p>
    <div class="sub">👆 左摇杆移动 · 右滑看四周</div>
    <button class="btn" onclick="startGame()">▶ 开球！</button>
  </div>
</div>

<div class="ov" id="sGoal">
  <div class="pn">
    <h1 id="gTitle">⚽ 进球！</h1>
    <div class="big-score" id="gScore">0-0</div>
    <p id="gInfo"></p>
    <button class="btn bl" onclick="resumeGame()">继续</button>
  </div>
</div>

<div class="ov" id="sHalf">
  <div class="pn">
    <h1 id="hTitle">⏸ 中场休息</h1>
    <div class="big-score" id="hScore">0-0</div>
    <p id="hInfo"></p>
    <button class="btn bl" id="hBtn" onclick="nextHalf()">下半场</button>
  </div>
</div>

<script>
// ============================================================
//  ⚽ 纯Canvas 3D 第一人称足球游戏
//  坐标系：Z轴为球场长度方向，X轴为宽度方向
//  我方防守Z负方向球门，进攻Z正方向球门
// ============================================================

var ca = document.getElementById('c'), cx = ca.getContext('2d');
var W, H;
function resize(){W=ca.width=window.innerWidth;H=ca.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

// ---- 3D投影 ----
var cam = {x:0, z:-35, y:1.7, rotY:0, rotX:-0.05};
var joyX=0, joyZ=0;   // 摇杆输入
var lookDX=0, lookDY=0; // 视角增量

// ---- 游戏状态 ----
var G = null;
var ctrl = {dribbling:false, sprinting:false, aimMode:null, aimPower:0, aimAngle:0};

// ---- 球场尺寸 ----
// Z方向长度：-65（我方球门）到 65（对方球门）
// X方向宽度：-90 到 90
var GOAL_W = 26, GOAL_H = 3.5; // 球门

// ---- 工具 ----
function dist(x1,z1,x2,z2){return Math.hypot(x2-x1, z2-z1)}
function clamp(v,mi,ma){return Math.max(mi,Math.min(ma,v))}
function rand(mi,ma){return Math.random()*(ma-mi)+mi}
function sign(v){return v>0?1:v<0?-1:0}

// ---- 球员 ----
var myTeam = [], aiTeam = [];
var ball = {x:0, z:0, vx:0, vz:0, owner:null};

function makeTeam(baseX, baseZ, color, isUserTeam){
  var t = [];
  var pos = [
    {x:baseX, z:baseZ},
    {x:baseX-10, z:baseZ-12},
    {x:baseX-10, z:baseZ+12},
    {x:baseX-25, z:baseZ-8},
    {x:baseX-25, z:baseZ+8},
  ];
  for(var i=0;i<5;i++){
    t.push({
      x:pos[i].x, z:pos[i].z,
      baseX:pos[i].x, baseZ:pos[i].z,
      hasBall:false, kickTimer:0,
      speed:i===0?4.8:3.8,
      color:color,
      isUser: isUserTeam && i===0,
      idx:i,
    });
  }
  return t;
}

function initMatch(){
  G = {half:1, timer:90*60, myScore:0, aiScore:0, state:'playing', goalCD:0};
  myTeam = makeTeam(0, -35, '#44b4ff', true);
  aiTeam = makeTeam(0, 35, '#ff6b6b', false);
  ball.x=0; ball.z=0; ball.vx=0; ball.vz=0; ball.owner=null;
  cam.x=0; cam.z=-35; cam.rotY=0; cam.rotX=-0.05;
  ctrl.dribbling=false; ctrl.aimMode=null;
  updateHUD();
}

// ---- 3D投影核心 ----
// 世界坐标 (x, z, y) → 屏幕坐标
// y向上为正，z向前为正，x向右为正
function worldToScreen(wx, wz, wy){
  // 1. 移到相机空间
  var dx = wx - cam.x;
  var dz = wz - cam.z;
  var dy = (wy||0) - cam.y;

  // 2. 绕Y轴旋转（水平朝向）
  var cosY = Math.cos(cam.rotY);
  var sinY = Math.sin(cam.rotY);
  var rx = dx * cosY + dz * sinY;
  var rz = -dx * sinY + dz * cosY;

  if(rz < 0.1) return null; // 在背后或太近

  // 3. 绕X轴旋转（俯仰）
  var cosX = Math.cos(cam.rotX);
  var sinX = Math.sin(cam.rotX);
  var ry = dy * cosX - rz * sinX;
  rz = dy * sinX + rz * cosX;

  if(rz < 0.1) return null;

  // 4. 投影
  var fov = 1.0;
  var sx = W/2 + (rx / rz) * W * fov * 0.5;
  var sy = H/2 - (ry / rz) * H * fov * 0.5;
  var scale = 60 / rz;

  return {x:sx, y:sy, s:scale, z:rz};
}

// ---- 画3D球场 ----
function renderField(){
  // 天空
  var sky = cx.createLinearGradient(0,0,0,H*0.45);
  sky.addColorStop(0,'#3a7abd');
  sky.addColorStop(0.6,'#7ab8e8');
  sky.addColorStop(1,'#b8d8f0');
  cx.fillStyle = sky;
  cx.fillRect(0,0,W,H*0.45);

  // ---- 草地（用3D投影方式画，更快）----
  var horizon = H * 0.45;
  // 逐条渲染（每2像素一条，提高性能）
  for(var sy = horizon; sy < H; sy += 2){
    var relY = (sy - horizon) / H;
    var viewZ = 1 / (relY + 0.01) * 8;
    // 考虑俯仰
    var worldZ = viewZ * Math.cos(-cam.rotX);
    var worldYoffset = viewZ * Math.sin(-cam.rotX);
    // 简化：直接用viewZ
    var zDist = viewZ * 1.2;

    // X方向覆盖范围
    var halfX = zDist * 0.7;
    var leftX = cam.x - halfX;
    var rightX = cam.x + halfX;

    // 逐段渲染（每4像素一段）
    for(var sx = 0; sx < W; sx += 4){
      var wx = leftX + (sx/W) * (rightX - leftX);

      // 距离变暗
      var dFac = Math.min(1, 30 / (zDist + 5));
      var shade = 0.4 + dFac * 0.6;

      // 草地颜色
      var r = parseInt(40 + 30 * shade);
      var g = parseInt(100 + 80 * shade);
      var b = parseInt(30 + 20 * shade);

      // 草纹
      var n = Math.sin(wx*0.5+zDist*0.3)*0.04;
      g += parseInt(n*40);
      // 条纹
      var st = Math.sin(zDist*0.06)*0.03;
      g += parseInt(st*30);

      cx.fillStyle = 'rgb('+r+','+g+','+b+')';
      cx.fillRect(sx, sy, 4, 2);
    }
  }

  // ---- 球场白线（3D投影）----
  function drawLine3D(pts, color, width){
    var pp = [];
    for(var i=0;i<pts.length;i++){
      var p = worldToScreen(pts[i][0], pts[i][1], 0.03);
      if(p) pp.push(p);
    }
    if(pp.length<2) return;
    cx.strokeStyle = color||'rgba(255,255,255,0.5)';
    cx.lineWidth = width||1.5;
    cx.beginPath();
    cx.moveTo(pp[0].x, pp[0].y);
    for(var i=1;i<pp.length;i++) cx.lineTo(pp[i].x, pp[i].y);
    cx.stroke();
  }

  function drawRect(x1,z1,x2,z2, c, w){
    drawLine3D([[x1,z1],[x2,z1],[x2,z2],[x1,z2],[x1,z1]], c, w);
  }

  // 边线
  drawRect(-88,-62,88,62);
  // 中线
  drawLine3D([[0,-62],[0,62]]);
  // 中圈
  var circ = [];
  for(var i=0;i<=24;i++){var a=i/24*Math.PI*2; circ.push([Math.cos(a)*12, Math.sin(a)*12]);}
  drawLine3D(circ);

  // 禁区（我方）
  drawRect(-88,-30,-60,30);
  drawRect(-88,-15,-75,15);
  // 禁区（对方）
  drawRect(60,-30,88,30);
  drawRect(75,-15,88,15);

  // ---- 球门 ----
  function drawGoal(z){
    // 门柱和横梁
    var pts = [
      [[-12, z, 0], [-12, z, GOAL_H]],
      [[12, z, 0], [12, z, GOAL_H]],
      [[-12, z, GOAL_H], [12, z, GOAL_H]],
    ];
    for(var i=0;i<pts.length;i++){
      var p1 = worldToScreen(pts[i][0][0], pts[i][0][1], pts[i][0][2]);
      var p2 = worldToScreen(pts[i][1][0], pts[i][1][1], pts[i][1][2]);
      if(p1 && p2){
        cx.strokeStyle = 'rgba(255,255,255,0.8)';
        cx.lineWidth = 3;
        cx.beginPath(); cx.moveTo(p1.x,p1.y); cx.lineTo(p2.x,p2.y); cx.stroke();
      }
    }
    // 球网
    for(var n=1;n<6;n++){
      var nz = z + (z>0?-n*nz: n*nz);
      // 简化...
    }
    // 网（竖线）
    for(var n=-5;n<=5;n++){
      var nx = n * 4;
      var p1 = worldToScreen(nx, z, 0.2);
      var p2 = worldToScreen(nx, z, 3.0);
      if(p1 && p2){
        cx.strokeStyle = 'rgba(255,255,255,0.06)';
        cx.lineWidth = 0.5;
        cx.beginPath(); cx.moveTo(p1.x,p1.y); cx.lineTo(p2.x,p2.y); cx.stroke();
      }
    }
  }

  // 我方球门（Z负）
  drawGoal(-64);
  // 对方球门（Z正）
  drawGoal(64);

  // 雾效
  var fog = cx.createRadialGradient(W/2,H*0.4,10,W/2,H*0.4,H*0.7);
  fog.addColorStop(0,'rgba(0,0,0,0)');
  fog.addColorStop(1,'rgba(135,206,235,0.25)');
  cx.fillStyle = fog;
  cx.fillRect(0,0,W,H);
}

// ---- 画球员 ----
function drawPlayer(p, isMe){
  // 第一人称：不画自己
  if(isMe) return;

  var foot = worldToScreen(p.x, p.z, 0);
  if(!foot) return;

  var head = worldToScreen(p.x, p.z, 1.6);
  if(!head) return;

  var bodyH = foot.y - head.y;
  if(bodyH < 1) return;
  var bodyW = bodyH * 0.35;

  // 阴影
  cx.fillStyle = 'rgba(0,0,0,0.15)';
  cx.beginPath();
  cx.ellipse(foot.x+2, foot.y+2, bodyW*0.6, 3, 0, 0, Math.PI*2);
  cx.fill();

  // 身体
  cx.fillStyle = p.color;
  cx.shadowColor = 'rgba(0,0,0,0.2)';
  cx.shadowBlur = 5;
  cx.beginPath();
  cx.ellipse(foot.x, head.y + bodyH*0.45, bodyW*0.55, bodyH*0.35, 0, 0, Math.PI*2);
  cx.fill();

  // 腿
  cx.shadowBlur = 0;
  cx.fillStyle = '#224466';
  var lw = Math.max(2, bodyW*0.15);
  cx.fillRect(foot.x - bodyW*0.25, foot.y - bodyH*0.12, lw, bodyH*0.15);
  cx.fillRect(foot.x + bodyW*0.15, foot.y - bodyH*0.12, lw, bodyH*0.15);

  // 头
  cx.fillStyle = '#ffccaa';
  cx.shadowBlur = 3;
  var headR = Math.max(2, bodyW*0.2);
  cx.beginPath();
  cx.arc(foot.x, head.y + headR*0.3, headR, 0, Math.PI*2);
  cx.fill();
  cx.shadowBlur = 0;

  // 球衣号
  var fs = Math.max(5, bodyW*0.5);
  cx.fillStyle = '#fff';
  cx.font = 'bold '+fs+'px Arial';
  cx.textAlign = 'center';
  cx.fillText('⚽', foot.x, head.y + bodyH*0.42);

  // 脚下球标记
  if(p.hasBall){
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.beginPath();
    cx.arc(foot.x, foot.y, bodyW*0.08, 0, Math.PI*2);
    cx.fill();
  }
}

// ---- 画球 ----
function renderBall(){
  var bp = worldToScreen(ball.x, ball.z, 0.3);
  if(!bp) return;
  var r = Math.max(2, bp.s * 0.12);
  // 阴影
  cx.fillStyle = 'rgba(0,0,0,0.12)';
  cx.beginPath();
  cx.arc(bp.x+2, bp.y+3, r*0.8, 0, Math.PI*2);
  cx.fill();
  // 球
  cx.fillStyle = '#fff';
  cx.shadowColor = 'rgba(255,255,255,0.15)';
  cx.shadowBlur = 5;
  cx.beginPath();
  cx.arc(bp.x, bp.y, r, 0, Math.PI*2);
  cx.fill();
  cx.shadowBlur = 0;
  // 花纹
  cx.strokeStyle = 'rgba(0,0,0,0.08)';
  cx.lineWidth = 0.5;
  for(var pi=0;pi<5;pi++){
    var a = pi*1.256;
    cx.beginPath();
    cx.moveTo(bp.x+Math.cos(a)*r*0.4, bp.y+Math.sin(a)*r*0.4);
    cx.lineTo(bp.x+Math.cos(a+0.5)*r*0.7, bp.y+Math.sin(a+0.5)*r*0.7);
    cx.stroke();
  }

  // 球在脚下指示（第一人称时球在屏幕下方）
  var me = myTeam[0];
  if(ctrl.dribbling && ball.owner==='my'){
    var bp2 = worldToScreen(ball.x, ball.z, 0);
    if(bp2 && bp2.y > H*0.5){
      cx.fillStyle = 'rgba(68,180,255,0.15)';
      cx.beginPath();
      cx.arc(W/2, H-30, 20, 0, Math.PI*2);
      cx.fill();
      cx.fillStyle = 'rgba(68,180,255,0.3)';
      cx.font = '12px Arial';
      cx.textAlign = 'center';
      cx.fillText('⚽ 球在脚下', W/2, H-26);
    }
  }
}

// ---- 传球/射门指示 ----
function renderAim(){
  if(!ctrl.aimMode) return;
  var me = myTeam[0];
  if(!me) return;

  var angle = ctrl.aimAngle;
  var len = 20 + ctrl.aimPower * 0.2;
  var tx = me.x + Math.sin(angle) * len;
  var tz = me.z + Math.cos(angle) * len;

  var start = worldToScreen(me.x, me.z, 0.3);
  var end = worldToScreen(tx, tz, 0.3);
  if(!start || !end) return;

  var isShoot = ctrl.aimMode === 'shoot';
  cx.strokeStyle = isShoot ? 'rgba(255,107,53,0.7)' : 'rgba(255,212,59,0.7)';
  cx.lineWidth = isShoot ? 3 : 2;
  cx.setLineDash([6,4]);
  cx.beginPath();
  cx.moveTo(start.x, start.y);
  cx.lineTo(end.x, end.y);
  cx.stroke();
  cx.setLineDash([]);

  // 箭头
  var as = 8;
  cx.beginPath();
  cx.moveTo(end.x, end.y);
  cx.lineTo(end.x - Math.sin(angle+0.4)*as, end.y - Math.cos(angle+0.4)*as*0.4);
  cx.moveTo(end.x, end.y);
  cx.lineTo(end.x - Math.sin(angle-0.4)*as, end.y - Math.cos(angle-0.4)*as*0.4);
  cx.stroke();

  // 目标圈
  var pct = Math.min(1, ctrl.aimPower/300);
  cx.strokeStyle = isShoot ? '#ff6b35' : '#ffd43b';
  cx.lineWidth = 1.5;
  cx.globalAlpha = 0.3 + pct*0.4;
  cx.beginPath();
  cx.arc(end.x, end.y, 4+pct*10, 0, Math.PI*2);
  cx.stroke();
  cx.globalAlpha = 1;
}

// ---- 带球指示 ----
function renderDribble(){
  if(!ctrl.dribbling) return;
  var me = myTeam[0];
  var mp = worldToScreen(me.x, me.z, 0);
  if(!mp) return;
  cx.strokeStyle = 'rgba(68,180,255,0.25)';
  cx.lineWidth = 1.5;
  cx.setLineDash([3,5]);
  cx.beginPath();
  cx.arc(mp.x, mp.y, 10, 0, Math.PI*2);
  cx.stroke();
  cx.setLineDash([]);
}

// ---- 主渲染 ----
function render(){
  cx.clearRect(0,0,W,H);
  if(!G) return;

  renderField();
  // 画AI
  for(var i=0;i<aiTeam.length;i++) drawPlayer(aiTeam[i], false);
  // 画我方（跳过自己，即第0个）
  for(var i=0;i<myTeam.length;i++) drawPlayer(myTeam[i], i===0);
  // 画球
  renderBall();
  // 瞄准
  renderAim();
  renderDribble();

  // 准星
  cx.strokeStyle = 'rgba(255,255,255,0.15)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(W/2-8, H/2); cx.lineTo(W/2+8, H/2);
  cx.moveTo(W/2, H/2-8); cx.lineTo(W/2, H/2+8);
  cx.stroke();
}

// ---- 更新 ----
function update(){
  if(!G||G.state!=='playing') return;
  G.timer--;
  if(G.timer%60===0) updateHUD();
  if(G.timer<=0){
    if(G.half===1){G.state='halftime';showHalf();}
    else{G.state='end';showHalf();}
    return;
  }
  if(G.goalCD>0){G.goalCD--;return;}

  var me = myTeam[0];

  // ---- 移动（朝向 +Z 为前） ----
  // 摇杆输入 joyX=左右, joyZ=前后
  // 相对于视角方向移动
  var speed = ctrl.sprinting ? me.speed*1.5 : me.speed;
  // joyZ > 0 = 向前 (+Z), joyX > 0 = 向右 (+X)
  var forward = joyZ * Math.cos(cam.rotY) - joyX * Math.sin(cam.rotY);
  var right = joyZ * Math.sin(cam.rotY) + joyX * Math.cos(cam.rotY);
  me.z += forward * speed * 0.05;
  me.x += right * speed * 0.05;
  me.x = clamp(me.x, -85, 85);
  me.z = clamp(me.z, -60, 60);

  // 摄像机跟随
  cam.x += (me.x - cam.x) * 0.12;
  cam.z += (me.z - cam.z) * 0.12;

  // 视角旋转
  cam.rotY += lookDX * 0.003;
  cam.rotX = clamp(cam.rotX + lookDY * 0.003, -0.5, 0.3);

  // ---- 带球 ----
  if(ctrl.dribbling){
    if(ball.owner===null && dist(me.x,me.z,ball.x,ball.z)<8){
      ball.owner='my'; me.hasBall=true;
    }
    if(ball.owner==='my'){
      // 球在脚下前方
      var ballOffX = Math.sin(cam.rotY) * 1.2;
      var ballOffZ = Math.cos(cam.rotY) * 1.2;
      ball.x = me.x + ballOffX;
      ball.z = me.z + ballOffZ;
      ball.vx *= 0.8; ball.vz *= 0.8;
    }
  }

  // ---- 队友跑位 ----
  for(var i=1;i<myTeam.length;i++){
    var p=myTeam[i];
    var hasBall = ctrl.dribbling || ball.owner==='my';
    var tx = p.baseX + (hasBall?15:0);
    var tz = p.baseZ + (hasBall?15:0) + Math.sin(Date.now()*0.002+i*2)*5;
    p.x += (tx-p.x)*0.03;
    p.z += (tz-p.z)*0.03;
    p.x = clamp(p.x,-85,85);
    p.z = clamp(p.z,-60,60);
  }

  // ---- AI对手 ----
  for(var i=0;i<aiTeam.length;i++){
    var ai=aiTeam[i];
    if(ai.kickTimer>0) ai.kickTimer--;
    var bd = dist(ai.x,ai.z,ball.x,ball.z);

    var nearest = true;
    for(var j=0;j<aiTeam.length;j++){
      if(j!==i && dist(aiTeam[j].x,aiTeam[j].z,ball.x,ball.z)<bd-3)
      {nearest=false;break;}
    }

    if(nearest && bd<60 && ball.owner!=='my'){
      var a = Math.atan2(ball.x-ai.x, ball.z-ai.z);
      ai.x += Math.sin(a)*ai.speed*0.05;
      ai.z += Math.cos(a)*ai.speed*0.05;
      if(bd<3){
        ai.hasBall=true;
        ball.x=ai.x; ball.z=ai.z+1.5;
        ball.vx*=0.8; ball.vz*=0.8;
        ball.owner='ai';
      } else ai.hasBall=false;

      if(ai.hasBall){
        ball.x=ai.x; ball.z=ai.z+1.5;
        // AI进攻（朝向Z正方向）
        if(ai.z>30 && Math.random()<0.01) aiShoot(ai);
        else if(Math.random()<0.005) aiPass(ai);
      }
    } else {
      // 回防
      var tx2 = ai.baseX + (ball.owner==='my'?-10:0);
      ai.x += (tx2-ai.x)*0.02;
      ai.z += (ai.baseZ-ai.z)*0.02;
      ai.hasBall=false;
    }
    ai.x=clamp(ai.x,-85,85);
    ai.z=clamp(ai.z,-60,60);
  }

  // ---- 球物理 ----
  ball.vx *= 0.985;
  ball.vz *= 0.985;
  ball.x += ball.vx;
  ball.z += ball.vz;
  if(Math.abs(ball.x)>86){ball.x=sign(ball.x)*86; ball.vx*=-0.3;}
  if(Math.abs(ball.z)>61){ball.z=sign(ball.z)*61; ball.vz*=-0.3;}
  if(Math.abs(ball.vx)<0.02&&Math.abs(ball.vz)<0.02){ball.vx=0;ball.vz=0;}

  // 球权丢失
  if(ball.owner==='my' && dist(me.x,me.z,ball.x,ball.z)>6){
    ball.owner=null; me.hasBall=false;
  }
  if(ball.owner==='ai'){
    var found=false;
    for(var i=0;i<aiTeam.length;i++){
      if(aiTeam[i].hasBall&&dist(aiTeam[i].x,aiTeam[i].z,ball.x,ball.z)<6)
      {found=true;break;}
    }
    if(!found) ball.owner=null;
  }

  // ---- 进球 ----
  // 对方球门（Z正方向）
  if(ball.z>65 && ball.x>-13 && ball.x<13){
    G.myScore++; goalEvt('⚽ 进球！！中国队得分！');
  }
  // 我方球门（Z负方向）
  if(ball.z<-65 && ball.x>-13 && ball.x<13){
    G.aiScore++; goalEvt('😅 被进球了...');
  }

  function aiShoot(ai){
    var gx = -5+rand(0,10);
    var a2 = Math.atan2(gx-ai.x, 64-ai.z);
    var pwr = 7+rand(0,4);
    ball.vx=Math.sin(a2)*pwr; ball.vz=Math.cos(a2)*pwr;
    ball.owner=null; ai.hasBall=false; ai.kickTimer=30;
    beep(600,0.1);
  }
  function aiPass(ai){
    var ts=[];
    for(var j=0;j<aiTeam.length;j++){
      if(aiTeam[j]!==ai&&dist(aiTeam[j].x,aiTeam[j].z,ai.x,ai.z)<40)
        ts.push(aiTeam[j]);
    }
    if(!ts.length) return;
    var t=ts[Math.floor(rand(0,ts.length))];
    var a2=Math.atan2(t.x-ai.x, t.z-ai.z);
    ball.vx=Math.sin(a2)*(4+rand(0,2));
    ball.vz=Math.cos(a2)*(4+rand(0,2));
    ball.owner=null; ai.hasBall=false; ai.kickTimer=20;
    beep(500,0.06);
  }
}

// ---- 进球 ----
function goalEvt(text){
  G.state='goal'; G.goalCD=120;
  updateHUD();
  document.getElementById('gTitle').textContent=text;
  document.getElementById('gScore').textContent=G.myScore+' - '+G.aiScore;
  document.getElementById('gInfo').textContent=G.myScore>G.aiScore?'领先！':(G.myScore<G.aiScore?'落后':'平局');
  document.getElementById('sGoal').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
  beep(800,0.2);
  setTimeout(function(){beep(1000,0.15);},200);
}

function resumeGame(){
  document.getElementById('sGoal').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  G.state='playing';
  ball.x=0; ball.z=0; ball.vx=0; ball.vz=0; ball.owner=null;
  resetPos();
  updateHUD();
}

function resetPos(){
  var mp=[[0,-35],[-10,-47],[-10,-23],[-25,-43],[-25,-27]];
  for(var i=0;i<5;i++){myTeam[i].x=mp[i][0];myTeam[i].z=mp[i][1];myTeam[i].hasBall=false;}
  var ap=[[0,35],[-10,47],[-10,23],[-25,43],[-25,27]];
  for(var i=0;i<5;i++){aiTeam[i].x=ap[i][0];aiTeam[i].z=ap[i][1];aiTeam[i].hasBall=false;}
  cam.x=0; cam.z=-35;
}

function showHalf(){
  document.getElementById('hTitle').textContent=G.state==='halftime'?'⏸ 中场休息':'🏁 比赛结束！';
  document.getElementById('hScore').textContent=G.myScore+' - '+G.aiScore;
  document.getElementById('hBtn').textContent=G.state==='halftime'?'▶ 下半场':'🔄 再来一局';
  document.getElementById('hBtn').onclick=G.state==='halftime'?nextHalf:restartMatch;
  var d=G.myScore-G.aiScore;
  document.getElementById('hInfo').textContent=d>0?'🎉 领先'+d+'球！':d<0?'😤 落后'+(-d)+'球':'🤝 平局';
  document.getElementById('sHalf').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
}

function nextHalf(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  G.half=2; G.timer=90*60; G.state='playing';
  resetPos(); ball.x=0; ball.z=0; ball.vx=0; ball.vz=0; ball.owner=null;
  updateHUD();
}

function restartMatch(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

function updateHUD(){
  if(!G)return;
  document.getElementById('hMy').textContent=G.myScore;
  document.getElementById('hAi').textContent=G.aiScore;
  var min=Math.floor(G.timer/3600);
  var sec=Math.floor((G.timer%3600)/60);
  document.getElementById('hTime').textContent=(G.half===1?'上':'下')+min+':'+(sec<10?'0':'')+sec;
}

// ---- 传球/射门 ----
function tryPass(){
  if(!G||G.state!=='playing')return;
  var me=myTeam[0];
  if(!me||(!ctrl.dribbling&&dist(me.x,me.z,ball.x,ball.z)>5))return;
  ctrl.aimMode='pass'; ctrl.aimPower=0; ctrl.aimAngle=cam.rotY;
  document.getElementById('powerBarBg').classList.add('on');
}
function tryShoot(){
  if(!G||G.state!=='playing')return;
  var me=myTeam[0];
  if(!me||(!ctrl.dribbling&&dist(me.x,me.z,ball.x,ball.z)>5))return;
  ctrl.aimMode='shoot'; ctrl.aimPower=0; ctrl.aimAngle=cam.rotY;
  document.getElementById('powerBarBg').classList.add('on');
}
function execPass(){
  if(ctrl.aimMode!=='pass')return;
  var me=myTeam[0]; if(!me)return;
  var pwr=5+ctrl.aimPower*0.06;
  ball.vx=Math.sin(ctrl.aimAngle)*pwr;
  ball.vz=Math.cos(ctrl.aimAngle)*pwr;
  ball.owner=null; me.hasBall=false;
  ctrl.aimMode=null;
  document.getElementById('powerBarBg').classList.remove('on');
  beep(500,0.08);
}
function execShoot(){
  if(ctrl.aimMode!=='shoot')return;
  var me=myTeam[0]; if(!me)return;
  var pwr=Math.min(16,7+ctrl.aimPower*0.09);
  ball.vx=Math.sin(ctrl.aimAngle)*pwr;
  ball.vz=Math.cos(ctrl.aimAngle)*pwr;
  ball.owner=null; me.hasBall=false;
  ctrl.aimMode=null;
  document.getElementById('powerBarBg').classList.remove('on');
  beep(800,0.15);
}
function cancelAim(){ctrl.aimMode=null;document.getElementById('powerBarBg').classList.remove('on');}

function updateAim(cx, cy){
  if(!ctrl.aimMode)return;
  // 屏幕位置映射到角度
  var angle = cam.rotY + (cx/W - 0.5) * 2.0;
  ctrl.aimAngle = angle;
  var pwr = clamp(Math.abs(cy-H*0.5)/H*500, 0, 300);
  ctrl.aimPower = pwr;
  document.getElementById('powerBarFill').style.width = Math.min(100,pwr/300*100)+'%';
}

// ---- 音效 ----
function beep(freq,dur){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ac.createOscillator();var g=ac.createGain();
    osc.connect(g);g.connect(ac.destination);
    osc.frequency.value=freq;g.gain.value=0.05;
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||0.1));
    osc.start();osc.stop(ac.currentTime+(dur||0.1));
  }catch(e){}
}

// ---- 触屏 ----
var joyEl=document.getElementById('joyArea'), knobEl=document.getElementById('joyKnob'), joyId=null;
joyEl.addEventListener('touchstart',function(e){e.preventDefault();joyId=e.changedTouches[0].identifier;jUp(e.changedTouches[0]);});
joyEl.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===joyId)jUp(t);});
joyEl.addEventListener('touchend',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===joyId){joyId=null;joyX=0;joyZ=0;knobEl.style.top='38px';knobEl.style.left='38px';}});
joyEl.addEventListener('touchcancel',function(){joyId=null;joyX=0;joyZ=0;knobEl.style.top='38px';knobEl.style.left='38px';});
function jUp(t){
  var rect=joyEl.getBoundingClientRect();
  var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  var dx=t.clientX-cx, dy=t.clientY-cy;
  var mr=rect.width/2-8, len=Math.hypot(dx,dy);
  if(len>mr){dx=dx/len*mr;dy=dy/len*mr;}
  var n=Math.min(1,len/mr);
  joyX=(dx/mr)*n*1.2;
  joyZ=-(dy/mr)*n*1.2;
  knobEl.style.left=(38+dx)+'px';knobEl.style.top=(38+dy)+'px';
}

// 视角
var lookEl=document.getElementById('lookArea'), lookId=null, llx=null, lly=null;
lookEl.addEventListener('touchstart',function(e){e.preventDefault();
  lookEl.querySelector('.hint-text').style.display='none';
  var t=e.changedTouches[0];lookId=t.identifier;llx=t.clientX;lly=t.clientY;
});
lookEl.addEventListener('touchmove',function(e){e.preventDefault();
  for(var t of e.changedTouches)if(t.identifier===lookId){
    var dx=(t.clientX-llx)*0.004, dy=(t.clientY-lly)*0.004;
    lookDX=dx;lookDY=dy;llx=t.clientX;lly=t.clientY;
  }
});
lookEl.addEventListener('touchend',function(e){e.preventDefault();
  for(var t of e.changedTouches)if(t.identifier===lookId){lookId=null;llx=null;lly=null;lookDX=0;lookDY=0;}
});
lookEl.addEventListener('touchcancel',function(){lookId=null;llx=null;lly=null;lookDX=0;lookDY=0;});

// ---- 鼠标 ----
var md=false, mx=0, myy=0;
ca.addEventListener('mousedown',function(e){md=true;mx=e.clientX;myy=e.clientY;});
window.addEventListener('mousemove',function(e){
  if(md){var dx=(e.clientX-mx)*0.005, dy=(e.clientY-myy)*0.005;lookDX=dx;lookDY=dy;mx=e.clientX;myy=e.clientY;}
  else{lookDX=0;lookDY=0;}
});
window.addEventListener('mouseup',function(){md=false;lookDX=0;lookDY=0;});

// ---- 键盘 ----
document.addEventListener('keydown',function(e){
  switch(e.key){
    case 'w':case 'W':joyZ=1;break;
    case 's':case 'S':joyZ=-1;break;
    case 'a':case 'A':joyX=-1;break;
    case 'd':case 'D':joyX=1;break;
    case ' ':e.preventDefault();ctrl.dribbling=true;break;
    case '1':tryShoot();break;
    case '2':tryPass();break;
    case 'Enter':if(ctrl.aimMode==='pass')execPass();else if(ctrl.aimMode==='shoot')execShoot();break;
    case 'Escape':cancelAim();break;
  }
});
document.addEventListener('keyup',function(e){
  switch(e.key){
    case 'w':case 'W':case 's':case 'S':joyZ=0;break;
    case 'a':case 'A':case 'd':case 'D':joyX=0;break;
    case ' ':ctrl.dribbling=false;break;
  }
});

// ---- 按钮 ----
document.getElementById('btnDrib').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.dribbling=true;this.classList.add('active');});
document.getElementById('btnDrib').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.dribbling=false;this.classList.remove('active');});
document.getElementById('btnDrib').addEventListener('touchcancel',function(){ctrl.dribbling=false;this.classList.remove('active');});

var pBtn=document.getElementById('btnPass'), pId=null;
pBtn.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.changedTouches[0];pId=t.identifier;tryPass();this.classList.add('active');});
pBtn.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===pId&&ctrl.aimMode==='pass')updateAim(t.clientX,t.clientY);});
pBtn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();pId=null;this.classList.remove('active');if(ctrl.aimMode==='pass')execPass();});
pBtn.addEventListener('touchcancel',function(){pId=null;this.classList.remove('active');cancelAim();});

var sBtn=document.getElementById('btnShoot'), sId=null;
sBtn.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.changedTouches[0];sId=t.identifier;tryShoot();this.classList.add('active');});
sBtn.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===sId&&ctrl.aimMode==='shoot')updateAim(t.clientX,t.clientY);});
sBtn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();sId=null;this.classList.remove('active');if(ctrl.aimMode==='shoot')execShoot();});
sBtn.addEventListener('touchcancel',function(){sId=null;this.classList.remove('active');cancelAim();});

document.getElementById('btnSprint').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.sprinting=true;});
document.getElementById('btnSprint').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.sprinting=false;});
document.getElementById('btnSprint').addEventListener('touchcancel',function(){ctrl.sprinting=false;});

// ---- 启动 ----
function startGame(){
  document.getElementById('sMenu').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

// ---- 主循环 ----
function loop(){
  update();
  render();
  lookDX*=0.85; lookDY*=0.85;
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
