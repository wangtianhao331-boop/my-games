<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚽ 街头足球</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1a0a;font-family:sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
.ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.ov.on{display:flex}
.pn{background:linear-gradient(145deg,#1a1a3a,#0d0d2b);border:2px solid #4488ff;border-radius:16px;padding:24px;text-align:center;color:#fff;max-width:360px;width:90%}
.pn h1{font-size:26px;color:#ffd700;margin-bottom:4px}
.pn p{color:#99a;font-size:13px;margin-bottom:8px}
.pn .btn{display:inline-block;padding:10px 28px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff;margin:4px;background:linear-gradient(145deg,#ff6b35,#e55a2b)}
.pn .btn:active{transform:scale(0.95)}
.pn .btn.bl{background:linear-gradient(145deg,#44b4ff,#2a8acc)}
.pn .bsc{font-size:48px;color:#ffd700;font-weight:bold;margin:6px 0}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);color:#fff;pointer-events:none;font-size:12px}
#hud .s{font-size:22px;font-weight:bold;color:#ffd700}
#hud .t{font-size:14px;color:#88ddff}
#pbar{position:fixed;left:15%;right:15%;bottom:210px;z-index:30;height:10px;background:rgba(0,0,0,0.5);border-radius:5px;border:1px solid rgba(255,255,255,0.1);display:none;overflow:hidden}
#pbar.on{display:block}
#pfill{height:100%;width:0;border-radius:5px;background:linear-gradient(90deg,#44ff44,#ffd43b,#ff4444)}
#tc{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#tc.on{display:block}
@media(hover:none)and(pointer:coarse){#tc.on{display:block}}
#joy{position:absolute;left:14px;bottom:18px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none}
#jk{position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(68,180,255,0.35);border:2px solid rgba(68,180,255,0.55);top:31px;left:31px;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.5)}
#rb{position:absolute;right:6px;bottom:14px;display:flex;flex-direction:column;gap:5px;pointer-events:auto}
.rb{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:15px;color:#fff;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.1s;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.04)}
.rb:active{transform:scale(0.88)}
.rb .l{font-size:7px;opacity:0.6;margin-top:1px}
.drb{background:rgba(68,180,255,0.25);border-color:rgba(68,180,255,0.45)}
.drb.on{background:rgba(68,180,255,0.6);border-color:#44b4ff}
.psb{background:rgba(255,212,59,0.25);border-color:rgba(255,212,59,0.45)}
.stb{background:rgba(255,107,53,0.25);border-color:rgba(255,107,53,0.45)}
.br{display:flex;gap:4px;justify-content:flex-end}
.smb{width:38px;height:38px;font-size:12px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud"><div><span>🇨🇳</span> <span class="s" id="hm">0</span></div><div class="t" id="ht">90:00</div><div><span class="s" id="ha">0</span> <span>🏴󠁧󠁢󠁥󠁮󠁧󠁿</span></div></div>
<div id="pbar"><div id="pfill"></div></div>

<div id="tc">
  <div id="joy"><div id="jk">⚽</div></div>
  <div id="rb">
    <div class="br"><div class="rb drb" id="bd">🏃<span class="l">带球</span></div><div class="rb psb" id="bp">⚡<span class="l">传球</span></div><div class="rb stb" id="bs">🎯<span class="l">射门</span></div></div>
    <div class="br"><div class="rb smb" id="bsp">💨</div><div class="rb smb" id="bst" style="background:rgba(255,200,50,0.25);border-color:rgba(255,200,50,0.45)">💪<span class="l">抢球</span></div></div>
  </div>
</div>

<div class="ov on" id="sm"><div class="pn"><h1>⚽ 街头足球</h1><p>5v5 · 带球/传球/射门</p><p style="font-size:11px;color:#556">🎮 摇杆移动 · 按钮操作</p><button class="btn" onclick="startGame()">▶ 开球！</button></div></div>
<div class="ov" id="sg"><div class="pn"><h1 id="gt">⚽ 进球！</h1><div class="bsc" id="gs">0-0</div><p id="gi"></p><button class="btn bl" onclick="resume()">继续</button></div></div>
<div class="ov" id="sh"><div class="pn"><h1 id="ht2">⏸ 中场</h1><div class="bsc" id="hs">0-0</div><p id="hi"></p><button class="btn bl" id="hb" onclick="nextHalf()">下半场</button></div></div>

<script>
// ============================================================
//  ⚽ 街头足球 - 纯Canvas 2D 俯瞰版
//  零外部依赖，秒开
// ============================================================

// 全局错误捕获，防止白屏
window.onerror = function(msg, url, line){
  var ca2 = document.getElementById('c');
  if(ca2){
    var ctx = ca2.getContext('2d');
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0,0,ca2.width,ca2.height);
    ctx.fillStyle = '#ff6b6b';
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('加载错误: '+msg, ca2.width/2, ca2.height/2);
    ctx.fillStyle = '#889';
    ctx.font = '11px Arial';
    ctx.fillText('行'+line, ca2.width/2, ca2.height/2+24);
  }
};

var ca = document.getElementById('c'), cx = ca.getContext('2d');
var W, H;

function resize(){
  W = ca.width = window.innerWidth;
  H = ca.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---- 工具 ----
var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function dist(x1,y1,x2,y2){return Math.hypot(x2-x1, y2-y1)}
function clamp(v,mi,ma){return Math.max(mi,Math.min(ma,v))}
function rand(mi,ma){return Math.random()*(ma-mi)+mi}
function lerp(a,b,t){return a+(b-a)*t}

// ---- 球场尺寸（虚拟坐标）----
var FW = 700, FH = 450; // 球场逻辑尺寸
var GOAL_W = 70, GOAL_D = 15;

// ---- 游戏状态 ----
var G = null;
var ctrl = {mx:0, my:0, drib:false, sprint:false, steal:false, aim:null, pwr:0};

// ---- 球员 ----
var myTeam = [], aiTeam = [];
var ball = {x:0,y:0,vx:0,vy:0,owner:null};

// ---- 工具：绘制圆形球员 ----
function drawSoccerPlayer(ctx, x, y, radius, color, number, isMe, hasBall){
  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x+2, y+radius+2, radius*0.7, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // 身体
  var grad = ctx.createRadialGradient(x-radius*0.3, y-radius*0.3, 0, x, y, radius);
  grad.addColorStop(0, lighten(color, 40));
  grad.addColorStop(0.7, color);
  grad.addColorStop(1, darken(color, 30));
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = isMe ? 12 : 4;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 球衣号
  ctx.fillStyle = '#fff';
  ctx.font = 'bold '+Math.max(8, radius*0.7)+'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(number, x, y-1);

  // 高亮边框（选中的球员）
  if(isMe){
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(x, y, radius+3, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // 脚下球标记
  if(hasBall){
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(x, y+radius+2, 3, 0, Math.PI*2);
    ctx.fill();
  }
}

function lighten(hex, amt){
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')';
}
function darken(hex, amt){
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.max(0,r-amt)+','+Math.max(0,g-amt)+','+Math.max(0,b-amt)+')';
}

// ---- 创建球员 ----
function makeTeam(baseX, baseY, color, isUserTeam){
  var t = [];
  // 阵型：4-1（一个前锋+两个边锋+两个后卫）
  var offsets = isUserTeam
    ? [[0,0],[-40,-50],[40,-50],[-30,-90],[30,-90]]
    : [[0,0],[-40,50],[40,50],[-30,90],[30,90]];
  for(var i=0;i<5;i++){
    t.push({
      x:baseX+offsets[i][0], y:baseY+offsets[i][1],
      baseX:baseX+offsets[i][0], baseY:baseY+offsets[i][1],
      vx:0, vy:0, radius:14, color:color,
      speed:i===0?4.5:3.5, sprintS:6.5,
      hasBall:false, kickTimer:0,
      isUser: isUserTeam && i===0,
      num: i===0?'★':''+(i+1),
      aiTimer:rand(0,100),
    });
  }
  return t;
}

// ---- 初始化比赛 ----
function startGame(){
  document.getElementById('sm').classList.remove('on');
  document.getElementById('tc').classList.add('on');
  initMatch();
}

function initMatch(){
  G = {half:1, timer:90*60, myS:0, aiS:0, state:'playing', cd:0};
  myTeam = makeTeam(FW*0.25, FH/2, '#44b4ff', true);
  aiTeam = makeTeam(FW*0.75, FH/2, '#ff6b6b', false);
  ball.x = FW/2; ball.y = FH/2-10;
  ball.vx = 0; ball.vy = 0; ball.owner = null;
  ctrl.drib = false; ctrl.aim = null; ctrl.mx = 0; ctrl.my = 0;
  hud();
}

// ---- 游戏更新 ----
function update(){
  if(!G||G.state!=='playing') return;

  G.timer--;
  if(G.timer%60===0) hud();
  if(G.timer<=0){
    if(G.half===1){G.state='halftime';showHalf();}
    else{G.state='end';showHalf();}
    return;
  }
  if(G.cd>0){G.cd--;return;}

  var me = myTeam[0];
  var spd = ctrl.sprint ? me.sprintS : me.speed;

  // ---- 玩家移动 ----
  if(Math.abs(ctrl.mx)>0.05||Math.abs(ctrl.my)>0.05){
    me.x += ctrl.mx * spd * 1.5;
    me.y += ctrl.my * spd * 1.5;
  }
  me.x = clamp(me.x, 20, FW-20);
  me.y = clamp(me.y, 20, FH-20);

  // ---- 带球 ----
  if(ctrl.drib){
    if(ball.owner===null && dist(me.x,me.y,ball.x,ball.y)<30){
      ball.owner='my'; me.hasBall=true;
    }
    if(ball.owner==='my'){
      ball.x = me.x + 12;
      ball.y = me.y - 3;
      ball.vx*=0.8; ball.vy*=0.8;
    }
  } else {
    if(ball.owner==='my' && dist(me.x,me.y,ball.x,ball.y)>25){
      ball.owner=null; me.hasBall=false;
    }
  }

  // ---- 抢球（靠近带球对手时按抢球键）----
  if(ctrl.steal || ctrl.sprint){
    for(var i=0;i<aiTeam.length;i++){
      var ai=aiTeam[i];
      if(ai.hasBall && dist(me.x,me.y,ai.x,ai.y)<30){
        // 抢到了！
        ai.hasBall=false;
        ball.owner='my';
        me.hasBall=true;
        ball.vx = (me.x-ai.x)*0.5;
        ball.vy = (me.y-ai.y)*0.5;
        beep(400,0.1);
        break;
      }
    }
  }
  // 靠近带球对手也会自动逼抢
  for(var i=0;i<aiTeam.length;i++){
    var ai=aiTeam[i];
    if(ai.hasBall && dist(me.x,me.y,ai.x,ai.y)<18){
      // 身体对抗，球掉了
      ai.hasBall=false;
      ball.owner=null;
      ball.vx = (ball.x-me.x)*0.8;
      ball.vy = (ball.y-me.y)*0.8;
      beep(300,0.06);
    }
  }

  // ---- 队友AI ----
  for(var i=1;i<myTeam.length;i++){
    var p=myTeam[i];
    var hasBall = ctrl.drib||ball.owner==='my';
    var ttx = p.baseX + (hasBall?40:0);
    var tty = p.baseY + (hasBall?0:0) + Math.sin(Date.now()*0.002+i*2)*10;
    p.x += (ttx-p.x)*0.04;
    p.y += (tty-p.y)*0.04;
    p.x=clamp(p.x,20,FW-20);
    p.y=clamp(p.y,20,FH-20);
  }

  // ---- AI对手 ----
  for(var i=0;i<aiTeam.length;i++){
    var ai=aiTeam[i];
    if(ai.kickTimer>0) ai.kickTimer--;
    var bd=dist(ai.x,ai.y,ball.x,ball.y);

    var near=true;
    for(var j=0;j<aiTeam.length;j++){
      if(j!==i && dist(aiTeam[j].x,aiTeam[j].y,ball.x,ball.y)<bd-8)
      {near=false;break;}
    }

    if(near && bd<250 && ball.owner!=='my'){
      var a=Math.atan2(ball.y-ai.y, ball.x-ai.x);
      ai.x+=Math.cos(a)*ai.speed*1.2;
      ai.y+=Math.sin(a)*ai.speed*1.2;
      if(bd<18){
        ai.hasBall=true; ball.owner='ai';
        ball.x=ai.x-12; ball.y=ai.y+3;
        ball.vx*=0.8; ball.vy*=0.8;
      } else ai.hasBall=false;
      if(ai.hasBall){
        ball.x=ai.x-12; ball.y=ai.y+3;
        if(ai.x>FW*0.55 && Math.random()<0.012) aiShoot(ai);
        else if(Math.random()<0.008) aiPass(ai);
      }
    } else {
      ai.x+=(ai.baseX-ai.x)*0.025;
      ai.y+=(ai.baseY-ai.y)*0.025;
      ai.hasBall=false;
    }
    ai.x=clamp(ai.x,20,FW-20);
    ai.y=clamp(ai.y,20,FH-20);
  }

  // ---- 球物理 ----
  ball.vx*=0.98; ball.vy*=0.98;
  ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.x<5||ball.x>FW-5){ball.x=clamp(ball.x,5,FW-5);ball.vx*=-0.4;}
  if(ball.y<5||ball.y>FH-5){ball.y=clamp(ball.y,5,FH-5);ball.vy*=-0.4;}
  if(Math.abs(ball.vx)<0.1&&Math.abs(ball.vy)<0.1){ball.vx=0;ball.vy=0;}

  if(ball.owner==='my' && dist(me.x,me.y,ball.x,ball.y)>30){ball.owner=null;me.hasBall=false;}
  if(ball.owner==='ai'){
    var f=false;
    for(var i=0;i<aiTeam.length;i++){if(aiTeam[i].hasBall&&dist(aiTeam[i].x,aiTeam[i].y,ball.x,ball.y)<20){f=true;break;}}
    if(!f) ball.owner=null;
  }

  // ---- 进球 ----
  // 对方球门（右侧）
  if(ball.x>FW-5 && ball.y>FH/2-GOAL_W/2 && ball.y<FH/2+GOAL_W/2){
    G.myS++; goalEvt('⚽ 进球！！');
  }
  // 我方球门（左侧）
  if(ball.x<5 && ball.y>FH/2-GOAL_W/2 && ball.y<FH/2+GOAL_W/2){
    G.aiS++; goalEvt('😅 被进了...');
  }

  function aiShoot(ai){
    var gy=FH/2+rand(-GOAL_W/2, GOAL_W/2);
    var a2=Math.atan2(gy-ai.y, FW-ai.x);
    var pw=5+rand(0,3);
    ball.vx=Math.cos(a2)*pw; ball.vy=Math.sin(a2)*pw;
    ball.owner=null; ai.hasBall=false; ai.kickTimer=30;
    beep(600,0.08);
  }
  function aiPass(ai){
    var ts=[];
    for(var j=0;j<aiTeam.length;j++){if(aiTeam[j]!==ai&&dist(aiTeam[j].x,aiTeam[j].y,ai.x,ai.y)<150)ts.push(aiTeam[j]);}
    if(!ts.length) return;
    var t=ts[Math.floor(Math.random()*ts.length)];
    var a2=Math.atan2(t.y-ai.y, t.x-ai.x);
    ball.vx=Math.cos(a2)*(3+rand(0,2));
    ball.vy=Math.sin(a2)*(3+rand(0,2));
    ball.owner=null; ai.hasBall=false; ai.kickTimer=20;
    beep(500,0.05);
  }
}

// ---- 传球/射门 ----
function doPass(){
  if(!G||G.state!=='playing')return;
  var me=myTeam[0];
  if(!me||(!ctrl.drib&&dist(me.x,me.y,ball.x,ball.y)>25))return;
  ctrl.aim='pass'; ctrl.pwr=0;
  document.getElementById('pbar').classList.add('on');
}
function doShoot(){
  if(!G||G.state!=='playing')return;
  var me=myTeam[0];
  if(!me||(!ctrl.drib&&dist(me.x,me.y,ball.x,ball.y)>25))return;
  ctrl.aim='shoot'; ctrl.pwr=0;
  document.getElementById('pbar').classList.add('on');
}
function exec(){
  if(!ctrl.aim)return;
  var me=myTeam[0];if(!me)return;
  var isS=ctrl.aim==='shoot';
  var pw=isS?Math.min(14,5+ctrl.pwr*0.07):4+ctrl.pwr*0.05;
  // 朝面向方向踢（根据最近的移动方向）
  var angle=0;
  if(Math.abs(ctrl.mx)>0.05||Math.abs(ctrl.my)>0.05){
    angle=Math.atan2(ctrl.my, ctrl.mx);
  } else {
    angle=Math.atan2(aiTeam[0].y-me.y, aiTeam[0].x-me.x);
  }
  ball.vx=Math.cos(angle)*pw;
  ball.vy=Math.sin(angle)*pw;
  ball.owner=null; me.hasBall=false;
  ctrl.aim=null;
  document.getElementById('pbar').classList.remove('on');
  beep(isS?800:500,isS?0.12:0.06);
}
function aimUp(cx,cy){
  if(!ctrl.aim)return;
  var p=Math.max(0,(window.innerHeight*0.7-cy)/window.innerHeight*400);
  p=Math.min(p,300);
  ctrl.pwr=p;
  document.getElementById('pfill').style.width=Math.min(100,p/300*100)+'%';
}

// ---- 渲染 ----
function render(){
  cx.clearRect(0,0,W,H);

  // 计算缩放和偏移（使球场居中）
  var scale = Math.min(W/FW, H/FH) * 0.92;
  var ox = (W - FW*scale)/2;
  var oy = (H - FH*scale)/2;

  cx.save();
  cx.translate(ox, oy);
  cx.scale(scale, scale);

  // ---- 画球场 ----
  // 草地
  var grass = cx.createLinearGradient(0,0,FW,FH);
  grass.addColorStop(0,'#3a9a4a');
  grass.addColorStop(0.3,'#4aaa5a');
  grass.addColorStop(0.6,'#3a9a4a');
  grass.addColorStop(1,'#2d8a3a');
  cx.fillStyle = grass;
  cx.fillRect(0,0,FW,FH);

  // 草纹
  cx.globalAlpha = 0.03;
  for(var i=0;i<40;i++){
    cx.strokeStyle = '#fff';
    cx.lineWidth = 0.5;
    var lx = (i*31+7)%FW;
    cx.beginPath();
    cx.moveTo(lx,0);
    cx.lineTo(lx+15,FH);
    cx.stroke();
  }
  cx.globalAlpha = 1;

  // 边线
  cx.strokeStyle = 'rgba(255,255,255,0.5)';
  cx.lineWidth = 2;
  cx.strokeRect(3,3,FW-6,FH-6);

  // 中线
  cx.beginPath();
  cx.moveTo(FW/2,3);
  cx.lineTo(FW/2,FH-3);
  cx.stroke();

  // 中圈
  cx.beginPath();
  cx.arc(FW/2,FH/2,45,0,Math.PI*2);
  cx.stroke();

  // 禁区
  cx.strokeRect(0,FH/2-95,55,190);
  cx.strokeRect(FW-55,FH/2-95,55,190);
  cx.strokeRect(0,FH/2-40,25,80);
  cx.strokeRect(FW-25,FH/2-40,25,80);

  // 球门
  cx.fillStyle = 'rgba(255,255,255,0.2)';
  cx.fillRect(0,FH/2-GOAL_W/2,3,GOAL_W);
  cx.fillRect(FW-3,FH/2-GOAL_W/2,3,GOAL_W);
  cx.strokeStyle = '#fff';
  cx.lineWidth = 2;
  cx.strokeRect(0,FH/2-GOAL_W/2,3,GOAL_W);
  cx.strokeRect(FW-3,FH/2-GOAL_W/2,3,GOAL_W);
  // 球网
  cx.strokeStyle = 'rgba(255,255,255,0.08)';
  cx.lineWidth = 0.5;
  for(var i=0;i<GOAL_W;i+=8){
    cx.beginPath();
    cx.moveTo(0,FH/2-GOAL_W/2+i);
    cx.lineTo(8,FH/2-GOAL_W/2+i);
    cx.stroke();
    cx.beginPath();
    cx.moveTo(FW,FH/2-GOAL_W/2+i);
    cx.lineTo(FW-8,FH/2-GOAL_W/2+i);
    cx.stroke();
  }

  // ---- 画球员 ----
  var allPlayers = [];
  for(var i=0;i<myTeam.length;i++) allPlayers.push({p:myTeam[i], isMe:i===0, isAi:false});
  for(var i=0;i<aiTeam.length;i++) allPlayers.push({p:aiTeam[i], isMe:false, isAi:true});

  // 先画远的（按Y排序）
  allPlayers.sort(function(a,b){return a.p.y - b.p.y});

  for(var i=0;i<allPlayers.length;i++){
    var pp = allPlayers[i].p;
    drawSoccerPlayer(cx, pp.x, pp.y, pp.radius, pp.color, pp.num, allPlayers[i].isMe, pp.hasBall);
  }

  // ---- 画球 ----
  // 阴影
  cx.fillStyle = 'rgba(0,0,0,0.12)';
  cx.beginPath();
  cx.ellipse(ball.x+2, ball.y+4, 6, 3, 0, 0, Math.PI*2);
  cx.fill();
  // 球体
  var ballGrad = cx.createRadialGradient(ball.x-2, ball.y-2,0, ball.x,ball.y,8);
  ballGrad.addColorStop(0,'#ffffff');
  ballGrad.addColorStop(0.5,'#f0f0f0');
  ballGrad.addColorStop(1,'#ccc');
  cx.fillStyle = ballGrad;
  cx.shadowColor = 'rgba(255,255,255,0.1)';
  cx.shadowBlur = 5;
  cx.beginPath();
  cx.arc(ball.x, ball.y, 7, 0, Math.PI*2);
  cx.fill();
  cx.shadowBlur = 0;
  // 五边形花纹
  cx.strokeStyle = 'rgba(0,0,0,0.08)';
  cx.lineWidth = 0.8;
  for(var pi=0;pi<5;pi++){
    var a=pi*1.256+ball.x*0.01;
    cx.beginPath();
    cx.moveTo(ball.x+Math.cos(a)*4, ball.y+Math.sin(a)*4);
    cx.lineTo(ball.x+Math.cos(a+0.5)*6, ball.y+Math.sin(a+0.5)*6);
    cx.stroke();
  }

  // ---- 传球/射门指示 ----
  if(ctrl.aim){
    var me=myTeam[0];
    if(me){
      var angle=0;
      if(Math.abs(ctrl.mx)>0.05||Math.abs(ctrl.my)>0.05){
        angle=Math.atan2(ctrl.my, ctrl.mx);
      } else {
        angle=Math.atan2(aiTeam[0].y-me.y, aiTeam[0].x-me.x);
      }
      var len = 30 + ctrl.pwr*0.15;
      var tx = me.x + Math.cos(angle)*len;
      var ty = me.y + Math.sin(angle)*len;
      var isS = ctrl.aim==='shoot';

      cx.strokeStyle = isS ? 'rgba(255,107,53,0.6)' : 'rgba(255,212,59,0.6)';
      cx.lineWidth = isS ? 2.5 : 1.5;
      cx.setLineDash([6,4]);
      cx.beginPath();
      cx.moveTo(me.x, me.y);
      cx.lineTo(tx, ty);
      cx.stroke();
      cx.setLineDash([]);

      // 瞄准圈
      var pct = Math.min(1, ctrl.pwr/300);
      cx.strokeStyle = isS ? '#ff6b35' : '#ffd43b';
      cx.lineWidth = 1.5;
      cx.globalAlpha = 0.3+pct*0.4;
      cx.beginPath();
      cx.arc(tx, ty, 5+pct*8, 0, Math.PI*2);
      cx.stroke();
      cx.globalAlpha = 1;
    }
  }

  // ---- 带球指示 ----
  if(ctrl.drib){
    var me=myTeam[0];
    cx.strokeStyle = 'rgba(68,180,255,0.25)';
    cx.lineWidth = 1.5;
    cx.setLineDash([3,5]);
    cx.beginPath();
    cx.arc(me.x, me.y, me.radius+5, 0, Math.PI*2);
    cx.stroke();
    cx.setLineDash([]);
  }

  // ---- 小地图 ----
  var mmW=80, mmH=50, mmX=FW-mmW-10, mmY=10;
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.fillRect(mmX, mmY, mmW, mmH);
  cx.strokeStyle = 'rgba(255,255,255,0.1)';
  cx.lineWidth = 0.5;
  cx.strokeRect(mmX, mmY, mmW, mmH);

  // 我方
  for(var i=0;i<myTeam.length;i++){
    cx.fillStyle = '#44b4ff';
    cx.beginPath();
    cx.arc(mmX+myTeam[i].x/FW*mmW, mmY+myTeam[i].y/FH*mmH, 2.5, 0, Math.PI*2);
    cx.fill();
  }
  // AI
  for(var i=0;i<aiTeam.length;i++){
    cx.fillStyle = '#ff6b6b';
    cx.beginPath();
    cx.arc(mmX+aiTeam[i].x/FW*mmW, mmY+aiTeam[i].y/FH*mmH, 2.5, 0, Math.PI*2);
    cx.fill();
  }
  // 球
  cx.fillStyle = '#fff';
  cx.beginPath();
  cx.arc(mmX+ball.x/FW*mmW, mmY+ball.y/FH*mmH, 2, 0, Math.PI*2);
  cx.fill();

  cx.restore();
}

// ---- UI ----
function goalEvt(t){
  G.state='goal'; G.cd=150;
  hud();
  document.getElementById('gt').textContent=t;
  document.getElementById('gs').textContent=G.myS+' - '+G.aiS;
  document.getElementById('gi').textContent=G.myS>G.aiS?'领先！':(G.myS<G.aiS?'落后':'平局');
  document.getElementById('sg').classList.add('on');
  document.getElementById('tc').classList.remove('on');
  beep(800,0.2);
  setTimeout(function(){beep(1000,0.1);},200);
}

function resume(){
  document.getElementById('sg').classList.remove('on');
  document.getElementById('tc').classList.add('on');
  G.state='playing'; G.cd=60;
  resetPos();
}

function resetPos(){
  var mp=[[FW*0.25,FH/2],[FW*0.25-40,FH/2-50],[FW*0.25+40,FH/2+50],[FW*0.25-30,FH/2-90],[FW*0.25+30,FH/2+90]];
  for(var i=0;i<5;i++){myTeam[i].x=mp[i][0];myTeam[i].y=mp[i][1];myTeam[i].hasBall=false;}
  var ap=[[FW*0.75,FH/2],[FW*0.75-40,FH/2-50],[FW*0.75+40,FH/2+50],[FW*0.75-30,FH/2-90],[FW*0.75+30,FH/2+90]];
  for(var i=0;i<5;i++){aiTeam[i].x=ap[i][0];aiTeam[i].y=ap[i][1];aiTeam[i].hasBall=false;}
  ball.x=FW/2; ball.y=FH/2; ball.owner=null;
}

function showHalf(){
  document.getElementById('ht2').textContent=G.state==='halftime'?'⏸ 中场休息':'🏁 比赛结束！';
  document.getElementById('hs').textContent=G.myS+' - '+G.aiS;
  document.getElementById('hb').textContent=G.state==='halftime'?'▶ 下半场':'🔄 再来一局';
  document.getElementById('hb').onclick=G.state==='halftime'?nextHalf:restart;
  var d=G.myS-G.aiS;
  document.getElementById('hi').textContent=d>0?'🎉 领先'+d+'球！':d<0?'😤 落后'+(-d)+'球':'🤝 平局';
  document.getElementById('sh').classList.add('on');
  document.getElementById('tc').classList.remove('on');
}

function nextHalf(){
  document.getElementById('sh').classList.remove('on');
  document.getElementById('tc').classList.add('on');
  G.half=2; G.timer=90*60; G.state='playing';
  resetPos(); hud();
}

function restart(){
  document.getElementById('sh').classList.remove('on');
  document.getElementById('tc').classList.add('on');
  initMatch();
}

function hud(){
  if(!G)return;
  document.getElementById('hm').textContent=G.myS;
  document.getElementById('ha').textContent=G.aiS;
  var m=Math.floor(G.timer/3600);
  var s=Math.floor((G.timer%3600)/60);
  document.getElementById('ht').textContent=(G.half===1?'上':'下')+m+':'+(s<10?'0':'')+s;
}

function beep(f,d){try{var ac=new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator();var g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f;g.gain.value=0.04;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(d||0.1));o.start();o.stop(ac.currentTime+(d||0.1));}catch(e){}}

// ==== 触屏 ====
var je=document.getElementById('joy'), jk=document.getElementById('jk'), ji=null;
je.addEventListener('touchstart',function(e){e.preventDefault();ji=e.changedTouches[0].identifier;jup(e.changedTouches[0]);});
je.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===ji)jup(t);});
je.addEventListener('touchend',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===ji){ji=null;ctrl.mx=0;ctrl.my=0;jk.style.top='31px';jk.style.left='31px';}});
je.addEventListener('touchcancel',function(){ji=null;ctrl.mx=0;ctrl.my=0;jk.style.top='31px';jk.style.left='31px';});
function jup(t){
  var r=je.getBoundingClientRect();
  var cx=r.left+r.width/2, cy=r.top+r.height/2;
  var dx=t.clientX-cx, dy=t.clientY-cy;
  var mr=r.width/2-6, l=Math.hypot(dx,dy);
  if(l>mr){dx=dx/l*mr;dy=dy/l*mr;}
  var n=Math.min(1,(l/mr)*1.2);
  ctrl.mx=(dx/mr)*n; ctrl.my=(dy/mr)*n;
  jk.style.left=(31+dx)+'px';jk.style.top=(31+dy)+'px';
}

// ==== 键盘 ====
document.addEventListener('keydown',function(e){
  switch(e.key){
    case 'w':case 'W':ctrl.my=-1;break;
    case 's':case 'S':ctrl.my=1;break;
    case 'a':case 'A':ctrl.mx=-1;break;
    case 'd':case 'D':ctrl.mx=1;break;
    case ' ':e.preventDefault();ctrl.drib=true;break;
    case '1':doShoot();break;
    case '2':doPass();break;
    case '3':ctrl.steal=true;break;
    case 'e':case 'E':ctrl.steal=true;break;
    case 'Enter':exec();break;
    case 'Escape':ctrl.aim=null;document.getElementById('pbar').classList.remove('on');break;
  }
});
document.addEventListener('keyup',function(e){
  switch(e.key){
    case 'w':case 'W':case 's':case 'S':ctrl.my=0;break;
    case 'a':case 'A':case 'd':case 'D':ctrl.mx=0;break;
    case ' ':ctrl.drib=false;break;
    case '3':ctrl.steal=false;break;
    case 'e':case 'E':ctrl.steal=false;break;
  }
});

// ==== 按钮 ====
document.getElementById('bd').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.drib=true;this.classList.add('on');});
document.getElementById('bd').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.drib=false;this.classList.remove('on');});
document.getElementById('bd').addEventListener('touchcancel',function(){ctrl.drib=false;this.classList.remove('on');});

var pb=document.getElementById('bp'), pi=null;
pb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.changedTouches[0];pi=t.identifier;doPass();this.classList.add('on');});
pb.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===pi&&ctrl.aim==='pass')aimUp(t.clientX,t.clientY);});
pb.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();pi=null;this.classList.remove('on');if(ctrl.aim==='pass')exec();});
pb.addEventListener('touchcancel',function(){pi=null;this.classList.remove('on');if(ctrl.aim==='pass'){ctrl.aim=null;document.getElementById('pbar').classList.remove('on');}});

var sb=document.getElementById('bs'), si=null;
sb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();var t=e.changedTouches[0];si=t.identifier;doShoot();this.classList.add('on');});
sb.addEventListener('touchmove',function(e){e.preventDefault();for(var t of e.changedTouches)if(t.identifier===si&&ctrl.aim==='shoot')aimUp(t.clientX,t.clientY);});
sb.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();si=null;this.classList.remove('on');if(ctrl.aim==='shoot')exec();});
sb.addEventListener('touchcancel',function(){si=null;this.classList.remove('on');if(ctrl.aim==='shoot'){ctrl.aim=null;document.getElementById('pbar').classList.remove('on');}});

document.getElementById('bsp').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.sprint=true;});
document.getElementById('bsp').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.sprint=false;});
document.getElementById('bsp').addEventListener('touchcancel',function(){ctrl.sprint=false;});

document.getElementById('bst').addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ctrl.steal=true;this.style.background='rgba(255,200,50,0.5)';});
document.getElementById('bst').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();ctrl.steal=false;this.style.background='';});
document.getElementById('bst').addEventListener('touchcancel',function(){ctrl.steal=false;this.style.background='';});

// ==== 主循环 ====
function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
