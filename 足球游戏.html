<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚽ 3D足球 第一视角</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}

/* 加载提示 */
#loading{position:fixed;inset:0;z-index:200;background:#0a1a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:18px}
#loading .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,0.1);border-top:4px solid #44b4ff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 覆盖面板 */
.ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.ov.on{display:flex}
.pn{background:linear-gradient(145deg,#1a1a3a,#0d0d2b);border:2px solid #4488ff;border-radius:20px;padding:28px 32px;text-align:center;color:#fff;max-width:400px;width:90%;box-shadow:0 0 60px rgba(68,136,255,0.15)}
.pn h1{font-size:30px;color:#ffd700;margin-bottom:6px}
.pn p{color:#99a;font-size:14px;margin-bottom:10px;line-height:1.6}
.pn .btn{display:inline-block;padding:12px 36px;border:none;border-radius:12px;font-size:17px;font-weight:bold;cursor:pointer;color:#fff;margin:5px;background:linear-gradient(145deg,#ff6b35,#e55a2b);transition:all 0.2s;touch-action:manipulation}
.pn .btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,107,53,0.4)}
.pn .btn.bl{background:linear-gradient(145deg,#44b4ff,#2a8acc)}
.pn .btn.gr{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15)}
.pn .big-score{font-size:56px;color:#ffd700;font-weight:bold;margin:8px 0}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.6),transparent);color:#fff;pointer-events:none;font-size:13px}
#hud .score{font-size:22px;font-weight:bold;color:#ffd700}
#hud .timer{font-size:15px;color:#88ddff}
#hud .team-name{font-size:12px;color:#99a}

/* 力度条 */
#powerBarBg{position:fixed;left:10%;right:10%;bottom:210px;z-index:30;height:14px;background:rgba(0,0,0,0.6);border-radius:7px;border:1px solid rgba(255,255,255,0.15);display:none;overflow:hidden}
#powerBarBg.on{display:block}
#powerBarFill{height:100%;width:0%;border-radius:7px;background:linear-gradient(90deg,#44ff44,#ffd43b,#ff4444);transition:width 0.03s}

/* 瞄准圈（地面） */
#aimIndicator{position:fixed;z-index:25;display:none;width:60px;height:60px;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%)}
#aimIndicator.on{display:block}
#aimIndicator.pass{border:2px dashed #ffd43b;background:rgba(255,212,59,0.1)}
#aimIndicator.shoot{border:3px solid #ff6b35;background:rgba(255,107,53,0.12)}
#aimIndicator .arrow{position:absolute;top:50%;left:50%;width:2px;height:40px;background:#ffd43b;transform-origin:bottom center}

/* 触屏控制 */
#touchCtl{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#touchCtl.on{display:block}
@media(hover:none)and(pointer:coarse){#touchCtl.on{display:block}}

/* 左摇杆 */
#joyArea{position:absolute;left:20px;bottom:30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);pointer-events:auto;touch-action:none}
#joyKnob{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(68,180,255,0.35);border:2px solid rgba(68,180,255,0.6);top:41px;left:41px;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,0.6)}
#joyKnob.move{background:rgba(68,180,255,0.6)}

/* 右视角拖动 */
#lookArea{position:absolute;right:0;top:50px;width:40%;height:calc(100% - 50px);pointer-events:auto;touch-action:none}
#lookArea.hint::after{content:'👆 滑动看四周';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.15);font-size:14px;white-space:nowrap}

/* 右侧按钮 */
#rightBtns{position:absolute;right:12px;bottom:20px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.rbtn{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:18px;color:#fff;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.15s;border:2px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08)}
.rbtn:active{transform:scale(0.88)}
.rbtn .lbl{font-size:9px;opacity:0.7;margin-top:1px}
.rbtn-drib{background:rgba(68,180,255,0.3);border-color:rgba(68,180,255,0.5)}
.rbtn-drib.active{background:rgba(68,180,255,0.7);border-color:#44b4ff;box-shadow:0 0 25px rgba(68,180,255,0.5)}
.rbtn-pass{background:rgba(255,212,59,0.3);border-color:rgba(255,212,59,0.5)}
.rbtn-pass.active{background:rgba(255,212,59,0.7);border-color:#ffd43b;box-shadow:0 0 25px rgba(255,212,59,0.5)}
.rbtn-shoot{background:rgba(255,107,53,0.3);border-color:rgba(255,107,53,0.5)}
.rbtn-shoot.active{background:rgba(255,107,53,0.7);border-color:#ff6b35;box-shadow:0 0 25px rgba(255,107,53,0.5)}
.btn-row{display:flex;gap:6px;justify-content:flex-end}
.rbtn-sm{width:48px;height:48px;font-size:16px}

/* 小屏适配 */
@media(max-width:400px){
  #joyArea{width:100px;height:100px;left:10px;bottom:20px}
  #joyKnob{width:38px;height:38px;top:31px;left:31px;font-size:12px}
  .rbtn{width:52px;height:52px;font-size:15px}
  .rbtn-sm{width:42px;height:42px;font-size:13px}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div>加载3D引擎...</div></div>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div><span class="team-name">🇨🇳 中国队</span> <span class="score" id="hMy">0</span></div>
  <div class="timer" id="hTime">90:00</div>
  <div><span class="score" id="hAi">0</span> <span class="team-name">对手</span></div>
</div>

<!-- 力度条 -->
<div id="powerBarBg"><div id="powerBarFill"></div></div>

<!-- 瞄准指示器 -->
<div id="aimIndicator"><div class="arrow"></div></div>

<!-- 触屏控制 -->
<div id="touchCtl">
  <div id="joyArea"><div id="joyKnob">⚽</div></div>
  <div id="lookArea" class="hint"></div>
  <div id="rightBtns">
    <div class="btn-row">
      <div class="rbtn rbtn-drib" id="btnDrib">🏃<span class="lbl">带球</span></div>
      <div class="rbtn rbtn-pass" id="btnPass">⚡<span class="lbl">传球</span></div>
      <div class="rbtn rbtn-shoot" id="btnShoot">🎯<span class="lbl">射门</span></div>
    </div>
    <div class="btn-row">
      <div class="rbtn rbtn-sm" id="btnSwitch" style="background:rgba(255,255,255,0.06)">🔀<span class="lbl">换人</span></div>
      <div class="rbtn rbtn-sm" id="btnSprint" style="background:rgba(255,255,255,0.06)">💨<span class="lbl">加速</span></div>
    </div>
  </div>
</div>

<!-- 开始 -->
<div class="ov on" id="sMenu">
  <div class="pn">
    <h1>⚽ 3D足球</h1>
    <p>第一人称视角 · 真实3D球场<br>🏃带球 ⚡传球（方向指示） 🎯射门（力度+角度）</p>
    <p style="font-size:12px;color:#556;margin-bottom:14px">触屏：左侧摇杆移动 · 右侧滑动看四周</p>
    <button class="btn" onclick="startGame()">▶ 开球！</button>
  </div>
</div>

<!-- 进球 -->
<div class="ov" id="sGoal">
  <div class="pn">
    <h1 id="gTitle">⚽ 进球！</h1>
    <div class="big-score" id="gScore">0-0</div>
    <p id="gInfo"></p>
    <button class="btn bl" onclick="resumeGame()">继续</button>
  </div>
</div>

<!-- 半场/结束 -->
<div class="ov" id="sHalf">
  <div class="pn">
    <h1 id="hTitle">⏸ 中场休息</h1>
    <div class="big-score" id="hScore">0-0</div>
    <p id="hInfo"></p>
    <button class="btn bl" id="hBtn" onclick="nextHalf()">下半场</button>
  </div>
</div>

<script>
// ============================================================
//  ⚽ 第一视角 3D 足球游戏
//  使用 Three.js (CDN)
// ============================================================

// ---- 加载Three.js ----
var script = document.createElement('script');
script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
script.onload = initThree;
script.onerror = function(){
  document.getElementById('loading').innerHTML = '<div style="color:#ff6b6b">加载失败，请检查网络后刷新</div>';
};
document.head.appendChild(script);

// ---- 全局变量 ----
var scene, camera, renderer;
var field, goalPosts, ball;
var myPlayers = [];   // 我方球员3D对象
var aiPlayers = [];   // AI球员3D对象
var playerData = [];  // 球员数据
var ballData = null;
var gameState = null;
var clock = new THREE.Clock();

var W, H;
var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// 控制状态
var ctrl = {
  moveX: 0, moveY: 0,    // 摇杆
  lookX: 0, lookY: 0,     // 视角
  dribbling: false,
  sprinting: false,
  aimMode: null,           // 'pass' | 'shoot' | null
  aimPower: 0,
  aimAngle: 0,
  aimTouchX: 0,
  aimTouchY: 0,
  myPlayerIdx: 0,
};

// ---- 初始化Three.js ----
function initThree(){
  var canvas = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true,
    alpha: false,
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  W = window.innerWidth;
  H = window.innerHeight;
  renderer.setSize(W, H);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 200, 400);

  // 相机（第一人称）
  camera = new THREE.PerspectiveCamera(70, W / H, 0.1, 500);
  camera.position.set(0, 1.6, 0);  // 人眼高度

  // 灯光
  var ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  var sun = new THREE.DirectionalLight(0xffeedd, 0.9);
  sun.position.set(80, 120, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 250;
  sun.shadow.camera.left = -100;
  sun.shadow.camera.right = 100;
  sun.shadow.camera.top = 100;
  sun.shadow.camera.bottom = -100;
  scene.add(sun);

  var fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-50, 60, -30);
  scene.add(fill);

  // 创建球场
  createField();

  // 创建球员
  createPlayers();

  // 创建球
  createBall();

  // 隐藏加载
  document.getElementById('loading').style.display = 'none';

  // 启动游戏循环
  animate();
}

// ---- 创建球场 ----
function createField(){
  var group = new THREE.Group();

  // ---- 草地纹理（程序生成） ----
  var grassCanvas = document.createElement('canvas');
  grassCanvas.width = 512;
  grassCanvas.height = 512;
  var gCtx = grassCanvas.getContext('2d');

  // 底色
  gCtx.fillStyle = '#3a9a5a';
  gCtx.fillRect(0, 0, 512, 512);

  // 草纹
  for(var i = 0; i < 8000; i++){
    var x = Math.random() * 512;
    var y = Math.random() * 512;
    var shade = 80 + Math.random() * 60;
    gCtx.fillStyle = 'rgba(' + shade + ',' + (shade + 80) + ',' + (shade + 30) + ',0.15)';
    gCtx.fillRect(x, y, 1 + Math.random() * 2, 2 + Math.random() * 3);
  }
  // 条纹
  for(var i = 0; i < 512; i += 32){
    gCtx.fillStyle = 'rgba(255,255,255,0.02)';
    gCtx.fillRect(0, i, 512, 16);
  }

  var grassTexture = new THREE.CanvasTexture(grassCanvas);
  grassTexture.wrapS = THREE.RepeatWrapping;
  grassTexture.wrapT = THREE.RepeatWrapping;
  grassTexture.repeat.set(20, 12);

  // 草地平面
  var fieldGeo = new THREE.PlaneGeometry(200, 120);
  var fieldMat = new THREE.MeshStandardMaterial({
    map: grassTexture,
    roughness: 0.9,
    metalness: 0,
  });
  var ground = new THREE.Mesh(fieldGeo, fieldMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.05;
  ground.receiveShadow = true;
  group.add(ground);

  // ---- 球场白线（用LineSegments） ----
  var lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });

  function addLine(pts, y){
    var geo = new THREE.BufferGeometry().setFromPoints(pts.map(function(p){
      return new THREE.Vector3(p[0], y || 0.02, p[1]);
    }));
    group.add(new THREE.Line(geo, lineMat));
  }

  // 边线
  var m = 2; // margin
  addLine([[-99, -59], [99, -59]]);
  addLine([[99, -59], [99, 59]]);
  addLine([[99, 59], [-99, 59]]);
  addLine([[-99, 59], [-99, -59]]);

  // 中线
  addLine([[0, -59], [0, 59]]);

  // 中圈
  var circlePts = [];
  for(var i = 0; i <= 32; i++){
    var a = (i / 32) * Math.PI * 2;
    circlePts.push([Math.cos(a) * 15, Math.sin(a) * 15]);
  }
  addLine(circlePts);

  // 禁区（左）
  addLine([[-99, -30], [-70, -30]]);
  addLine([[-70, -30], [-70, 30]]);
  addLine([[-70, 30], [-99, 30]]);

  // 禁区（右）
  addLine([[99, -30], [70, -30]]);
  addLine([[70, -30], [70, 30]]);
  addLine([[70, 30], [99, 30]]);

  // 小禁区（左）
  addLine([[-99, -15], [-85, -15]]);
  addLine([[-85, -15], [-85, 15]]);
  addLine([[-85, 15], [-99, 15]]);

  // 小禁区（右）
  addLine([[99, -15], [85, -15]]);
  addLine([[85, -15], [85, 15]]);
  addLine([[85, 15], [99, 15]]);

  // 罚球点
  var dotMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
  var dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.Float32BufferAttribute([-80, 0.02, 0, 80, 0.02, 0], 3));
  group.add(new THREE.Points(dotGeo, dotMat));

  // ---- 球门（左侧 - 我方防守） ----
  var goalMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.3 });

  // 左门柱
  var postGeo = new THREE.CylinderGeometry(0.15, 0.15, 3.5);
  var postL = new THREE.Mesh(postGeo, goalMat);
  postL.position.set(-100, 1.75, -13);
  postL.castShadow = true;
  group.add(postL);

  var postR = new THREE.Mesh(postGeo, goalMat);
  postR.position.set(-100, 1.75, 13);
  postR.castShadow = true;
  group.add(postR);

  // 横梁
  var barGeo = new THREE.CylinderGeometry(0.15, 0.15, 26, 8);
  barGeo.rotateZ(Math.PI / 2);
  var bar = new THREE.Mesh(barGeo, goalMat);
  bar.position.set(-100, 3.5, 0);
  bar.castShadow = true;
  group.add(bar);

  // 球网（半透明）
  var netMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.15,
    wireframe: true,
    side: THREE.DoubleSide,
  });
  var netGeo = new THREE.PlaneGeometry(26, 3.5, 8, 6);
  var net = new THREE.Mesh(netGeo, netMat);
  net.position.set(-99.5, 1.75, 0);
  group.add(net);

  // 侧网
  var netSide1 = new THREE.Mesh(new THREE.PlaneGeometry(2, 3.5, 3, 4), netMat);
  netSide1.position.set(-99, 1.75, -13.5);
  netSide1.rotation.y = 0.3;
  group.add(netSide1);

  var netSide2 = new THREE.Mesh(new THREE.PlaneGeometry(2, 3.5, 3, 4), netMat);
  netSide2.position.set(-99, 1.75, 13.5);
  netSide2.rotation.y = -0.3;
  group.add(netSide2);

  // ---- 球门（右侧 - AI防守，我们进攻） ----
  var postR1 = new THREE.Mesh(postGeo, goalMat);
  postR1.position.set(100, 1.75, -13);
  postR1.castShadow = true;
  group.add(postR1);

  var postR2 = new THREE.Mesh(postGeo, goalMat);
  postR2.position.set(100, 1.75, 13);
  postR2.castShadow = true;
  group.add(postR2);

  var barR = new THREE.Mesh(barGeo.clone(), goalMat);
  barR.position.set(100, 3.5, 0);
  barR.castShadow = true;
  group.add(barR);

  var netR = new THREE.Mesh(netGeo.clone(), netMat);
  netR.position.set(99.5, 1.75, 0);
  group.add(netR);

  var netRS1 = new THREE.Mesh(new THREE.PlaneGeometry(2, 3.5, 3, 4), netMat);
  netRS1.position.set(99, 1.75, -13.5);
  netRS1.rotation.y = -0.3;
  group.add(netRS1);

  var netRS2 = new THREE.Mesh(new THREE.PlaneGeometry(2, 3.5, 3, 4), netMat);
  netRS2.position.set(99, 1.75, 13.5);
  netRS2.rotation.y = 0.3;
  group.add(netRS2);

  // ---- 远处看台（简易） ----
  var standMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8 });
  var stand = new THREE.Mesh(new THREE.BoxGeometry(120, 10, 20), standMat);
  stand.position.set(0, -3, -70);
  group.add(stand);

  var stand2 = new THREE.Mesh(new THREE.BoxGeometry(120, 10, 20), standMat);
  stand2.position.set(0, -3, 70);
  group.add(stand2);

  scene.add(group);
}

// ---- 创建球员 ----
function createPlayers(){
  // 我方（蓝色）
  var myPos = [
    { x: -40, z: 0 },
    { x: -50, z: -12 },
    { x: -50, z: 12 },
    { x: -70, z: -8 },
    { x: -70, z: 8 },
  ];
  for(var i = 0; i < 5; i++){
    var p = createPlayerMesh(0x44b4ff, 0x2a7acc);
    p.position.set(myPos[i].x, 0, myPos[i].z);
    scene.add(p);
    myPlayers.push(p);

    // 数据
    playerData.push({
      mesh: p,
      team: 'my',
      index: i,
      x: myPos[i].x, z: myPos[i].z,
      targetX: myPos[i].x, targetZ: myPos[i].z,
      hasBall: false,
      speed: i === 0 ? 4.5 : 3.5,
      isUser: i === 0,
      baseX: myPos[i].x, baseZ: myPos[i].z,
      aiTimer: 0,
      kickTimer: 0,
      name: ['★','⚡','⚡','🛡','🛡'][i],
    });
  }

  // AI（红色）
  var aiPos = [
    { x: 40, z: 0 },
    { x: 50, z: -12 },
    { x: 50, z: 12 },
    { x: 70, z: -8 },
    { x: 70, z: 8 },
  ];
  for(var i = 0; i < 5; i++){
    var p = createPlayerMesh(0xff6b6b, 0xcc4444);
    p.position.set(aiPos[i].x, 0, aiPos[i].z);
    scene.add(p);
    aiPlayers.push(p);

    playerData.push({
      mesh: p,
      team: 'ai',
      index: i,
      x: aiPos[i].x, z: aiPos[i].z,
      targetX: aiPos[i].x, targetZ: aiPos[i].z,
      hasBall: false,
      speed: 3.2 + Math.random() * 0.6,
      isUser: false,
      baseX: aiPos[i].x, baseZ: aiPos[i].z,
      aiTimer: 0,
      kickTimer: 0,
      name: ['🔥','💨','💨','💪','💪'][i],
    });
  }
}

function createPlayerMesh(color, darkColor){
  var group = new THREE.Group();

  // 身体（圆柱）
  var bodyMat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.7,
    metalness: 0.1,
  });
  var body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 1.2, 8), bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);

  // 腿
  var legMat = new THREE.MeshStandardMaterial({ color: 0x224466, roughness: 0.8 });
  for(var side = -1; side <= 1; side += 2){
    var leg = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.5, 6), legMat);
    leg.position.set(side * 0.2, 0.25, 0);
    group.add(leg);
  }

  // 头
  var headMat = new THREE.MeshStandardMaterial({
    color: 0xffccaa,
    roughness: 0.6,
  });
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), headMat);
  head.position.y = 1.3;
  head.castShadow = true;
  group.add(head);

  // 球衣号码（用一个小平面，但简化处理）

  group.position.y = 0;
  return group;
}

// ---- 创建球 ----
function createBall(){
  var ballMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.3,
    metalness: 0.1,
  });
  var geo = new THREE.SphereGeometry(0.35, 16, 16);
  ball = new THREE.Mesh(geo, ballMat);
  ball.position.set(0, 0.35, 0);
  ball.castShadow = true;
  scene.add(ball);

  // 足球花纹（用线框）
  var wireMat = new THREE.MeshStandardMaterial({
    color: 0x222222,
    wireframe: true,
    transparent: true,
    opacity: 0.15,
  });
  var wire = new THREE.Mesh(new THREE.SphereGeometry(0.352, 12, 12), wireMat);
  ball.add(wire);

  ballData = {
    mesh: ball,
    x: 0, z: 0,
    vx: 0, vz: 0,
    owner: null,
  };
}

// ---- 启动游戏 ----
function startGame(){
  document.getElementById('sMenu').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  initMatch();
}

function initMatch(){
  gameState = {
    half: 1,
    timer: 90 * 60,  // 帧数
    myScore: 0,
    aiScore: 0,
    state: 'playing',
    goalCooldown: 0,
  };

  // 复位球员位置
  resetPositions();

  // 球在中场
  ballData.x = 0;
  ballData.z = 0;
  ballData.vx = 0;
  ballData.vz = 0;
  ballData.owner = null;

  // 相机复位
  var me = playerData[0];
  camera.position.set(me.x, 1.6, me.z);
  ctrl.lookX = 0;
  ctrl.lookY = 0;
  camera.rotation.order = 'YXZ';

  updateHUD();
}

function resetPositions(){
  var myPos = [
    { x: -40, z: 0 },
    { x: -50, z: -12 },
    { x: -50, z: 12 },
    { x: -70, z: -8 },
    { x: -70, z: 8 },
  ];
  for(var i = 0; i < 5; i++){
    var p = playerData[i];
    p.x = myPos[i].x;
    p.z = myPos[i].z;
    p.hasBall = false;
    p.kickTimer = 0;
    p.mesh.position.set(p.x, 0, p.z);
  }

  var aiPos = [
    { x: 40, z: 0 },
    { x: 50, z: -12 },
    { x: 50, z: 12 },
    { x: 70, z: -8 },
    { x: 70, z: 8 },
  ];
  for(var i = 0; i < 5; i++){
    var p = playerData[5 + i];
    p.x = aiPos[i].x;
    p.z = aiPos[i].z;
    p.hasBall = false;
    p.kickTimer = 0;
    p.mesh.position.set(p.x, 0, p.z);
  }
}

// ---- 更新游戏 ----
function updateGame(delta){
  if(!gameState || gameState.state !== 'playing') return;

  var gs = gameState;
  gs.timer--;
  if(gs.timer % 60 === 0) updateHUD();

  if(gs.timer <= 0){
    if(gs.half === 1){
      showHalfTime();
    } else {
      showEnd();
    }
    return;
  }

  if(gs.goalCooldown > 0){
    gs.goalCooldown--;
    return;
  }

  // 更新玩家控制
  updateUserPlayer(delta);

  // 更新AI
  updateAI(delta);

  // 更新球
  updateBall(delta);

  // 碰撞检测
  checkCollisions();

  // 检测进球
  checkGoal();
}

// ---- 更新玩家 ----
function updateUserPlayer(delta){
  var me = playerData[ctrl.myPlayerIdx];
  if(!me) return;

  // 移动
  var speed = ctrl.sprinting ? me.speed * 1.5 : me.speed;
  var moveX = ctrl.moveX * speed * delta * 0.5;
  var moveZ = ctrl.moveZ * speed * delta * 0.5;

  // 转向移动方向
  if(Math.abs(ctrl.moveX) > 0.05 || Math.abs(ctrl.moveZ) > 0.05){
    me.x += moveX;
    me.z += moveZ;
    // 边界
    me.x = Math.max(-95, Math.min(95, me.x));
    me.z = Math.max(-55, Math.min(55, me.z));
  }

  me.mesh.position.x = me.x;
  me.mesh.position.z = me.z;

  // 球跟随（带球时）
  if(ctrl.dribbling && ballData.owner === null){
    var d = Math.hypot(ballData.x - me.x, ballData.z - me.z);
    if(d < 8){
      ballData.x = me.x + 1.5;
      ballData.z = me.z - 0.5;
      ballData.vx *= 0.85;
      ballData.vz *= 0.85;
      ballData.owner = 'my';
      me.hasBall = true;
    }
  } else if(ctrl.dribbling && ballData.owner === 'my'){
    ballData.x = me.x + 1.5;
    ballData.z = me.z - 0.5;
    ballData.vx *= 0.85;
    ballData.vz *= 0.85;
  } else {
    me.hasBall = false;
    if(ballData.owner === 'my' && playerData.indexOf(ballData.ownerRef) === ctrl.myPlayerIdx){
      // 是我在带球
    }
  }

  // 更新球归属
  if(me.hasBall){
    ballData.owner = 'my';
    ballData.ownerRef = me;
  }

  // 相机跟随
  camera.position.x += (me.x - camera.position.x) * 0.08;
  camera.position.z += (me.z - camera.position.z) * 0.08;

  // 相机视角（由look控制）
  camera.rotation.y = ctrl.lookX;
  camera.rotation.x = ctrl.lookY;
  camera.rotation.order = 'YXZ';

  // AI队友跑位
  for(var i = 0; i < 5; i++){
    if(i === ctrl.myPlayerIdx) continue;
    var teammate = playerData[i];
    updateTeammate(teammate, delta);
  }
}

function updateTeammate(p, delta){
  // 根据我方控球情况跑位
  var hasBall = ctrl.dribbling || ballData.owner === 'my';

  var targetX, targetZ;
  if(hasBall){
    // 前压
    targetX = p.baseX + 15 + Math.sin(Date.now() * 0.001 + p.index) * 10;
    targetZ = p.baseZ + Math.sin(Date.now() * 0.002 + p.index * 2) * 6;
  } else {
    // 回防
    targetX = p.baseX - 5;
    targetZ = p.baseZ;
  }
  targetX = Math.max(-95, Math.min(95, targetX));
  targetZ = Math.max(-55, Math.min(55, targetZ));

  var dx = targetX - p.x;
  var dz = targetZ - p.z;
  p.x += dx * 0.03;
  p.z += dz * 0.03;
  p.mesh.position.x = p.x;
  p.mesh.position.z = p.z;
}

// ---- 更新AI对手 ----
function updateAI(delta){
  for(var i = 0; i < 5; i++){
    var p = playerData[5 + i];
    if(!p) continue;

    if(p.kickTimer > 0) p.kickTimer--;

    // 找离球最近的AI
    var ballDist = Math.hypot(p.x - ballData.x, p.z - ballData.z);

    // 谁离球最近谁去追
    var nearest = true;
    for(var j = 0; j < 5; j++){
      var other = playerData[5 + j];
      if(other === p) continue;
      if(Math.hypot(other.x - ballData.x, other.z - ballData.z) < ballDist - 5){
        nearest = false;
        break;
      }
    }

    if(nearest && ballDist < 60 && ballData.owner !== 'my'){
      // 追球
      var angle = Math.atan2(ballData.z - p.z, ballData.x - p.x);
      p.x += Math.cos(angle) * p.speed * delta * 0.4;
      p.z += Math.sin(angle) * p.speed * delta * 0.4;

      // 碰到球
      if(ballDist < 3){
        p.hasBall = true;
        ballData.x = p.x - 1.5;
        ballData.z = p.z + 0.5;
        ballData.vx *= 0.8;
        ballData.vz *= 0.8;
        ballData.owner = 'ai';
      } else {
        p.hasBall = false;
      }

      // AI带球向前
      if(p.hasBall){
        ballData.x = p.x - 1.5;
        ballData.z = p.z + 0.5;

        // 射门（靠近禁区时）
        if(p.x > 60 && Math.random() < 0.008){
          aiShoot(p);
        }
        // 传球
        if(Math.random() < 0.005){
          aiPass(p);
        }
      }
    } else {
      // 回防守位置
      var targetX = p.baseX;
      var targetZ = p.baseZ;
      // 如果我方控球，整体后退
      if(ballData.owner === 'my'){
        targetX += 5;
      }
      var dx2 = targetX - p.x;
      var dz2 = targetZ - p.z;
      p.x += dx2 * 0.02;
      p.z += dz2 * 0.02;
      p.hasBall = false;
    }

    // 边界
    p.x = Math.max(-95, Math.min(95, p.x));
    p.z = Math.max(-55, Math.min(55, p.z));
    p.mesh.position.x = p.x;
    p.mesh.position.z = p.z;
  }
}

function aiShoot(p){
  var goalZ = -5 + Math.random() * 10;  // 球门范围内随机
  var angle = Math.atan2(goalZ - p.z, 100 - p.x);
  var power = 8 + Math.random() * 4;
  ballData.vx = Math.cos(angle) * power;
  ballData.vz = Math.sin(angle) * power;
  ballData.owner = null;
  p.hasBall = false;
  p.kickTimer = 30;
  playSound(600, 0.1);
}

function aiPass(p){
  // 找队友
  var targets = [];
  for(var i = 0; i < 5; i++){
    var t = playerData[5 + i];
    if(t !== p && Math.hypot(t.x - p.x, t.z - p.z) < 50){
      targets.push(t);
    }
  }
  if(targets.length === 0) return;
  var target = targets[Math.floor(Math.random() * targets.length)];
  var angle = Math.atan2(target.z - p.z, target.x - p.x);
  var power = 5 + Math.random() * 2;
  ballData.vx = Math.cos(angle) * power;
  ballData.vz = Math.sin(angle) * power;
  ballData.owner = null;
  p.hasBall = false;
  p.kickTimer = 20;
  playSound(500, 0.06);
}

// ---- 更新球 ----
function updateBall(delta){
  var b = ballData;

  // 物理
  b.vx *= 0.99;
  b.vz *= 0.99;

  b.x += b.vx * delta * 0.5;
  b.z += b.vz * delta * 0.5;

  // 出界
  if(Math.abs(b.x) > 97){ b.x = Math.sign(b.x) * 97; b.vx *= -0.5; }
  if(Math.abs(b.z) > 57){ b.z = Math.sign(b.z) * 57; b.vz *= -0.5; }

  // 球速太慢就停
  if(Math.abs(b.vx) < 0.02 && Math.abs(b.vz) < 0.02){
    b.vx = 0; b.vz = 0;
  }

  // 更新3D位置
  b.mesh.position.x = b.x;
  b.mesh.position.z = b.z;
  b.mesh.position.y = 0.35;

  // 球旋转
  b.mesh.rotation.x += b.vz * 0.05;
  b.mesh.rotation.z -= b.vx * 0.05;

  // 球权检查
  if(b.owner === 'my'){
    var me = playerData[ctrl.myPlayerIdx];
    if(me && Math.hypot(me.x - b.x, me.z - b.z) > 5){
      b.owner = null;
      me.hasBall = false;
    }
  }
  if(b.owner === 'ai'){
    // 检查AI是否还在控球
    var found = false;
    for(var i = 0; i < 5; i++){
      var ai = playerData[5 + i];
      if(ai.hasBall && Math.hypot(ai.x - b.x, ai.z - b.z) < 5){
        found = true;
        break;
      }
    }
    if(!found){
      b.owner = null;
    }
  }
}

// ---- 碰撞（球员之间） ----
function checkCollisions(){
  // 玩家和AI保持距离
  var me = playerData[ctrl.myPlayerIdx];
  for(var i = 0; i < 5; i++){
    var ai = playerData[5 + i];
    var d = Math.hypot(me.x - ai.x, me.z - ai.z);
    if(d < 2){
      var angle = Math.atan2(ai.z - me.z, ai.x - me.x);
      me.x -= Math.cos(angle) * (2 - d) * 0.5;
      me.z -= Math.sin(angle) * (2 - d) * 0.5;
      ai.x += Math.cos(angle) * (2 - d) * 0.5;
      ai.z += Math.sin(angle) * (2 - d) * 0.5;
    }
  }
}

// ---- 进球检测 ----
function checkGoal(){
  var b = ballData;

  // AI球门（右侧） - 我们得分
  if(b.x > 101 && b.z > -13 && b.z < 13){
    gameState.myScore++;
    onGoal(true);
    return;
  }
  // 我方球门（左侧） - AI得分
  if(b.x < -101 && b.z > -13 && b.z < 13){
    gameState.aiScore++;
    onGoal(false);
    return;
  }
}

function onGoal(isMyGoal){
  var gs = gameState;
  gs.state = 'goal';
  gs.goalCooldown = 120;
  updateHUD();

  document.getElementById('gTitle').textContent = isMyGoal ? '⚽ 进球！中国队得分！' : '⚽ 哎呀，被进了...';
  document.getElementById('gScore').textContent = gs.myScore + ' - ' + gs.aiScore;
  document.getElementById('gInfo').textContent = isMyGoal ? '🎉 精彩的进攻！' : '💪 别灰心，继续加油！';
  document.getElementById('sGoal').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');

  playSound(800, 0.2);
  setTimeout(function(){ playSound(1000, 0.15); }, 200);
}

function resumeGame(){
  document.getElementById('sGoal').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  gameState.state = 'playing';
  // 中圈开球
  ballData.x = 0; ballData.z = 0;
  ballData.vx = 0; ballData.vz = 0;
  ballData.owner = null;
  resetPositions();
  // 复位相机
  var me = playerData[ctrl.myPlayerIdx];
  camera.position.set(me.x, 1.6, me.z);
}

// ---- 半场/结束 ----
function showHalfTime(){
  gameState.state = 'halftime';
  document.getElementById('hTitle').textContent = '⏸ 中场休息';
  document.getElementById('hScore').textContent = gameState.myScore + ' - ' + gameState.aiScore;
  document.getElementById('hInfo').textContent = gameState.half === 1 ? '下半场加油！' : '比赛结束！';
  document.getElementById('hBtn').textContent = '▶ 下半场';
  document.getElementById('hBtn').onclick = nextHalf;
  document.getElementById('sHalf').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
}

function nextHalf(){
  document.getElementById('sHalf').classList.remove('on');
  document.getElementById('touchCtl').classList.add('on');
  gameState.half = 2;
  gameState.timer = 90 * 60;
  gameState.state = 'playing';
  resetPositions();
  ballData.x = 0; ballData.z = 0;
  ballData.vx = 0; ballData.vz = 0;
  ballData.owner = null;
  var me = playerData[ctrl.myPlayerIdx];
  camera.position.set(me.x, 1.6, me.z);
  updateHUD();
}

function showEnd(){
  gameState.state = 'end';
  document.getElementById('hTitle').textContent = '🏁 比赛结束！';
  document.getElementById('hScore').textContent = gameState.myScore + ' - ' + gameState.aiScore;
  document.getElementById('hInfo').textContent =
    gameState.myScore > gameState.aiScore ? '🎉 中国队赢了！' :
    (gameState.myScore < gameState.aiScore ? '😤 下次一定赢！' : '🤝 握手言和');
  document.getElementById('hBtn').textContent = '🔄 再来一局';
  document.getElementById('hBtn').onclick = function(){
    document.getElementById('sHalf').classList.remove('on');
    document.getElementById('touchCtl').classList.add('on');
    initMatch();
  };
  document.getElementById('sHalf').classList.add('on');
  document.getElementById('touchCtl').classList.remove('on');
}

// ---- HUD ----
function updateHUD(){
  if(!gameState) return;
  document.getElementById('hMy').textContent = gameState.myScore;
  document.getElementById('hAi').textContent = gameState.aiScore;
  var total = gameState.half === 1 ? 90 * 60 : 90 * 60;
  var remain = gameState.timer;
  var min = Math.floor(remain / 3600);
  var sec = Math.floor((remain % 3600) / 60);
  document.getElementById('hTime').textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
}

// ---- 音效 ----
function playSound(freq, dur){
  try{
    var ac = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ac.createOscillator();
    var g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value = freq;
    g.gain.value = 0.06;
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (dur || 0.1));
    osc.start(); osc.stop(ac.currentTime + (dur || 0.1));
  }catch(e){}
}

// ============================================================
//  传球 / 射门
// ============================================================

function tryPass(){
  if(!gameState || gameState.state !== 'playing') return;
  if(ctrl.aimMode) return;
  var me = playerData[ctrl.myPlayerIdx];
  if(!me || !ctrl.dribbling && Math.hypot(ballData.x - me.x, ballData.z - me.z) > 4) return;

  ctrl.aimMode = 'pass';
  ctrl.aimPower = 0;
  ctrl.aimAngle = 0;

  document.getElementById('aimIndicator').className = 'on pass';
  document.getElementById('powerBarBg').classList.add('on');
}

function tryShoot(){
  if(!gameState || gameState.state !== 'playing') return;
  if(ctrl.aimMode) return;
  var me = playerData[ctrl.myPlayerIdx];
  if(!me || !ctrl.dribbling && Math.hypot(ballData.x - me.x, ballData.z - me.z) > 4) return;

  ctrl.aimMode = 'shoot';
  ctrl.aimPower = 0;
  ctrl.aimAngle = 0;

  document.getElementById('aimIndicator').className = 'on shoot';
  document.getElementById('powerBarBg').classList.add('on');
}

function executePass(){
  if(ctrl.aimMode !== 'pass') return;
  var me = playerData[ctrl.myPlayerIdx];
  if(!me) return;

  var power = 5 + ctrl.aimPower * 0.06;
  var angle = ctrl.aimAngle;

  ballData.vx = Math.cos(angle) * power;
  ballData.vz = Math.sin(angle) * power;
  ballData.owner = null;
  me.hasBall = false;

  ctrl.aimMode = null;
  document.getElementById('aimIndicator').className = 'on';
  document.getElementById('powerBarBg').classList.remove('on');
  playSound(500, 0.08);
}

function executeShoot(){
  if(ctrl.aimMode !== 'shoot') return;
  var me = playerData[ctrl.myPlayerIdx];
  if(!me) return;

  var power = 7 + ctrl.aimPower * 0.09;
  power = Math.min(power, 16);
  var angle = ctrl.aimAngle;

  ballData.vx = Math.cos(angle) * power;
  ballData.vz = Math.sin(angle) * power;
  ballData.owner = null;
  me.hasBall = false;

  ctrl.aimMode = null;
  document.getElementById('aimIndicator').className = 'on';
  document.getElementById('powerBarBg').classList.remove('on');
  playSound(800, 0.15);

  // 射门特效-粒子
}

function cancelAim(){
  ctrl.aimMode = null;
  document.getElementById('aimIndicator').className = 'on';
  document.getElementById('powerBarBg').classList.remove('on');
}

// ---- 切换球员 ----
function switchPlayer(){
  if(!gameState || gameState.state !== 'playing') return;
  var nearest = -1, nearD = Infinity;
  for(var i = 0; i < 5; i++){
    if(i === ctrl.myPlayerIdx) continue;
    var p = playerData[i];
    var d = Math.hypot(p.x - ballData.x, p.z - ballData.z);
    if(d < nearD){ nearD = d; nearest = i; }
  }
  if(nearest >= 0){
    // 释放原球员的球
    var old = playerData[ctrl.myPlayerIdx];
    if(old) old.hasBall = false;

    ctrl.myPlayerIdx = nearest;
    var me = playerData[nearest];
    camera.position.set(me.x, 1.6, me.z);
    playSound(400, 0.04);
  }
}

// ---- 摇杆 ----
var joyTouchId = null;
var joyEl = document.getElementById('joyArea');
var knobEl = document.getElementById('joyKnob');

joyEl.addEventListener('touchstart', function(e){
  e.preventDefault();
  joyTouchId = e.changedTouches[0].identifier;
  updateJoy(e.changedTouches[0]);
});

joyEl.addEventListener('touchmove', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === joyTouchId) updateJoy(t);
  }
});

joyEl.addEventListener('touchend', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === joyTouchId){
      joyTouchId = null;
      ctrl.moveX = 0;
      ctrl.moveZ = 0;
      knobEl.style.top = '41px';
      knobEl.style.left = '41px';
      knobEl.classList.remove('move');
    }
  }
});

joyEl.addEventListener('touchcancel', function(){
  joyTouchId = null;
  ctrl.moveX = 0; ctrl.moveZ = 0;
  knobEl.style.top = '41px';
  knobEl.style.left = '41px';
  knobEl.classList.remove('move');
});

function updateJoy(t){
  var rect = joyEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var dx = t.clientX - cx;
  var dy = t.clientY - cy;
  var maxR = rect.width / 2 - 10;
  var len = Math.hypot(dx, dy);
  if(len > maxR){ dx = dx / len * maxR; dy = dy / len * maxR; }
  var norm = len / maxR;

  // 转换：上下对应前后（Z轴），左右对应左右（X轴）
  ctrl.moveX = (dx / maxR) * Math.min(1, norm * 1.2);
  ctrl.moveZ = -(dy / maxR) * Math.min(1, norm * 1.2);

  knobEl.style.left = (41 + dx) + 'px';
  knobEl.style.top = (41 + dy) + 'px';
  if(norm > 0.1) knobEl.classList.add('move');
  else knobEl.classList.remove('move');
}

// ---- 右视角触摸 ----
var lookEl = document.getElementById('lookArea');
var lookTouchId = null;
var lastLookX = null, lastLookY = null;

lookEl.addEventListener('touchstart', function(e){
  e.preventDefault();
  lookEl.classList.remove('hint');
  var t = e.changedTouches[0];
  lookTouchId = t.identifier;
  lastLookX = t.clientX;
  lastLookY = t.clientY;
});

lookEl.addEventListener('touchmove', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === lookTouchId && lastLookX !== null){
      var dx = (t.clientX - lastLookX) * 0.005;
      var dy = (t.clientY - lastLookY) * 0.005;
      ctrl.lookX -= dx;
      ctrl.lookY = Math.max(-0.5, Math.min(0.5, ctrl.lookY + dy));
      lastLookX = t.clientX;
      lastLookY = t.clientY;
    }
  }
});

lookEl.addEventListener('touchend', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === lookTouchId){
      lookTouchId = null;
      lastLookX = null; lastLookY = null;
    }
  }
});

lookEl.addEventListener('touchcancel', function(){
  lookTouchId = null;
  lastLookX = null; lastLookY = null;
});

// ---- 视角（鼠标） ----
var isPointerLocked = false;
renderer.domElement.addEventListener('click', function(){
  // 不强制锁鼠标，用拖动即可
});

var mouseDown = false;
var lastMX = 0, lastMY = 0;
renderer.domElement.addEventListener('mousedown', function(e){
  mouseDown = true;
  lastMX = e.clientX;
  lastMY = e.clientY;
});
window.addEventListener('mousemove', function(e){
  if(mouseDown){
    var dx = (e.clientX - lastMX) * 0.005;
    var dy = (e.clientY - lastMY) * 0.005;
    ctrl.lookX -= dx;
    ctrl.lookY = Math.max(-0.5, Math.min(0.5, ctrl.lookY + dy));
    lastMX = e.clientX;
    lastMY = e.clientY;
  }
});
window.addEventListener('mouseup', function(){ mouseDown = false; });

// ---- 键盘 ----
document.addEventListener('keydown', function(e){
  switch(e.key){
    case 'w': case 'W': case 'ArrowUp': ctrl.moveZ = 1; break;
    case 's': case 'S': case 'ArrowDown': ctrl.moveZ = -1; break;
    case 'a': case 'A': case 'ArrowLeft': ctrl.moveX = -1; break;
    case 'd': case 'D': case 'ArrowRight': ctrl.moveX = 1; break;
    case ' ': e.preventDefault(); ctrl.dribbling = true; break;
    case '1': tryShoot(); break;
    case '2': tryPass(); break;
    case '3': ctrl.dribbling = !ctrl.dribbling; break;
  }
});
document.addEventListener('keyup', function(e){
  switch(e.key){
    case 'w': case 'W': case 'ArrowUp':
    case 's': case 'S': case 'ArrowDown':
      ctrl.moveZ = 0; break;
    case 'a': case 'A': case 'ArrowLeft':
    case 'd': case 'D': case 'ArrowRight':
      ctrl.moveX = 0; break;
    case ' ': ctrl.dribbling = false; break;
  }
});

var passBtn = document.getElementById('btnPass');
var passTouchId2 = null;

passBtn.addEventListener('touchstart', function(e){
  e.preventDefault(); e.stopPropagation();
  var t = e.changedTouches[0];
  passTouchId2 = t.identifier;
  tryPass();
  this.classList.add('active');
});

passBtn.addEventListener('touchmove', function(e){
  e.preventDefault();
  for(var t of e.changedTouches){
    if(t.identifier === passTouchId2 && ctrl.aimMode === 'pass'){
      updateAim(t.clientX, t.clientY);
    }
  }
});

passBtn.addEventListener('touchend', function(e){
  e.preventDefault(); e.stopPropagation();
  passTouchId2 = null;
  this.classList.remove('active');
  if(ctrl.aimMode === 'pass') executePass();
});

passBtn.addEventListener('touchcancel', function(){
  passTouchId2 = null;
  this.classList.remove('active');
  cancelAim();
});

// ---- 瞄准更新 ----
function updateAim(clientX, clientY){
  if(!ctrl.aimMode) return;
  var me = playerData[ctrl.myPlayerIdx];
  if(!me) return;

  // 将屏幕坐标映射到球场平面
  var vec = new THREE.Vector3(
    (clientX / W) * 2 - 1,
    -(clientY / H) * 2 + 1,
    0.5
  );
  vec.unproject(camera);
  var dir = vec.sub(camera.position).normalize();

  // 计算与地面(y=0)的交点
  var t = -camera.position.y / dir.y;
  if(t < 0) return;
  var targetX = camera.position.x + dir.x * t;
  var targetZ = camera.position.z + dir.z * t;

  // 边界
  targetX = Math.max(-95, Math.min(95, targetX));
  targetZ = Math.max(-55, Math.min(55, targetZ));

  // 角度
  var angle = Math.atan2(targetZ - me.z, targetX - me.x);
  ctrl.aimAngle = angle;

  // 力度（根据距离）
  var d = Math.hypot(targetX - me.x, targetZ - me.z);
  d = Math.min(d, 300);
  ctrl.aimPower = d;

  // 更新UI
  var pct = Math.min(100, d / 300 * 100);
  document.getElementById('powerBarFill').style.width = pct + '%';

  // 瞄准圈在屏幕上的位置（投影）
  var pos = new THREE.Vector3(targetX, 0.02, targetZ);
  pos.project(camera);
  var sx = (pos.x * 0.5 + 0.5) * W;
  var sy = (-pos.y * 0.5 + 0.5) * H;

  var aimEl = document.getElementById('aimIndicator');
  aimEl.style.left = sx + 'px';
  aimEl.style.top = sy + 'px';
  var size = 40 + pct * 0.6;
  aimEl.style.width = size + 'px';
  aimEl.style.height = size + 'px';
}

// ---- 窗口自适应 ----
window.addEventListener('resize', function(){
  W = window.innerWidth;
  H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ============================================================
//  主循环
// ============================================================
function animate(){
  requestAnimationFrame(animate);
  var delta = Math.min(clock.getDelta(), 0.05);
  updateGame(delta);

  // 球跟随用户视角的指示线
  renderer.render(scene, camera);
}

// 鼠标也可以模拟传球/射门 - 右键点击球场
renderer.domElement.addEventListener('contextmenu', function(e){
  e.preventDefault();
  if(ctrl.aimMode === 'pass') executePass();
  else if(ctrl.aimMode === 'shoot') executeShoot();
});

// 键盘回车确认传球/射门
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    if(ctrl.aimMode === 'pass') executePass();
    else if(ctrl.aimMode === 'shoot') executeShoot();
  }
  if(e.key === 'Escape') cancelAim();
});
